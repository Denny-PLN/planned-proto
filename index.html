  border-radius: 6px;
  padding: 6px 32px 6px 10px;
  font: 400 14px/1.2 var(--font-sans);
  color: var(--foreground);
  cursor: default;
  user-select: none;
  outline: none;
}
[data-slot="select-item"]:hover,
[data-slot="select-item"][data-highlighted] {
  background: var(--accent);
  color: var(--accent-foreground);
}
[data-slot="select-item"][aria-selected="true"] { font-weight: 500; }
[data-slot="select-item-indicator"] {
  position: absolute;
  right: 8px;
  display: inline-flex;
  width: 16px; height: 16px;
  align-items: center;
  justify-content: center;
}
[data-slot="select-label"] { padding: 4px 8px; font: 400 12px/1 var(--font-sans); color: var(--muted-foreground); }
[data-slot="select-separator"] { margin: 4px -4px; height: 1px; background: var(--border); }

/* ============================================================
   TABS ([data-slot="tabs"])
============================================================ */
[data-slot="tabs"] {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
[data-slot="tabs-list"] {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: fit-content;
  height: 36px;
  padding: 3px;
  border-radius: 8px;
  background: var(--muted);
  color: var(--muted-foreground);
}
[data-slot="tabs-trigger"] {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  flex: 1 1 auto;
  height: 30px;
  padding: 0 10px;
  border: 1px solid transparent;
  border-radius: 6px;
  background: transparent;
  font: 500 14px/1 var(--font-sans);
  color: var(--muted-foreground);
  cursor: pointer;
  white-space: nowrap;
  transition: background-color 150ms, color 150ms, box-shadow 150ms;
  outline: none;
}
[data-slot="tabs-trigger"]:hover { color: var(--foreground); }
[data-slot="tabs-trigger"][data-state="active"],
[data-slot="tabs-trigger"][aria-selected="true"] {
  background: var(--background);
  color: var(--foreground);
  box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
}
[data-slot="tabs-trigger"]:focus-visible {
  border-color: var(--ring);
  box-shadow: 0 0 0 3px color-mix(in oklab, var(--ring) 50%, transparent);
}
[data-slot="tabs-content"] { outline: none; }

/* line variant — left-aligned underline tabs */
[data-slot="tabs-list"][data-variant="line"] {
  display: flex;
  justify-content: flex-start;
  width: 100%;
  height: auto;
  padding: 0;
  border-radius: 0;
  background: transparent;
  border-bottom: 0;
  gap: 4px;
}
[data-slot="tabs-list"][data-variant="line"] [data-slot="tabs-trigger"] {
  flex: 0 0 auto;
  height: 36px;
  padding: 0 12px;
  border: 0;
  border-radius: 0;
  background: transparent;
  box-shadow: none;
  border-bottom: 2px solid transparent;
}
[data-slot="tabs-list"][data-variant="line"] [data-slot="tabs-trigger"]:hover {
  background: transparent;
  color: var(--foreground);
}
[data-slot="tabs-list"][data-variant="line"] [data-slot="tabs-trigger"][data-state="active"],
[data-slot="tabs-list"][data-variant="line"] [data-slot="tabs-trigger"][aria-selected="true"] {
  background: transparent;
  color: var(--foreground);
  box-shadow: none;
  border-bottom-color: var(--foreground);
}

/* ============================================================
   TABLE ([data-slot="table"])
============================================================ */

/* When a shadcn <Card> wraps a table, the card chrome disappears —
   tables ALWAYS render flat: no border, no fill, no shadow. */
[data-slot="card"]:has([data-slot="table"]) {
  background: transparent !important;
  border: 0 !important;
  box-shadow: none !important;
  padding: 0 !important;
  border-radius: 0 !important;
  gap: 8px !important;
}
[data-slot="card"]:has([data-slot="table"]) > [data-slot="card-content"] {
  padding: 0 !important;
}
[data-slot="card"]:has([data-slot="table"]) > [data-slot="card-header"] {
  padding: 0 0 8px 0 !important;
  border-bottom: 0 !important;
}

[data-slot="table-container"] { position: relative; width: 100%; overflow: auto; }
[data-slot="table"] {
  width: 100%;
  caption-side: bottom;
  font: 400 14px/1.45 var(--font-sans);
  border-collapse: collapse;
}
[data-slot="table-header"] tr { border-bottom: 1px solid var(--border); }
[data-slot="table-header"] th {
  height: 40px;
  padding: 0 8px;
  text-align: left;
  font: 500 14px/1 var(--font-sans);
  color: var(--muted-foreground);
  vertical-align: middle;
  white-space: nowrap;
}
[data-slot="table-body"] tr {
  border-bottom: 1px solid var(--border);
  transition: background-color 150ms;
}
[data-slot="table-body"] tr:hover { background: color-mix(in oklab, var(--muted) 50%, transparent); }
[data-slot="table-body"] tr:last-child { border-bottom: 0; }
[data-slot="table-body"] td {
  padding: 8px;
  vertical-align: middle;
  white-space: nowrap;
}
[data-slot="table-footer"] tr {
  background: color-mix(in oklab, var(--muted) 50%, transparent);
  border-top: 1px solid var(--border);
  font-weight: 500;
}

/* ============================================================
   DROPDOWN MENU ([data-slot="dropdown-menu-content"])
============================================================ */
[data-slot="dropdown-menu-content"] {
  z-index: 50;
  min-width: 144px;
  border-radius: 8px;
  background: var(--popover);
  color: var(--popover-foreground);
  padding: 4px;
  box-shadow: 0 0 0 1px color-mix(in oklab, var(--foreground) 10%, transparent),
              0 4px 6px -1px rgb(0 0 0 / 0.1);
}
[data-slot="dropdown-menu-item"] {
  position: relative;
  display: flex;
  align-items: center;
  gap: 6px;
  border-radius: 6px;
  padding: 6px 8px;
  font: 400 14px/1.2 var(--font-sans);
  color: var(--foreground);
  cursor: default;
  user-select: none;
  outline: none;
}
[data-slot="dropdown-menu-item"]:hover { background: var(--accent); color: var(--accent-foreground); }
[data-slot="dropdown-menu-item"][data-variant="destructive"] { color: var(--destructive); }
[data-slot="dropdown-menu-label"] { padding: 6px 8px; font: 500 14px/1 var(--font-sans); color: var(--foreground); }
[data-slot="dropdown-menu-separator"] { margin: 4px -4px; height: 1px; background: var(--border); }
[data-slot="dropdown-menu-shortcut"] { margin-left: auto; font: 400 12px/1 var(--font-sans); color: var(--muted-foreground); letter-spacing: 0.05em; }

/* ============================================================
   GLOBAL ALIASES — map existing project classes onto shadcn defaults.
   This makes every legacy `.btn`, `.input`, `.badge`, `.sc-card` etc.
   render with the boilerplate shadcn look without touching JSX.
   ============================================================ */

/* --- buttons -------------------------------------------------- */
button.btn,
a.btn,
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  white-space: nowrap;
  height: 32px;
  padding: 0 10px;
  border: 1px solid transparent;
  border-radius: 8px;
  background: var(--primary);
  color: var(--primary-foreground);
  font: 500 14px/1.2 var(--font-sans);
  cursor: pointer;
  outline: none;
  transition: background-color 150ms, color 150ms, border-color 150ms, box-shadow 150ms;
}
.btn:hover { background: color-mix(in oklab, var(--primary) 90%, transparent); }
.btn:disabled, .btn.disabled, .btn[aria-disabled="true"] { opacity: 0.5; pointer-events: none; }
.btn:focus-visible { box-shadow: 0 0 0 3px color-mix(in oklab, var(--ring) 50%, transparent); border-color: var(--ring); }
.btn svg { flex-shrink: 0; pointer-events: none; }

.btn.outline {
  background: var(--background);
  color: var(--foreground);
  border-color: var(--border);
}
.btn.outline:hover { background: var(--muted); color: var(--foreground); }

.btn.ghost {
  background: transparent;
  color: var(--foreground);
  border-color: transparent;
}
.btn.ghost:hover { background: var(--muted); color: var(--foreground); }

.btn.secondary {
  background: var(--secondary);
  color: var(--secondary-foreground);
}
.btn.secondary:hover { background: color-mix(in oklab, var(--secondary) 80%, transparent); }

.btn.destructive {
  background: color-mix(in oklab, var(--destructive) 10%, transparent);
  color: var(--destructive);
}
.btn.destructive:hover { background: color-mix(in oklab, var(--destructive) 20%, transparent); }

.btn.link {
  background: transparent; color: var(--primary);
  height: auto; padding: 0; border-color: transparent;
}
.btn.link:hover { text-decoration: underline; text-underline-offset: 4px; }

.btn.sm { height: 28px; padding: 0 10px; font-size: 13px; }
.btn.xs { height: 24px; padding: 0 8px; font-size: 12px; border-radius: 6px; }
.btn.lg { height: 36px; padding: 0 16px; }

button.icon-btn,
a.icon-btn,
.icon-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px; height: 32px;
  padding: 0;
  border: 1px solid transparent;
  border-radius: 8px;
  background: transparent;
  color: var(--foreground);
  cursor: pointer;
  outline: none;
  transition: background-color 150ms, color 150ms, box-shadow 150ms;
}
.icon-btn:hover { background: var(--muted); }
.icon-btn:focus-visible { border-color: var(--ring); box-shadow: 0 0 0 3px color-mix(in oklab, var(--ring) 50%, transparent); }
.icon-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
.icon-btn.sm { width: 28px; height: 28px; }
.icon-btn.xs { width: 24px; height: 24px; border-radius: 6px; }

/* --- inputs --------------------------------------------------- */
input.input,
textarea.input,
.input {
  display: block;
  width: 100%;
  height: 32px;
  padding: 4px 10px;
  border-radius: 8px;
  border: 1px solid var(--input);
  background: transparent;
  color: var(--foreground);
  font: 400 14px/1.4 var(--font-sans);
  outline: none;
  transition: border-color 150ms, box-shadow 150ms;
}
.input::placeholder { color: var(--muted-foreground); }
.input:focus-visible,
.input:focus {
  border-color: var(--ring);
  box-shadow: 0 0 0 3px color-mix(in oklab, var(--ring) 50%, transparent);
}
textarea.input { min-height: 64px; padding: 8px 10px; line-height: 1.45; resize: vertical; }
.input.sm { height: 28px; font-size: 13px; }

/* --- badges / chips ------------------------------------------- */
.badge,
.chip,
.tag,
.pill {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  height: 20px;
  padding: 2px 8px;
  border: 1px solid var(--border);
  border-radius: 9999px;
  background: transparent;
  color: var(--foreground);
  font: 500 12px/1 var(--font-sans);
  white-space: nowrap;
  width: fit-content;
}
.badge.solid,
.chip.solid {
  background: var(--primary); color: var(--primary-foreground); border-color: transparent;
}
.badge.secondary,
.chip.secondary {
  background: var(--secondary); color: var(--secondary-foreground); border-color: transparent;
}
.badge.destructive,
.chip.destructive {
  background: color-mix(in oklab, var(--destructive) 10%, transparent);
  color: var(--destructive);
  border-color: transparent;
}
.badge.muted,
.chip.muted {
  background: var(--muted); color: var(--muted-foreground); border-color: transparent;
}

/* --- cards ---------------------------------------------------- */
.sc-card,
.card,
.metric-card {
  background: var(--card);
  color: var(--card-foreground);
  border-radius: 12px;
  box-shadow: 0 0 0 1px color-mix(in oklab, var(--foreground) 10%, transparent);
  overflow: hidden;
  border: 0;
}

/* --- avatar shortcut ----------------------------------------- */
.av-circle,
.avatar {
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  width: 32px; height: 32px;
  border-radius: 9999px;
  background: var(--muted);
  color: var(--muted-foreground);
  font: 400 14px/1 var(--font-sans);
  overflow: hidden;
}
.av-circle::after,
.avatar::after {
  content: ""; position: absolute; inset: 0;
  border-radius: inherit;
  border: 1px solid var(--border);
  pointer-events: none;
  mix-blend-mode: darken;
}
.av-circle.sm,
.avatar.sm { width: 24px; height: 24px; font-size: 12px; }
.av-circle.lg,
.avatar.lg { width: 40px; height: 40px; }

/* --- separator alias ----------------------------------------- */
hr,
.divider,
.separator {
  border: 0;
  background: var(--border);
  height: 1px;
  width: 100%;
  margin: 0;
}
.divider.vertical,
.separator.vertical { width: 1px; height: auto; align-self: stretch; }

/* --- shadcn type cleanup: kill custom font-weights to match defaults */
h1, h2, h3, h4, h5 { font-family: var(--font-sans); color: var(--foreground); }

/* --- legacy tabs/segments → shadcn-default look ----------------------- */
.d-tabs,
.tr-tabs,
.cs-tabs,
.del-tabs {
  display: inline-flex;
  align-items: center;
  justify-content: flex-start;
  gap: 0;
  padding: 3px;
  border-radius: 8px;
  background: var(--muted);
  color: var(--muted-foreground);
  width: fit-content;
  height: 36px;
  border: 0 !important;
}
.d-tab,
.del-tab {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 0 10px;
  height: 30px;
  border-radius: 6px;
  background: transparent;
  color: var(--muted-foreground);
  font: 500 13px/1 var(--font-sans);
  white-space: nowrap;
  cursor: pointer;
  border: 1px solid transparent;
  transition: background-color 150ms, color 150ms, box-shadow 150ms;
}
.d-tab:hover,
.del-tab:hover { color: var(--foreground); }
.d-tab.active,
.d-tab[data-state="active"],
.del-tab.active,
.del-tab.on {
  background: var(--background);
  color: var(--foreground);
  box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
}
.d-tabs-spacer { flex: 1; }

/* unify any pre-existing inner segmented-controls (.d-seg) */
.d-seg {
  display: inline-flex;
  align-items: center;
  padding: 3px;
  border-radius: 8px;
  background: var(--muted);
  color: var(--muted-foreground);
  height: 32px;
  gap: 0;
}
.d-seg-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: 26px;
  padding: 0 10px;
  border-radius: 6px;
  background: transparent;
  border: 0;
  color: var(--muted-foreground);
  font: 500 13px/1 var(--font-sans);
  cursor: pointer;
  transition: background-color 150ms, color 150ms, box-shadow 150ms;
}
.d-seg-btn:hover { color: var(--foreground); }
.d-seg-btn.active {
  background: var(--background);
  color: var(--foreground);
  box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
}

/* --- Dashboard's d-* leftovers when its component still uses them -- */
.d-card {
  background: var(--card);
  color: var(--card-foreground);
  border-radius: 12px;
  box-shadow: 0 0 0 1px color-mix(in oklab, var(--foreground) 10%, transparent);
  overflow: hidden;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.d-card-title,
.d-card-title-amt {
  font: 500 16px/1.35 var(--font-sans);
  color: var(--foreground);
}
.d-pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  height: 20px;
  border-radius: 9999px;
  font: 500 12px/1 var(--font-sans);
  border: 1px solid transparent;
  background: var(--secondary);
  color: var(--secondary-foreground);
}
.d-pill-dot { display: none; }

/* Suppress old Routines del-* extras that fight shadcn defaults */
.del-tab-check {
  display: inline-flex; align-items: center; justify-content: center;
  width: 12px; height: 12px;
  border-radius: 9999px;
  background: var(--primary);
  color: var(--primary-foreground);
  margin-right: 2px;
}
.del-tab-check svg { width: 10px; height: 10px; }

/* ============================================================
   LEGACY DATA-TABLE PATTERN ALIASES (.d-table-card, .d-btn, etc)
   Maps the project's table-card pattern onto shadcn defaults.
   ============================================================ */

/* page heads */
.inv-page-head,
.ev-page-head,
.d-page-head,
.u-page-head,
.if-page-head,
.cs-page-head,
.tr-page-head,
.app-page-head,
.con-page-head,
.of-page-head,
.pf-page-head,
.rq-page-head,
.po-page-head,
.sp-head {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 0 12px;
  border: 0 !important;
  background: transparent !important;
}
.inv-page-head + *,
.ev-page-head + *,
.d-page-head + *,
.u-page-head + *,
.if-page-head + *,
.cs-page-head + *,
.tr-page-head + *,
.app-page-head + *,
.con-page-head + *,
.of-page-head + *,
.pf-page-head + *,
.rq-page-head + *,
.po-page-head + *,
.sp-head + * { margin-top: 0; }

.ev-page-title,
.inv-page-title,
.d-page-title,
.u-page-title,
.if-page-title,
.cs-page-title,
.tr-page-title,
.app-page-title,
.con-page-title,
.of-page-title,
.pf-page-title,
.rq-page-title,
.po-page-title,
.page-title,
.dash-title {
  font: 500 18px/1.2 var(--font-sans);
  color: var(--foreground);
  letter-spacing: -0.015em;
}

.inv-page-spacer,
.ev-page-spacer,
.d-page-spacer,
.u-page-spacer,
.if-page-spacer,
.cs-page-spacer,
.tr-page-spacer,
.app-page-spacer,
.con-page-spacer,
.of-page-spacer,
.pf-page-spacer,
.rq-page-spacer,
.po-page-spacer,
.sp-head-spacer { flex: 1; }

/* ---- .d-btn (alternate button class) → shadcn defaults ---- */
button.d-btn,
a.d-btn,
.d-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  white-space: nowrap;
  height: 32px;
  padding: 0 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--background);
  color: var(--foreground);
  font: 500 14px/1.2 var(--font-sans);
  cursor: pointer;
  outline: none;
  transition: background-color 150ms, color 150ms, border-color 150ms, box-shadow 150ms;
  text-decoration: none;
}
.d-btn:hover { background: var(--muted); }
.d-btn.dark,
.d-btn.primary,
.d-btn.solid {
  background: var(--primary);
  color: var(--primary-foreground);
  border-color: transparent;
}
.d-btn.dark:hover,
.d-btn.primary:hover,
.d-btn.solid:hover { background: color-mix(in oklab, var(--primary) 90%, transparent); }
.d-btn.outline { background: var(--background); color: var(--foreground); border-color: var(--border); }
.d-btn.outline:hover { background: var(--muted); }
.d-btn.ghost { background: transparent; border-color: transparent; color: var(--foreground); }
.d-btn.ghost:hover { background: var(--muted); }
.d-btn.sm { height: 28px; padding: 0 10px; font-size: 13px; }
.d-btn.xs { height: 24px; padding: 0 8px; font-size: 12px; border-radius: 6px; }
.d-btn svg { flex-shrink: 0; }

/* ---- table-card: container holding a toolbar + data table ----
   Tables are always rendered FLAT — no border, no card fill, no shadow.
   This applies globally to BOTH the legacy .d-table-card pattern and
   the shadcn <Card><Table /></Card> pattern. */
.d-card.d-table-card,
.d-table-card {
  background: transparent !important;
  color: var(--foreground);
  border: 0 !important;
  border-radius: 0 !important;
  box-shadow: none !important;
  padding: 0 !important;
  display: flex;
  flex-direction: column;
  gap: 0 !important;
}

/* toolbar inside table card — no separator border */
.d-table-toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 0 12px 0;
  border-bottom: 0;
  background: transparent !important;
}
.d-table-toolbar > * { margin: 0; }

/* search input */
.d-search {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 32px;
  padding: 0 10px;
  border: 1px solid var(--input);
  border-radius: 8px;
  background: var(--background);
  color: var(--foreground);
  min-width: 240px;
  flex-shrink: 0;
}
.d-search:focus-within { border-color: var(--ring); box-shadow: 0 0 0 3px color-mix(in oklab, var(--ring) 50%, transparent); }
.d-search svg { color: var(--muted-foreground); flex-shrink: 0; width: 14px; height: 14px; }
.d-search input,
.d-search-input {
  flex: 1;
  border: 0; outline: 0; background: transparent;
  font: 400 14px/1.2 var(--font-sans);
  color: var(--foreground);
  padding: 0;
  height: 100%;
  width: 100%;
}
.d-search input::placeholder,
.d-search-input::placeholder { color: var(--muted-foreground); }

/* spacer + filter chips inside toolbar */
.d-table-toolbar-spacer { flex: 1; }

/* the actual data table — shadcn-style flat table.
   Applies to BOTH .d-table (legacy) and any <Table /> via [data-slot="table"]. */
[data-slot="table-container"] {
  width: 100%;
  overflow-x: auto;
  background: transparent !important;
  border: 0 !important;
  box-shadow: none !important;
  border-radius: 0 !important;
}
.d-table,
table.d-table,
[data-slot="table"] {
  width: 100%;
  border-collapse: collapse;
  font: 400 14px/1.45 var(--font-sans);
  color: var(--foreground);
  background: transparent !important;
  border: 0 !important;
}
.d-table thead th,
.d-thead th,
.d-th,
tr.d-row > th,
[data-slot="table"] thead th,
[data-slot="table-head"] {
  height: 40px;
  padding: 0 12px;
  text-align: left;
  font: 500 13px/1 var(--font-sans);
  color: var(--muted-foreground);
  vertical-align: middle;
  white-space: nowrap;
  border-bottom: 1px solid var(--border);
  background: transparent !important;
}
.d-table tbody td,
.d-td,
tr.d-row > td,
[data-slot="table"] tbody td,
[data-slot="table-cell"] {
  padding: 12px;
  vertical-align: middle;
  white-space: nowrap;
  border-bottom: 1px solid var(--border);
  background: transparent;
}
.d-table tbody tr,
tr.d-row,
[data-slot="table"] tbody tr,
[data-slot="table-row"] {
  transition: background-color 150ms;
  background: transparent !important;
}
.d-table tbody tr:hover,
tr.d-row:hover,
[data-slot="table"] tbody tr:hover { background: color-mix(in oklab, var(--muted) 50%, transparent) !important; }
.d-table tbody tr:last-child td,
tr.d-row:last-child > td,
[data-slot="table"] tbody tr:last-child td { border-bottom: 0; }
/* Footer row (TableFooter) — subtle muted band, top divider, last-row cells get no bottom-border */
[data-slot="table-footer"] tr,
[data-slot="table"] tfoot tr {
  background: color-mix(in oklab, var(--muted) 50%, transparent) !important;
  font-weight: 500;
}
[data-slot="table-footer"] td,
[data-slot="table"] tfoot td {
  border-top: 1px solid var(--border);
  border-bottom: 0;
}
/* Caption — muted helper text under the table */
[data-slot="table-caption"] {
  caption-side: bottom;
  margin-top: 12px;
  color: var(--muted-foreground);
  font: 400 13px/1.4 var(--font-sans);
  text-align: center;
}

/* status pills used inside table cells */
.d-status,
.status-pill,
.tag-pill,
.ev-status,
.inv-status,
.con-status,
.app-status,
.u-role-pill,
.tr-status,
.pf-tag,
.rq-status {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  height: 20px;
  padding: 2px 8px;
  border-radius: 9999px;
  background: var(--secondary);
  color: var(--secondary-foreground);
  font: 500 12px/1 var(--font-sans);
  white-space: nowrap;
  border: 1px solid transparent;
  width: fit-content;
}
.d-status.ok,    .status-pill.ok,    .ev-status.ok,    .inv-status.paid,
.d-status.green, .status-pill.green, .pf-tag.preferred {
  background: color-mix(in oklab, oklch(0.65 0.18 150) 12%, transparent);
  color: oklch(0.45 0.16 150);
}
.d-status.warn,  .status-pill.warn,  .ev-status.warn,
.d-status.amber, .inv-status.due {
  background: color-mix(in oklab, oklch(0.75 0.16 70) 14%, transparent);
  color: oklch(0.45 0.14 60);
}
.d-status.danger,.status-pill.danger,.ev-status.danger,.inv-status.overdue {
  background: color-mix(in oklab, var(--destructive) 12%, transparent);
  color: var(--destructive);
}
.d-status.muted, .status-pill.muted,
.d-status.draft, .ev-status.draft, .inv-status.draft, .con-status.draft {
  background: var(--muted); color: var(--muted-foreground);
}

/* avatar pills */
.d-avatar, .u-avatar, .ev-avatar, .pf-avatar, .con-avatar {
  width: 28px; height: 28px; border-radius: 9999px;
  background: var(--muted); color: var(--muted-foreground);
  display: inline-flex; align-items: center; justify-content: center;
  font: 500 12px/1 var(--font-sans);
  flex-shrink: 0;
  overflow: hidden;
  position: relative;
}
.d-avatar::after, .u-avatar::after, .ev-avatar::after, .pf-avatar::after, .con-avatar::after {
  content: ""; position: absolute; inset: 0; border-radius: inherit;
  border: 1px solid var(--border); pointer-events: none; mix-blend-mode: darken;
}
.d-avatar img, .u-avatar img, .ev-avatar img, .pf-avatar img, .con-avatar img {
  width: 100%; height: 100%; object-fit: cover;
}

/* ---- generic page card -------- */
.d-card {
  background: var(--card);
  color: var(--card-foreground);
  border-radius: 12px;
  box-shadow: 0 0 0 1px color-mix(in oklab, var(--foreground) 10%, transparent);
  overflow: hidden;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  border: 0 !important;
}

/* user funnel + stat sub-cards (Users page) */
.u-grid-top { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; align-items: stretch; }
.u-grid-top > .u-funnel-card { grid-column: 1 / -1; }
.u-stats { display: contents; }
.u-stat { padding: 16px; }
.u-stat-label { font: 400 13px/1.35 var(--font-sans); color: var(--muted-foreground); }
.u-stat-value { font: 600 28px/1.1 var(--font-sans); color: var(--foreground); margin-top: 6px; }

/* funnel-chart card */
.u-funnel-card { padding: 16px; }
.u-funnel-head { display: flex; align-items: center; gap: 8px; }
.u-funnel-pick {
  display: inline-flex; align-items: center; gap: 6px;
  height: 28px; padding: 0 8px;
  border-radius: 6px; border: 1px solid var(--border);
  background: var(--background); color: var(--foreground);
  font: 500 13px/1 var(--font-sans); cursor: pointer;
}
.u-funnel-pick:hover { background: var(--muted); }

/* spaces-cards (Spaces page) */
.sp-card {
  background: var(--card);
  color: var(--card-foreground);
  border-radius: 12px;
  box-shadow: 0 0 0 1px color-mix(in oklab, var(--foreground) 10%, transparent);
  overflow: hidden;
  display: flex; flex-direction: column;
}
.sp-card-img { display: block; width: 100%; height: 140px; object-fit: cover; }
.sp-card-body { padding: 12px; display: flex; flex-direction: column; gap: 8px; }
.sp-card-name { font: 500 15px/1.3 var(--font-sans); color: var(--foreground); }
.sp-card-meta {
  display: flex; align-items: center; gap: 12px;
  font: 400 12px/1 var(--font-sans); color: var(--muted-foreground);
}
.sp-status { display: inline-flex; align-items: center; gap: 4px; }
.sp-status-dot { width: 6px; height: 6px; border-radius: 9999px; background: oklch(0.65 0.18 150); }
.sp-meta-item { display: inline-flex; align-items: center; gap: 4px; }
.sp-view-btn { width: 100%; }

.sp-office {
  background: var(--card);
  color: var(--card-foreground);
  border-radius: 12px;
  box-shadow: 0 0 0 1px color-mix(in oklab, var(--foreground) 10%, transparent);
  padding: 16px;
  margin-bottom: 16px;
}
.sp-office-head { display: flex; align-items: center; gap: 8px; }
.sp-office-name { font: 500 15px/1 var(--font-sans); color: var(--foreground); }
.sp-office-spacer { flex: 1; }
.sp-office-icon { color: var(--muted-foreground); }
.sp-office-sub {
  display: flex; align-items: center; gap: 12px;
  font: 400 12px/1 var(--font-sans); color: var(--muted-foreground);
  margin: 8px 0 16px;
}
.sp-office-loc { display: inline-flex; align-items: center; gap: 4px; }
.sp-mgr-list { display: inline-flex; gap: 6px; flex-wrap: wrap; }
.sp-mgr-pill {
  display: inline-flex; align-items: center;
  height: 20px; padding: 2px 8px;
  border-radius: 9999px;
  background: var(--secondary); color: var(--secondary-foreground);
  font: 500 12px/1 var(--font-sans);
}
.sp-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 12px;
}
.sp-toolbar { display: flex; align-items: center; gap: 8px; margin: 0 0 16px; }
.sp-search { min-width: 240px; }

/* misc small bits the pages use */
.d-stripe-empty { padding: 32px; text-align: center; color: var(--muted-foreground); }
.d-row-arrow { color: var(--muted-foreground); }

/* checkbox inside tables */
.d-row-check { width: 16px; height: 16px; }

/* dropdown / select look-alikes */
.d-dropdown,
.d-select {
  display: inline-flex; align-items: center; gap: 6px;
  height: 32px; padding: 0 10px;
  border: 1px solid var(--input);
  border-radius: 8px;
  background: var(--background);
  color: var(--foreground);
  font: 400 14px/1.2 var(--font-sans);
  cursor: pointer;
}
.d-dropdown:hover, .d-select:hover { background: var(--muted); }
.d-dropdown svg, .d-select svg { color: var(--muted-foreground); }

  <script type="text/babel">
// Liveline — live-animated line chart, canvas-based, 60fps lerp.
// Inspired by benji.org/liveline. Faked live ticks for demo realism.
const { useRef: useRefL, useEffect: useEffectL, useState: useStateL, useMemo: useMemoL } = React;

// Format helpers
function _fmtTime(d) { const h = d.getHours(), m = d.getMinutes(); return `${h}:${m.toString().padStart(2,'0')}`; }

// Parse CSS color to rgba parts via a temp element; handles var() too.
function _resolveColor(el, col) {
  if (!col) return [17,17,17,1];
  const probe = document.createElement('div');
  probe.style.color = col;
  probe.style.display = 'none';
  el.appendChild(probe);
  const c = getComputedStyle(probe).color;
  el.removeChild(probe);
  const m = c.match(/rgba?\(([^)]+)\)/);
  if (!m) return [17,17,17,1];
  const parts = m[1].split(',').map(s => parseFloat(s.trim()));
  if (parts.length === 3) parts.push(1);
  return parts;
}

function Liveline({
  data = [],                   // array of historical numbers
  value,                       // latest value (number)
  formatValue = v => v.toFixed(1),
  color = 'var(--foreground)',
  height = 220,
  fill = true,
  pulse = true,
  momentum = true,             // 'up' | 'down' | 'flat' | true
  showValue = false,
  windows = null,              // [{label, secs}]
  activeWindow = null,
  onWindowChange = null,
  paused = false,
  padding = { top: 14, right: 70, bottom: 28, left: 12 },
  gridLines = 4,
  xLabels = null,              // array of strings for x axis
  liveTickInterval = 1200,     // ms between fake ticks
  tickGen = null,              // (prevValue) => nextValue; default random walk
  ref: _ref,
}) {
  const wrapRef = useRefL(null);
  const canvasRef = useRefL(null);
  const dotRef = useRefL(null);
  const badgeRef = useRefL(null);
  const valueDomRef = useRefL(null);
  const arrowRef = useRefL(null);

  // Maintain the "live" series in a ref so rAF can read it without re-rendering.
  const stateRef = useRefL({
    histLen: data.length,
    // sliding live points appended beyond historical tail.
    points: [...data],          // full data buffer
    displayed: [...data],        // lerp-interpolated display buffer
    target: data[data.length - 1] ?? 0,
    display: data[data.length - 1] ?? 0,
    minTarget: 0, maxTarget: 1,
    minDisp: 0, maxDisp: 1,
    color: [17,17,17,1],
    fillColor: [17,17,17,0.06],
    momentum: 'flat',
    momentumPrev: 'flat',
    momentumFade: 1,            // 1 = fully visible
    pulsePhase: 0,
    paused: !!paused,
    lastTick: performance.now(),
    dpr: window.devicePixelRatio || 1,
    w: 0, h: 0,
  });
  const [, _force] = useStateL(0);
  const fmtRef = useRefL(formatValue);
  useEffectL(() => { fmtRef.current = formatValue; }, [formatValue]);

  // Resolve color once mounted.
  useEffectL(() => {
    const s = stateRef.current;
    const wrap = wrapRef.current;
    if (!wrap) return;
    s.color = _resolveColor(wrap, color);
    // fill = same color with low alpha
    s.fillColor = [s.color[0], s.color[1], s.color[2], 0.08];
  }, [color]);

  // Keep paused in sync.
  useEffectL(() => { stateRef.current.paused = !!paused; }, [paused]);

  // When `data` prop changes (user switches series / time window), reset the live buffer.
  useEffectL(() => {
    const s = stateRef.current;
    s.points = [...data];
    s.displayed = [...data];
    s.histLen = data.length;
    const last = data[data.length - 1] ?? 0;
    s.target = last;
    s.display = last;
    s.momentum = 'flat';
  }, [data.length, data.join('|')]);

  // Fake live ticking — append a new point every liveTickInterval ms.
  useEffectL(() => {
    let raf;
    const loop = (t) => {
      const s = stateRef.current;
      if (!s.paused && t - s.lastTick > liveTickInterval) {
        s.lastTick = t;
        const prev = s.target;
        const next = tickGen ? tickGen(prev) : (() => {
          const vol = Math.max(0.8, Math.abs(prev) * 0.006);
          return Math.max(0, prev + (Math.random() - 0.5) * vol * 2);
        })();
        s.points.push(next);
        s.displayed.push(s.display); // grow display buffer
        // Keep a reasonable max length
        const max = 200;
        if (s.points.length > max) { s.points = s.points.slice(-max); s.displayed = s.displayed.slice(-max); }
        s.target = next;
        // Momentum
        const prevMom = s.momentum;
        const delta = next - prev;
        const newMom = Math.abs(delta) < Math.max(0.01, Math.abs(prev) * 0.0008) ? 'flat' : (delta > 0 ? 'up' : 'down');
        if (newMom !== prevMom) { s.momentumPrev = prevMom; s.momentumFade = 0; }
        s.momentum = newMom;
      }
      raf = requestAnimationFrame(loop);
    };
    raf = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(raf);
  }, [liveTickInterval, tickGen]);

  // Draw loop
  useEffectL(() => {
    const wrap = wrapRef.current;
    const canvas = canvasRef.current;
    if (!wrap || !canvas) return;
    const ctx = canvas.getContext('2d');
    let raf;

    const resize = () => {
      const s = stateRef.current;
      const rect = wrap.getBoundingClientRect();
      s.w = Math.max(100, rect.width);
      s.h = height;
      s.dpr = window.devicePixelRatio || 1;
      canvas.width = Math.round(s.w * s.dpr);
      canvas.height = Math.round(s.h * s.dpr);
      canvas.style.width = s.w + 'px';
      canvas.style.height = s.h + 'px';
      ctx.setTransform(s.dpr, 0, 0, s.dpr, 0, 0);
    };
    resize();
    const ro = new ResizeObserver(resize);
    ro.observe(wrap);

    const lerp = (a, b, k) => a + (b - a) * k;
    const LERP = 0.08;

    const draw = () => {
      const s = stateRef.current;
      const { w, h, color: rgba, fillColor } = s;
      const pts = s.points;
      const disp = s.displayed;
      const n = pts.length;
      if (n < 2) { raf = requestAnimationFrame(draw); return; }

      // Lerp displayed toward actual.
      for (let i = 0; i < n; i++) {
        disp[i] = lerp(disp[i] ?? pts[i], pts[i], LERP);
      }
      s.display = lerp(s.display, s.target, LERP);

      // Compute Y range from displayed (so the chart breathes smoothly).
      let mn = Infinity, mx = -Infinity;
      for (let i = 0; i < n; i++) { const v = disp[i]; if (v < mn) mn = v; if (v > mx) mx = v; }
      // Pad range 8% both sides.
      const pad = Math.max((mx - mn) * 0.1, 0.001);
      mn -= pad; mx += pad;
      // Lerp the on-screen range.
      s.minDisp = isFinite(s.minDisp) ? lerp(s.minDisp, mn, LERP) : mn;
      s.maxDisp = isFinite(s.maxDisp) ? lerp(s.maxDisp, mx, LERP) : mx;
      // Hard snap outward to never clip.
      if (mn < s.minDisp) s.minDisp = mn;
      if (mx > s.maxDisp) s.maxDisp = mx;
      const rng = Math.max(s.maxDisp - s.minDisp, 0.001);

      const P = padding;
      const left = P.left, right = w - P.right, top = P.top, bottom = h - P.bottom;
      const plotW = right - left, plotH = bottom - top;

      const xAt = (i) => left + (i / (n - 1)) * plotW;
      const yAt = (v) => top + (1 - (v - s.minDisp) / rng) * plotH;

      ctx.clearRect(0, 0, w, h);

      // Grid
      ctx.save();
      ctx.strokeStyle = 'rgba(0,0,0,0.06)';
      ctx.lineWidth = 1;
      for (let i = 0; i <= gridLines; i++) {
        const y = top + (i / gridLines) * plotH;
        ctx.beginPath();
        if (i === gridLines) {
          ctx.setLineDash([]);
          ctx.strokeStyle = 'rgba(0,0,0,0.12)';
        } else {
          ctx.setLineDash([2, 4]);
          ctx.strokeStyle = 'rgba(0,0,0,0.08)';
        }
        ctx.moveTo(left, y); ctx.lineTo(right, y); ctx.stroke();
      }
      ctx.setLineDash([]);
      ctx.restore();

      // Y axis labels (right side)
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.font = '11px ui-sans-serif, system-ui, -apple-system, Inter, sans-serif';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'middle';
      for (let i = 0; i <= gridLines; i++) {
        const frac = i / gridLines;
        const v = s.maxDisp - frac * rng;
        const y = top + frac * plotH;
        ctx.fillText(fmtRef.current(v), right + 8, y);
      }
      ctx.restore();

      // Fill gradient
      if (fill) {
        const grad = ctx.createLinearGradient(0, top, 0, bottom);
        grad.addColorStop(0, `rgba(${rgba[0]},${rgba[1]},${rgba[2]},0.16)`);
        grad.addColorStop(1, `rgba(${rgba[0]},${rgba[1]},${rgba[2]},0)`);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.moveTo(xAt(0), bottom);
        for (let i = 0; i < n; i++) {
          if (i === 0) ctx.lineTo(xAt(i), yAt(disp[i]));
          else {
            const x1 = xAt(i - 1), y1 = yAt(disp[i - 1]);
            const x2 = xAt(i), y2 = yAt(disp[i]);
            const cx = (x1 + x2) / 2;
            ctx.quadraticCurveTo(cx, y1, cx, (y1 + y2) / 2);
            ctx.lineTo(x2, y2);
          }
        }
        ctx.lineTo(xAt(n - 1), bottom);
        ctx.closePath();
        ctx.fill();
      }

      // Line
      ctx.strokeStyle = `rgba(${rgba[0]},${rgba[1]},${rgba[2]},1)`;
      ctx.lineWidth = 2;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      ctx.beginPath();
      for (let i = 0; i < n; i++) {
        const x = xAt(i), y = yAt(disp[i]);
        if (i === 0) ctx.moveTo(x, y);
        else {
          const x1 = xAt(i - 1), y1 = yAt(disp[i - 1]);
          const cx = (x1 + x) / 2;
          ctx.quadraticCurveTo(cx, y1, cx, (y1 + y) / 2);
          ctx.lineTo(x, y);
        }
      }
      ctx.stroke();

      // Live dot
      const lx = xAt(n - 1), ly = yAt(disp[n - 1]);
      // Pulsing halo
      if (pulse) {
        s.pulsePhase = (s.pulsePhase + 0.025) % 1;
        const p = s.pulsePhase;
        ctx.beginPath();
        ctx.arc(lx, ly, 4 + p * 14, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${rgba[0]},${rgba[1]},${rgba[2]},${0.32 * (1 - p)})`;
        ctx.fill();
      }
      // Dot
      ctx.beginPath();
      ctx.arc(lx, ly, 4, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${rgba[0]},${rgba[1]},${rgba[2]},1)`;
      ctx.fill();
      ctx.beginPath();
      ctx.arc(lx, ly, 2, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();

      // Position badge (DOM) next to dot
      if (badgeRef.current) {
        badgeRef.current.style.transform = `translate(${Math.round(right + 6)}px, ${Math.round(ly - 11)}px)`;
        const mom = s.momentum;
        if (mom === 'up') {
          badgeRef.current.style.background = 'color-mix(in oklab, var(--positive-primary) 12%, #fff)';
          badgeRef.current.style.color = 'var(--positive-primary)';
          badgeRef.current.style.borderColor = 'color-mix(in oklab, var(--positive-primary) 30%, transparent)';
        } else if (mom === 'down') {
          badgeRef.current.style.background = 'color-mix(in oklab, var(--alert-primary) 12%, #fff)';
          badgeRef.current.style.color = 'var(--alert-primary)';
          badgeRef.current.style.borderColor = 'color-mix(in oklab, var(--alert-primary) 30%, transparent)';
        } else {
          badgeRef.current.style.background = '#fff';
          badgeRef.current.style.color = 'var(--foreground)';
          badgeRef.current.style.borderColor = 'var(--border)';
        }
      }
      if (valueDomRef.current) {
        valueDomRef.current.textContent = fmtRef.current(s.display);
      }
      if (arrowRef.current && momentum) {
        // Fade in new direction
        s.momentumFade = Math.min(1, s.momentumFade + 0.04);
        const fade = s.momentumFade;
        arrowRef.current.style.opacity = fade;
        arrowRef.current.style.transform = `translateY(${(1 - fade) * 4}px)`;
        arrowRef.current.textContent = s.momentum === 'up' ? '↑' : s.momentum === 'down' ? '↓' : '·';
        arrowRef.current.style.color = s.momentum === 'up' ? 'var(--positive-primary)' : s.momentum === 'down' ? 'var(--alert-primary)' : 'var(--muted-foreground)';
      }

      raf = requestAnimationFrame(draw);
    };
    raf = requestAnimationFrame(draw);

    return () => { cancelAnimationFrame(raf); ro.disconnect(); };
  }, [height, fill, pulse, momentum, gridLines]);

  return (
    <div ref={wrapRef} className="liveline" style={{position:'relative', width:'100%', height}}>
      <canvas ref={canvasRef} style={{display:'block', width:'100%', height:'100%'}} />
      <div
        ref={badgeRef}
        className="liveline-badge"
        style={{
          position:'absolute', top:0, left:0,
          padding:'3px 7px', borderRadius: 6, border:'1px solid var(--border)',
          background:'#fff', color:'var(--foreground)',
          font:'500 11px/1 var(--font-sans)',
          display:'inline-flex', alignItems:'center', gap:4,
          willChange:'transform', pointerEvents:'none',
          boxShadow:'0 1px 2px rgba(0,0,0,0.04)',
        }}>
        {momentum && <span ref={arrowRef} style={{fontSize:11, lineHeight:1, transition:'opacity .2s ease'}}>·</span>}
        <span ref={valueDomRef}>{formatValue(value ?? 0)}</span>
      </div>
    </div>
  );
}

// Time window chips (separate for layout flexibility)
function LivelineWindows({ windows, active, onChange, variant = 'rounded' }) {
  if (!windows) return null;
  return (
    <div className={`ll-windows ll-windows-${variant}`}>
      {windows.map(w => (
        <button key={w.secs} data-active={active === w.secs}
                onClick={() => onChange && onChange(w.secs)}>
          {w.label}
        </button>
      ))}
    </div>
  );
}

window.Liveline = Liveline;
window.LivelineWindows = LivelineWindows;

</script>
  <script type="text/babel">
// ShadcnChart — shadcn/ui "chart-line-interactive" port.
// Header strip with metric pill buttons (total + label, active highlight),
// body holds a Recharts LineChart with grid + x-axis + tooltip.
// Mirrors: https://ui.shadcn.com/charts/line#chart-line-interactive
//
// Props:
//   metrics        Array<{ id, label, value (string, already-formatted total/current), delta?, trend? }>
//   activeId       currently selected metric id
//   onActive       (id) => void
//   data           Array<{ date: string ISO, [metricId]: number }>
//   valueFormatter (v, metricId) => string     — for tooltip
//   headerTitle    string (optional — shadcn shows a title; we reuse period label)
//   headerDesc     string (optional)
//   color          CSS color for the line (default var(--chart-2))
//   height         px (default 280)

const { useState: useStateSC, useMemo: useMemoSC } = React;

function ShadcnChart({
  metrics = [],
  activeId,
  onActive,
  data = [],
  valueFormatter = (v) => String(v),
  headerTitle = '',
  headerDesc = '',
  headerRight = null,
  recap = null,
  color = 'var(--chart-2)',
  height = 280,
  footer = null,
  overlayKeys = null,           // [{id, label, color}] — drawn as faint lines behind active line
  tooltipBreakdown = null,      // (activeId, row) => Array<{label, value, contribution?, color}>
}) {
  const _R = window.Recharts || {};
  const _RC = _R.ResponsiveContainer;
  const _LC = _R.LineChart;
  const _Ln = _R.Line;
  const _CG = _R.CartesianGrid;
  const _XA = _R.XAxis;
  const _TT = _R.Tooltip;

  if (!_LC) {
    return (
      <div className="sc-card" style={{ height: height + 120, display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--muted-foreground)', font: 'var(--text-body-sm)' }}>
        Loading chart…
      </div>
    );
  }

  const tickFormatter = (value) => {
    const d = new Date(value);
    if (isNaN(d.getTime())) return value;
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  };

  const tooltipLabelFormatter = (value) => {
    const d = new Date(value);
    if (isNaN(d.getTime())) return value;
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  };

  const activeMeta = metrics.find(m => m.id === activeId) || metrics[0];

  return (
    <div className="sc-card">
      {/* HEADER: vitals tabs */}
      <div className="sc-card-header sc-vitals-header" data-count={metrics.length}>
        {metrics.map((m) => {
          const isActive = m.id === activeId;
          return (
            <button
              key={m.id}
              type="button"
              data-active={isActive}
              data-hero={m.id === 'prog'}
              className="sc-tab sc-vital-tab"
              onClick={() => onActive && onActive(m.id)}
            >
              <span className="sc-tab-label">{m.label}</span>
              <span className="sc-tab-value">
                {m.value}
                {m.delta && (
                  <span className={`sc-tab-trend ${m.trend === 'dn' ? 'down' : 'up'}`}>
                    {m.trend === 'dn' ? '−' : '+'}{m.delta}
                  </span>
                )}
              </span>
            </button>
          );
        })}
      </div>

      {/* CHART */}
      <div className="sc-card-content" style={{ height }}>
        <_RC width="100%" height="100%">
          <_LC
            data={data}
            margin={{ top: 12, right: 12, left: 12, bottom: 0 }}
          >
            <_CG
              vertical={false}
              stroke="var(--border)"
              strokeDasharray="3 3"
            />
            <_XA
              dataKey="date"
              tickLine={false}
              axisLine={false}
              tickMargin={8}
              minTickGap={32}
              tickFormatter={tickFormatter}
              tick={{ fill: 'var(--muted-foreground)', fontSize: 11, fontFamily: 'var(--font-sans)' }}
            />
            <_TT
              cursor={{ stroke: 'var(--border)', strokeWidth: 1 }}
              content={({ active, payload, label }) => {
                if (!active || !payload || !payload.length) return null;
                const row = payload[0]?.payload;
                return (
                  <div className="sc-tooltip">
                    <div className="sc-tooltip-label">{tooltipLabelFormatter(label)}</div>
                    {metrics.map(m => {
                      const val = row?.[m.id];
                      if (val == null) return null;
                      const isActive = m.id === activeId;
                      return (
                        <div key={m.id} className="sc-tooltip-row" data-active={isActive}>
                          <span className="sc-tooltip-swatch" style={{ background: isActive ? color : (m.color || 'var(--muted-foreground)') }} />
                          <span className="sc-tooltip-name">{m.label}</span>
                          <span className="sc-tooltip-value">{valueFormatter(val, m.id)}</span>
                        </div>
                      );
                    })}
                  </div>
                );

  <script type="text/babel">
// Topbar — breadcrumbs + right-side controls
function Topbar({ section, onToggleSidebar, right, showSidebarToggle = true, minimizeMode = false, homeCrumb = null, title = null }) {
  // Crumbs
  const adminCrumb = (cur) =>
  <div className="crumb">
      <span>Admin</span>
      <I.chevron size={12} className="sep" />
      <span className="cur">{title || cur}</span>
    </div>;

  const routinesCrumb =
  <div className="crumb">
      <span className="cur">Routines <I.chevronDown size={12} /></span>
    </div>;


  let crumbs = null;
  if (homeCrumb) {
    // homeCrumb is an array of segments. Last is current; one before it (with onBack) is the back target.
    const segs = Array.isArray(homeCrumb) ? homeCrumb : [{ label: homeCrumb.root, onBack: homeCrumb.onBack }, ...(homeCrumb.cur ? [{ label: homeCrumb.cur }] : [])];
    // Find the last segment with an onBack (immediate parent of current).
    let backIdx = -1;
    for (let i = segs.length - 2; i >= 0; i--) {if (segs[i].onBack) {backIdx = i;break;}}
    const canBack = backIdx >= 0;
    const backFn = canBack ? segs[backIdx].onBack : null;
    crumbs =
    <div className={`crumb ${canBack ? 'has-back' : ''}`}
    onClick={canBack ? backFn : undefined}
    style={canBack ? { cursor: 'pointer' } : undefined}>
        {segs.map((s, i) => {
        const isLast = i === segs.length - 1;
        const isBackTarget = i === backIdx;
        return (
          <React.Fragment key={i}>
              {i > 0 && <I.chevron size={12} className="sep" />}
              {isLast ?
            <span className="cur">{s.label}</span> :
            isBackTarget ?
            <button className="crumb-parent" onClick={(e) => {e.stopPropagation();s.onBack && s.onBack();}} title={`Back to ${s.label}`}>
                  <I.chevron size={12} className="back-ico" style={{ transform: 'rotate(180deg)' }} />
                  <span className="txt">{s.label}</span>
                </button> :

            s.onBack ?
            <button className="crumb-seg" onClick={(e) => {e.stopPropagation();s.onBack();}}>{s.label}</button> :
            <span>{s.label}</span>
            }
            </React.Fragment>);

      })}
      </div>;

  } else
  if (section === 'routines') crumbs = routinesCrumb;else
  if (section === 'policies') crumbs = adminCrumb('Policies');else
  if (section === 'insights') crumbs = adminCrumb('Insights');else
  if (section === 'scheduled') crumbs = adminCrumb('Scheduled');else
  crumbs = adminCrumb(section.charAt(0).toUpperCase() + section.slice(1));

  return (
    <div className="topbar" style={{ padding: "0px 8px 0px 14px" }}>
      <div className="tb-left">
        {showSidebarToggle &&
        <button className="icon-btn" onClick={onToggleSidebar} title={minimizeMode ? 'Minimize page' : 'Toggle sidebar'}>
            {minimizeMode ? <I.minimize size={16} /> : <I.sidebar size={16} />}
          </button>
        }
        {crumbs}
      </div>
      <div className="tb-right">
        {right || null}
      </div>
    </div>);

}

window.Topbar = Topbar;
</script>

  const whenText = prefs.scheduleKind && prefs.scheduleLabel
    ? prefs.scheduleKind === 'Time'
      ? `${prefs.scheduleLabel}${prefs.scheduleTime ? ' · ' + prefs.scheduleTime : ''}`
      : `Trigger · ${prefs.scheduleLabel}`
    : '';
  const scopeText = prefs.scope || '';
  const doText = prefs.desc.trim() || '';
  const sendText = (prefs.delivery && prefs.delivery.length > 0 && prefs.delivery.every(d => (prefs.recipients?.[d] || '').trim()))
    ? prefs.delivery.map(d => `${d} → ${prefs.recipients[d]}`).join(' · ')
    : '';

  const filledCount = [whenText, scopeText, doText, sendText].filter(Boolean).length;
  const canSave = !!prefs.name.trim() && filledCount === 4;

  const save = () => {
    if (!canSave) return;
    setSaved(true);
    if (onSave) onSave({
      id: initialRoutine?.id || ('r' + Date.now()),
      name: prefs.name,
      desc: prefs.desc.length > 70 ? prefs.desc.slice(0, 67) + '…' : prefs.desc,
      scope: prefs.scope === 'Company' ? 'Admin' : prefs.scope,
      schedule: prefs.scheduleLabel + (prefs.scheduleKind === 'Time' ? '' : ' · trigger'),
      delivery: prefs.delivery.length > 1 ? `${prefs.delivery.length} channels` : (prefs.delivery[0] === 'In-app' ? 'Inbox' : prefs.delivery[0] || 'Email'),
      next: initialRoutine?.next || 'Next in 4 days',
      on: initialRoutine ? initialRoutine.on : true,
      _raw: { ...prefs },
    });
  };

  React.useEffect(() => {
    window.__routinesChatSave = save;
    window.__routinesChatCancel = onClose;
    window.__routinesChatSaved = saved;
    window.__routinesChatCanSave = canSave;
    window.dispatchEvent(new CustomEvent('routines-chat-state'));
    return () => {
      delete window.__routinesChatSave;
      delete window.__routinesChatCancel;
      delete window.__routinesChatSaved;
      delete window.__routinesChatCanSave;
      window.dispatchEvent(new CustomEvent('routines-chat-state'));
    };
  }, [saved, prefs, canSave]);

  // ── Magic fill: parse the prompt into the cards ───────────
  const magicFill = () => {
    const t = prefs.desc.toLowerCase();
    const next = { ...prefs };
    if (!next.name && t) next.name = next.desc.split(/[,.]/)[0].slice(0, 40).replace(/^./, c => c.toUpperCase());
    // Schedule
    if (/(every|weekly|monthly|daily|each|on the)/.test(t)) {
      next.scheduleKind = 'Time';
      if (/monthly|1st|first of/.test(t)) next.scheduleLabel = 'Monthly (1st)';
      else if (/weekly|every (mon|tue|wed|thu|fri|sat|sun)/.test(t)) next.scheduleLabel = 'Weekly';
      else if (/daily/.test(t)) next.scheduleLabel = 'Daily';
      else next.scheduleLabel = 'Weekly';
      const m = t.match(/(\d{1,2})\s*(am|pm)/);
      next.scheduleTime = m ? `${m[1]}:00 ${m[2].toUpperCase()}` : '9:00 AM';
    } else if (/(when|on (event|approval)|after|before)/.test(t)) {
      next.scheduleKind = 'Trigger';
      next.scheduleLabel = 'When event is approved';
    }
    // Scope
    if (/company|whole|all events/.test(t)) next.scope = /company|whole/.test(t) ? 'Company' : 'All events';
    else if (/specific|this event|one event/.test(t)) next.scope = 'Specific event';
    else next.scope = 'All events';
    // Delivery
    next.recipients = { ...(next.recipients || { Email: '', 'In-app': '', Slack: '' }) };
    if (/slack|#/.test(t)) { next.delivery = ['Slack']; if (!next.recipients.Slack) next.recipients.Slack = '#routines'; }
    else if (/in.?app|inbox|notify/.test(t)) { next.delivery = ['In-app']; if (!next.recipients['In-app']) next.recipients['In-app'] = 'You'; }
    else { next.delivery = ['Email']; if (!next.recipients.Email) next.recipients.Email = 'dennis@planned.com'; }
    setPrefs(next);
    setLastFilledPrompt(next.desc);
    closeAll();
  };

  // ── Example presets ──────────────────────────────────────
  const whenExamples = [
    { label: 'Every Friday 9am', val: { scheduleKind: 'Time', scheduleLabel: 'Weekly (Fri)', scheduleTime: '9:00 AM' } },
    { label: '1st of month', val: { scheduleKind: 'Time', scheduleLabel: 'Monthly (1st)', scheduleTime: '8:00 AM' } },
    { label: 'When event approved', val: { scheduleKind: 'Trigger', scheduleLabel: 'When event is approved', scheduleTime: '' } },
    { label: '7 days before kickoff', val: { scheduleKind: 'Trigger', scheduleLabel: '7 days before event start', scheduleTime: '' } },
  ];
  const scopeExamples = [
    { label: 'Whole company', val: { scope: 'Company' } },
    { label: 'My events', val: { scope: 'All events' } },
    { label: 'A specific event', val: { scope: 'Specific event' } },
  ];
  const doExamples = [
    { label: 'Summarize pending approvals', val: { desc: 'Summarize all events pending approval and flag the most urgent.' } },
    { label: 'Aggregate spend vs last period', val: { desc: 'Aggregate spend across all events and compare to the previous period.' } },
    { label: 'Flag missing 3 quotes', val: { desc: 'List events whose RFPs are missing 3 vendor quotes.' } },
    { label: 'Daily hot topics digest', val: { desc: 'Recap the top 5 trending topics across all events in the last 24 hours.' } },
  ];
  const sendExamples = [
    { label: 'Email me', val: { delivery: ['Email'], recipients: { Email: 'dennis@planned.com', 'In-app': '', Slack: '' } } },
    { label: 'Slack #ops', val: { delivery: ['Slack'], recipients: { Email: '', 'In-app': '', Slack: '#ops' } } },
    { label: 'In-app inbox', val: { delivery: ['In-app'], recipients: { Email: '', 'In-app': 'You', Slack: '' } } },
  ];

  // ── Routine templates ─────────────────────────────────────
  const templates = [
    {
      icon: I.approvals,
      title: 'Weekly approvals digest',
      desc: 'Friday recap of every event pending approval',
      apply: {
        name: 'Weekly approvals digest',
        desc: 'Every Friday 9am, summarize all events pending approval and flag the most urgent.',
        scheduleKind: 'Time', scheduleLabel: 'Weekly (Fri)', scheduleTime: '9:00 AM',
        scope: 'All events',
        delivery: ['Email'], recipients: { Email: 'dennis@planned.com', 'In-app': '', Slack: '' },
      },
    },
    {
      icon: I.budget,
      title: 'Monthly spend recap',
      desc: 'Aggregate spend vs. last period on the 1st',
      apply: {
        name: 'Monthly spend recap',
        desc: 'On the 1st of each month, aggregate spend across all events and compare to the previous period.',
        scheduleKind: 'Time', scheduleLabel: 'Monthly (1st)', scheduleTime: '8:00 AM',
        scope: 'Company',
        delivery: ['Email'], recipients: { Email: 'finance@planned.com', 'In-app': '', Slack: '' },
      },
    },
    {
      icon: I.alert,
      title: 'RFP gap detector',
      desc: 'Flag events missing the required 3 quotes',
      apply: {
        name: 'RFP gap detector',
        desc: 'List events whose RFPs are missing 3 vendor quotes and notify the owner.',
        scheduleKind: 'Trigger', scheduleLabel: 'When RFP is opened', scheduleTime: '',
        scope: 'All events',
        delivery: ['Slack'], recipients: { Email: '', 'In-app': '', Slack: '#sourcing' },
      },
    },
    {
      icon: I.bell,
      title: 'Approval nudge',
      desc: 'Remind approvers 48h after request',
      apply: {
        name: 'Approval nudge',
        desc: 'Nudge approvers if an approval has been pending for more than 48 hours.',
        scheduleKind: 'Trigger', scheduleLabel: '48h after approval request', scheduleTime: '',
        scope: 'Company',
        delivery: ['In-app'], recipients: { Email: '', 'In-app': 'Approvers', Slack: '' },
      },
    },
    {
      icon: I.feed,
      title: 'New event briefing',
      desc: 'Welcome brief sent when an event is created',
      apply: {
        name: 'New event briefing',
        desc: 'When a new event is created, send the organizer a briefing with policies and next steps.',
        scheduleKind: 'Trigger', scheduleLabel: 'When event is created', scheduleTime: '',
        scope: 'All events',
        delivery: ['Email'], recipients: { Email: 'Organizer', 'In-app': '', Slack: '' },
      },
    },
  ];
  const applyTemplate = (tpl) => { setPrefs(p => ({ ...p, ...tpl.apply })); setActiveTemplate(tpl); setLastFilledPrompt(tpl.apply.desc || ''); closeAll(); };
  const resetForm = () => {
    setPrefs({
      name: '', desc: '', scheduleKind: '', scheduleLabel: '', scheduleTime: '',
      scope: '', delivery: [], recipients: { Email: '', 'In-app': '', Slack: '' },
    });
    setActiveTemplate(null);
    setLastFilledPrompt('');
    closeAll();
    setTimeout(() => nameInputRef.current && nameInputRef.current.focus(), 50);
  };

  return (
    <div className="rt-solo">
      <div className="pref rt-solo-body rt-recipe">
        {/* Templates row — sits above all, full width */}
        {false && activeTemplate && (
          <div className="rt-active-tpl">
            <div className="rt-active-tpl-ico"><activeTemplate.icon size={13} /></div>
            <div className="rt-active-tpl-text">
              <span className="rt-active-tpl-label">Filled from template</span>
              <span className="rt-active-tpl-name">{activeTemplate.title}</span>
            </div>
            <button type="button" className="rt-active-tpl-reset" onClick={resetForm}>
              <I.refresh size={11} /> Reset
            </button>
          </div>
        )}
        <div className="rt-tpl-top">
          <div className="rt-tpl-top-head">
            <div className="rt-tpl-top-label">Start from a template</div>
            <div className="rt-tpl-nav">
              <button type="button" className="rt-tpl-nav-btn" aria-label="Previous"
                onClick={(e) => { const r = e.currentTarget.closest('.rt-tpl-top').querySelector('.rt-tpl-scroll'); r && r.scrollBy({ left: -260, behavior: 'smooth' }); }}>
                <I.chevron size={12} style={{transform: 'rotate(180deg)'}} />
              </button>
              <button type="button" className="rt-tpl-nav-btn" aria-label="Next"
                onClick={(e) => { const r = e.currentTarget.closest('.rt-tpl-top').querySelector('.rt-tpl-scroll'); r && r.scrollBy({ left: 260, behavior: 'smooth' }); }}>
                <I.chevron size={12} />
              </button>
            </div>
          </div>
          <div className="rt-tpl-scroll">
            {templates.map((t, i) => {
              const isActive = activeTemplate && activeTemplate.title === t.title;
              return (
                <button key={i} type="button" className={`rt-tpl ${isActive ? 'active' : ''}`} onClick={() => applyTemplate(t)}>
                  <div className="rt-tpl-ico"><t.icon size={14} /></div>
                  <div className="rt-tpl-text">
                    <div className="rt-tpl-title">{t.title}</div>
                    <div className="rt-tpl-desc">{t.desc}</div>
                  </div>
                  {isActive && <div className="rt-tpl-check"><I.check size={11} /></div>}
                </button>
              );
            })}
          </div>
        </div>

        <div className="rt-hr" />

        {/* Name */}
        <div className="rt-name-block">
          <input value={prefs.name} onChange={(e) => set({ name: e.target.value })}
            ref={nameInputRef}
            placeholder="Untitled routine"
            className="rt-name-input" />
          <div className="rt-anatomy">
            A routine fires on a <b>schedule</b>, over a <b>scope</b>, runs a <b>task</b>, and delivers to a <b>destination</b>.
          </div>
        </div>

        {/* Describe + send → fills the recipe below */}
        <div className={`rt-prompt ${activeTemplate ? 'has-tpl' : ''}`}>
          {activeTemplate && (
            <div className="rt-prompt-tpl">
              <div className="rt-prompt-tpl-ico"><activeTemplate.icon size={11} /></div>
              <span className="rt-prompt-tpl-label">Filled from template</span>
              <span className="rt-prompt-tpl-name">{activeTemplate.title}</span>
              <button type="button" className="rt-prompt-tpl-reset" onClick={resetForm}>
                <I.close size={10} /> Reset
              </button>
            </div>
          )}
          <div className="rt-prompt-input">
            <I.sparkle size={13} className="rt-prompt-spark" />
            <textarea className="rt-magic-input" value={prefs.desc}
              onChange={(e) => set({ desc: e.target.value })}
              onKeyDown={(e) => {
                if ((e.key === 'Enter' && (e.metaKey || e.ctrlKey)) || (e.key === 'Enter' && !e.shiftKey)) {
                  e.preventDefault();
                  if (prefs.desc.trim() && prefs.desc.trim() !== lastFilledPrompt.trim()) magicFill();
                }
              }}
              rows={2}
              placeholder="Describe your routine — e.g. 'Every Friday 9am, send me events pending approval'" />
            <button type="button" className="rt-prompt-send"
              disabled={!prefs.desc.trim() || prefs.desc.trim() === lastFilledPrompt.trim()}
              onClick={magicFill}
              aria-label="Generate recipe">
              <I.arrowUp size={13} />
            </button>
          </div>
          <div className="rt-prompt-hint">Press Enter to populate the fields below — or fill them yourself.</div>
        </div>

        {/* Recipe cards — the form */}
        <div className="rt-recipe-list">
          <RecipeCard
            icon={I.clock}
            label="When it runs"
            valueText={whenText}
            expanded={open.when}
            onToggle={() => toggle('when')}
            examples={whenExamples}
            onPickExample={(ex) => { set(ex.val); closeAll(); }}
          >
            <div className="tabs" style={{marginBottom: 10}}>
              {['Time', 'Trigger'].map(k => (
                <button key={k} className={`tab ${prefs.scheduleKind === k ? 'active' : ''}`}
                  onClick={() => set({ scheduleKind: k })}>
                  {k === 'Time' ? <I.clock size={12} /> : <I.bolt size={12} />} {k}
                </button>
              ))}
            </div>
            {prefs.scheduleKind && (
              <div className="fld-row">
                <div className="fld"><I.calendar size={12} />
                  <input value={prefs.scheduleLabel} onChange={(e) => set({ scheduleLabel: e.target.value })}
                    placeholder={prefs.scheduleKind === 'Time' ? 'Daily, Weekly, Monthly…' : 'When event is created…'}
                    style={{border:'none', outline:'none', background:'transparent', flex:1, font:'400 12.5px/1 var(--font-sans)'}} />
                </div>
                {prefs.scheduleKind === 'Time' && (
                  <div className="fld"><I.clock size={12} />
                    <input value={prefs.scheduleTime} onChange={(e) => set({ scheduleTime: e.target.value })}
                      placeholder="9:00 AM"
                      style={{border:'none', outline:'none', background:'transparent', flex:1, font:'400 12.5px/1 var(--font-sans)'}} />
                  </div>
                )}
              </div>
            )}
            <div className="rc-foot">
              <button className="btn ghost sm" onClick={() => toggle('when')}>Done</button>
            </div>
          </RecipeCard>

          <RecipeCard
            icon={I.shield}
            label="What it covers"
            valueText={scopeText}
            expanded={open.scope}
            onToggle={() => toggle('scope')}
            examples={scopeExamples}
            onPickExample={(ex) => { set(ex.val); closeAll(); }}
          >
            <div className="radio-grp">
              {[
                { id: 'Company', t: 'Whole company', d: 'Applies across all events in the company', adm: true },
                { id: 'All events', t: 'My events', d: 'Applies to every event you own' },
                { id: 'Specific event', t: 'Specific event', d: 'Pick one or more events' },
              ].map(r => (
                <div key={r.id} className={`radio ${prefs.scope === r.id ? 'sel' : ''}`}
                  onClick={() => set({ scope: r.id })}>
                  <div className="radio-dot" />
                  <div className="rt-body"><div className="t">{r.t}</div><div className="d">{r.d}</div></div>
                  {r.adm && <span className="adm"><I.shield size={10} /> Admin</span>}
                </div>
              ))}
            </div>
            <div className="rc-foot">
              <button className="btn ghost sm" onClick={() => toggle('scope')}>Done</button>
            </div>
          </RecipeCard>

          <RecipeCard
            icon={I.bolt}
            label="What it does"
            valueText={doText}
            expanded={open.doit}
            onToggle={() => toggle('doit')}
            examples={doExamples}
            onPickExample={(ex) => { set(ex.val); closeAll(); }}
          >
            <textarea className="pref-box" value={prefs.desc}
              onChange={(e) => set({ desc: e.target.value })}
              rows={3}
              placeholder="Describe the task this routine performs."
              style={{border:'1px solid var(--border)', borderRadius: 8, padding: 10, width:'100%', resize:'vertical', font: '400 13px/1.55 var(--font-sans)'}} />
            <div className="rc-inline-examples">
              <span className="rc-inline-label">Quick-add:</span>
              {doExamples.map((ex, i) => (
                <button key={i} type="button" className="rc-ex-chip"
                  onClick={() => set(ex.val)}>
                  {ex.label}
                </button>
              ))}
            </div>
            <div className="rc-foot">
              <button className="btn ghost sm" onClick={() => toggle('doit')}>Done</button>
            </div>
          </RecipeCard>

          <RecipeCard
            icon={I.email}
            label="Where it goes"
            valueText={sendText}
            expanded={open.send}
            onToggle={() => toggle('send')}
            examples={sendExamples}
            onPickExample={(ex) => { set(ex.val); closeAll(); }}
          >
            <div className="del-tabs" style={{marginBottom: 10}}>
              {[
                { id: 'Email', ico: I.email },
                { id: 'In-app', ico: I.bell },
                { id: 'Slack', ico: I.hash },
              ].map(d => {
                const sel = (prefs.delivery || []).includes(d.id);
                return (
                  <button key={d.id} className={`del-tab ${sel ? 'sel' : ''}`}
                    onClick={() => set({
                      delivery: sel
                        ? prefs.delivery.filter(x => x !== d.id)
                        : [...(prefs.delivery || []), d.id]
                    })}>
                    {sel && <span className="del-tab-check"><I.check size={10} /></span>}
                    <d.ico size={12} /> {d.id}
                  </button>
                );
              })}
            </div>
            {(prefs.delivery || []).length > 0 && (
              <div style={{display:'flex', flexDirection:'column', gap: 6}}>
                {prefs.delivery.map(ch => (
                  <div key={ch} className="fld"><I.at size={12} />
                    <span style={{font:'400 11.5px/1 var(--font-sans)', color:'var(--muted-foreground)', marginRight: 4}}>{ch}:</span>
                    <input value={(prefs.recipients && prefs.recipients[ch]) || ''}
                      onChange={(e) => set({ recipients: { ...prefs.recipients, [ch]: e.target.value } })}
                      placeholder={ch === 'Slack' ? '#channel or @user' : ch === 'In-app' ? 'Pick recipients' : 'name@company.com'}
                      style={{border:'none', outline:'none', background:'transparent', flex:1, font:'400 12.5px/1 var(--font-sans)'}} />
                  </div>
                ))}
              </div>
            )}
            <div className="rc-foot">
              <button className="btn ghost sm" onClick={() => toggle('send')}>Done</button>
            </div>
          </RecipeCard>
        </div>

        {/* Progress + preview */}
        <div className="rt-progress">
          <div className="rt-progress-track">
            <div className="rt-progress-fill" style={{width: `${(filledCount/4)*100}%`}} />
          </div>
          <div className="rt-progress-text">{filledCount} of 4 steps complete</div>
        </div>

        {filledCount === 4 && (
          <div className="rt-step-in">
            <div className="pref-label">Preview of first run</div>
            <div className="email-prev">
              <div className="meta"><span>From routines@planned.com</span><span>To {prefs.recipients?.Email || prefs.recipients?.['In-app'] || prefs.recipients?.Slack || 'you'}</span></div>
              <div className="body">
                <div style={{font:'400 11px/1 var(--font-sans)', color:'var(--muted-foreground)'}}>Your {(prefs.name || 'routine').toLowerCase()}</div>
                <div className="subj">Good morning,</div>
                <div style={{font:'400 12.5px/1.5 var(--font-sans)', color: 'var(--foreground)'}}>Here's what needs your attention this week:</div>
                <div className="evt">
                  <div className="dot" />
                  <div className="evt-body">
                    <div className="t">Client dinner NYC</div>
                    <div className="d">Emma Chen • $8,400 pending • 4 days outstanding</div>
                  </div>
                </div>
              </div>
              <div className="foot-bar"><I.info size={11} /> 9 more items pending • view full digest in Planned</div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

window.RoutinesEmpty = RoutinesEmpty;
window.RoutinesList = RoutinesList;
window.RoutinesChat = RoutinesChat;
window.RecipeCard = RecipeCard;

                <span className="metric-value">3</span>
                <span className="mc-badge positive">100%</span>
              </div>

function _polRng(seed) {
  let s = seed;
  return () => {s = (s * 9301 + 49297) % 233280;return s / 233280;};
}
function _polSeries(seed, base, vol, trend, shockAt = null, shockDir = -1) {
  const r = _polRng(seed);
  const n = 52;
  const out = [];
  let v = base;
  for (let i = 0; i < n; i++) {
    v += trend + (r() - 0.5) * vol * 2;
    if (shockAt && i === shockAt) v += vol * shockDir * 6;
    out.push(Math.max(0, v));
  }
  return out;
}

// Tiny sparkline SVG (bar chart look)
function Sparkline({ variant = 0 }) {
  const sets = [
  [5, 8, 6, 9, 7, 11, 9, 13, 10, 15, 12, 18],
  [4, 6, 5, 8, 6, 9, 7, 11, 9, 13, 10, 16],
  [3, 5, 4, 7, 5, 8, 6, 10, 8, 12, 9, 15],
  [6, 9, 7, 11, 8, 13, 10, 16, 12, 19, 14, 22]];

  const vals = sets[variant % sets.length];
  const W = 56,H = 28,PAD = 2;
  const min = Math.min(...vals),max = Math.max(...vals);
  const rng = Math.max(max - min, 0.001);
  const xAt = (i) => PAD + i * (W - PAD * 2) / (vals.length - 1);
  const yAt = (v) => PAD + (1 - (v - min) / rng) * (H - PAD * 2);
  // smooth monotone path
  let path = `M${xAt(0)},${yAt(vals[0])}`;
  for (let i = 1; i < vals.length; i++) {
    const x1 = xAt(i - 1),y1 = yAt(vals[i - 1]);
    const x2 = xAt(i),y2 = yAt(vals[i]);
    const cx = (x1 + x2) / 2;
    path += ` Q${cx},${y1} ${cx},${(y1 + y2) / 2} T${x2},${y2}`;
  }
  return (
    <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`} className="spark">
      <path d={path} fill="none" stroke="var(--positive-primary)" strokeWidth="1.4" strokeLinecap="round" />
    </svg>);

}

// Main chart (compliance trend) — shadcn-style line chart with hover tooltip
function ChartWithTooltip() {
  const svgRef = useRefP(null);
  const [hover, setHover] = useStateP(null);
  // 12 weeks of weekly compliance, ~Jun 9 through Sep 1, 2025
  const points = [
  { d: 'Jun 9, 2025', v: 96 },
  { d: 'Jun 16, 2025', v: 97 },
  { d: 'Jun 23, 2025', v: 98 },
  { d: 'Jun 30, 2025', v: 96 },
  { d: 'Jul 7, 2025', v: 99 },
  { d: 'Jul 14, 2025', v: 97 },
  { d: 'Jul 21, 2025', v: 94 },
  { d: 'Jul 28, 2025', v: 89 },
  { d: 'Aug 4, 2025', v: 82 },
  { d: 'Aug 11, 2025', v: 71 },
  { d: 'Aug 18, 2025', v: 61 }, // dip
  { d: 'Aug 25, 2025', v: 88 },
  { d: 'Sep 1, 2025', v: 98 }];

  const W = 850,H = 210,PX = 18,PY = 18;
  const iw = W - PX * 2;
  const ih = H - PY * 2;
  const xAt = (i) => PX + i / (points.length - 1) * iw;
  const yAt = (v) => PY + (1 - (v - 55) / 45) * ih;

  const path = points.map((p, i) => {
    const x = xAt(i),y = yAt(p.v);
    if (i === 0) return `M${x},${y}`;
    const px = xAt(i - 1),py = yAt(points[i - 1].v);
    const cx1 = px + (x - px) / 2,cx2 = px + (x - px) / 2;
    return `C${cx1},${py} ${cx2},${y} ${x},${y}`;
  }).join(' ');

  const onMove = (e) => {
    const rect = svgRef.current.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width * W;
    const frac = (x - PX) / iw;
    const idx = Math.max(0, Math.min(points.length - 1, Math.round(frac * (points.length - 1))));
    setHover(idx);
  };
  const onLeave = () => setHover(null);

  const hasHover = hover != null;
  const hi = hasHover ? hover : 10;
  const hx = xAt(hi);
  const hy = yAt(points[hi].v);
  const xTicks = [0, 3, 6, 9, 12];

  return (
    <div className="sc-chart-box" style={{ position: 'relative' }}>
      <svg ref={svgRef} width="100%" height={H} viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none"
      onMouseMove={onMove} onMouseLeave={onLeave}
      style={{ display: 'block' }}>
        {[0, 0.25, 0.5, 0.75, 1].map((t, i) => {
          const y = PY + t * ih;
          return <line key={i} x1={PX} x2={W - PX} y1={y} y2={y} stroke="var(--border)" strokeWidth="1" strokeDasharray={i === 4 ? '' : '2 4'} />;
        })}
        <path d={path} fill="none" stroke="var(--foreground)" strokeWidth="2" />
        <line x1={hx} y1={PY} x2={hx} y2={H - PY} stroke="var(--ring)" strokeDasharray="3 3" strokeWidth="1" style={{ opacity: hasHover ? 1 : 0 }} />
        <circle cx={hx} cy={hy} r={4} fill="#fff" stroke="var(--foreground)" strokeWidth="2" style={{ opacity: hasHover ? 1 : 0 }} />
      </svg>
      {/* x-axis labels */}
      <div className="sc-chart-xaxis" style={{ padding: '8px 18px 0' }}>
        {xTicks.map((i) => <span key={i}>{points[i].d.split(',')[0]}</span>)}
      </div>
      {hasHover && (() => {
        const rect = svgRef.current && svgRef.current.getBoundingClientRect();
        const pxX = rect ? hx / W * rect.width : 0;
        const pxY = rect ? hy / H * rect.height : 0;
        const boxW = 160;
        const left = Math.min(Math.max(pxX + 12, 0), (rect ? rect.width : W) - boxW - 4);
        const top = Math.max(pxY - 8, 0);
        return (
          <div className="sc-tooltip" style={{ left, top, width: boxW }}>
            <div className="sc-tt-label">{points[hi].d}</div>
            <div className="sc-tt-row">
              <span className="sc-tt-indicator" style={{ background: 'var(--foreground)' }} />
              <span className="sc-tt-name">Compliance</span>
              <span className="sc-tt-value">{points[hi].v}%</span>
            </div>
          </div>);

      })()}
    </div>);

}
