  const [lastFilledPrompt, setLastFilledPrompt] = useStateP('');
  const [saved, setSaved] = useStateP(false);
  const nameRef = useRefP(null);

  React.useEffect(() => {
    const t = setTimeout(() => nameRef.current && nameRef.current.focus(), 50);
    return () => clearTimeout(t);
  }, []);

  const set = (patch) => setWf(w => ({ ...w, ...patch }));
  const toggle = (key) => setOpen(o => ({ ...o, [key]: !o[key] }));
  const closeAll = () => setOpen({ when: false, match: false, decide: false, fallback: false });

  // ── Templates (Routines-style cards) ─────────────────────
  const TPLS = [
    { icon: I.shieldCheck, title: 'Approval for large events', desc: 'Require admin sign-off when budget ≥ $20k',
      apply: { name: 'Approval for large events', desc: 'When an event is created with budget ≥ $20,000, require admin approval.', trigger: 'created',
        conds: [{ id: 1, conj: 'If', field: 'Budget', op: '≥', value: '$20,000' }, { id: 2, conj: 'And', field: 'Event type', op: 'is', value: 'Offsite' }],
        admins: ['e','d','r'], requireMode: 'Require any', fallback: 'Auto-approve' } },
    { icon: I.shield, title: '3 quotes for sourcing', desc: 'Planners must submit 3 vendor quotes per RFP',
      apply: { name: 'Require 3 quotes for sourcing', desc: 'When sourcing starts on a budget ≥ $5,000, require 3 vendor quotes.', trigger: 'sourced',
        conds: [{ id: 1, conj: 'If', field: 'Budget', op: '≥', value: '$5,000' }],
        admins: ['e','d'], requireMode: 'Require any', fallback: 'Notify owner' } },
    { icon: I.bell, title: 'Auto room block for big groups', desc: 'Reserve a room block when headcount ≥ 50',
      apply: { name: 'Auto-room block for big groups', desc: 'When an event is created with headcount ≥ 50, auto-reserve a room block.', trigger: 'created',
        conds: [{ id: 1, conj: 'If', field: 'Headcount', op: '≥', value: '50' }],
        admins: ['d'], requireMode: 'Require any', fallback: 'Auto-approve' } },
    { icon: I.sparkle, title: 'Vendor risk review', desc: 'Flag new vendors for compliance review',
      apply: { name: 'Vendor risk review', desc: 'When sourcing starts with a new vendor, route through compliance review.', trigger: 'sourced',
        conds: [{ id: 1, conj: 'If', field: 'Vendor', op: 'is', value: 'Offsite' }],
        admins: ['r','s'], requireMode: 'Require any', fallback: 'Notify owner' } },
    { icon: I.shield, title: 'Executive client dinners', desc: 'Route client dinners > $1k through exec approval',
      apply: { name: 'Executive client dinners', desc: 'When a client dinner is created above $1,000, route through executive approval.', trigger: 'created',
        conds: [{ id: 1, conj: 'If', field: 'Event type', op: 'is', value: 'Client dinner' }, { id: 2, conj: 'And', field: 'Budget', op: '≥', value: '$1,000' }],
        admins: ['e'], requireMode: 'Require any', fallback: 'Notify owner' } },
    { icon: I.email, title: 'Invoice review', desc: 'Flag invoices over $10k for review',
      apply: { name: 'Invoice review threshold', desc: 'When an invoice is submitted above $10,000, require review by finance.', trigger: 'invoice',
        conds: [{ id: 1, conj: 'If', field: 'Budget', op: '≥', value: '$10,000' }],
        admins: ['e','d'], requireMode: 'Require any', fallback: 'Auto-approve' } },
  ];

  const applyTemplate = (tpl) => {
    setWf(w => ({ ...w, ...tpl.apply }));
    setActiveTemplate(tpl);
    setLastFilledPrompt(tpl.apply.desc || '');
    closeAll();
  };
  const resetForm = () => {
    setWf({ name: '', desc: '', trigger: 'created', conds: [], admins: [], requireMode: 'Require any', fallback: 'Auto-approve' });
    setActiveTemplate(null);
    setLastFilledPrompt('');
    closeAll();
    setTimeout(() => nameRef.current && nameRef.current.focus(), 50);
  };

  // ── Magic fill: parse prompt → wf ────────────────────────
  const magicFill = () => {
    const t = (wf.desc || '').toLowerCase();
    const next = { ...wf };
    // Trigger
    if (/sourc/.test(t)) next.trigger = 'sourced';
    else if (/invoice/.test(t)) next.trigger = 'invoice';
    else if (/approv/.test(t)) next.trigger = 'approval';
    else next.trigger = 'created';
    // Conditions (budget & headcount detection)
    const conds = [];
    const budget = t.match(/\$\s?([0-9]{1,3}(?:[,. ][0-9]{3})*|\d+\s?k)/i);
    if (budget || /budget|cost|spend/.test(t)) {
      const valRaw = budget ? budget[0].replace(/\s/g, '') : '$10,000';
      const val = /k\b/i.test(valRaw) ? '$' + parseInt(valRaw.replace(/[^\d]/g, '')) * 1000 : valRaw;
      conds.push({ id: Date.now(), conj: 'If', field: 'Budget', op: '≥', value: val.replace(/^\$/, '$').replace(/^\$(\d+)$/, (_,n)=> '$' + Number(n).toLocaleString()) });
    }
    const head = t.match(/(\d{2,4})\s*(people|attendees|guests|headcount)/);
    if (head) {
      conds.push({ id: Date.now()+1, conj: conds.length ? 'And' : 'If', field: 'Headcount', op: '≥', value: head[1] });
    }
    if (/client dinner/.test(t)) {
      conds.push({ id: Date.now()+2, conj: conds.length ? 'And' : 'If', field: 'Event type', op: 'is', value: 'Client dinner' });
    } else if (/offsite/.test(t)) {
      conds.push({ id: Date.now()+3, conj: conds.length ? 'And' : 'If', field: 'Event type', op: 'is', value: 'Offsite' });
    }
    if (conds.length) next.conds = conds;
    // Approvers
    if (/exec|executive|ceo|cfo/.test(t)) next.admins = ['e'];
    else if (/finance/.test(t)) next.admins = ['e', 'd'];
    else if (/admin|approv/.test(t)) next.admins = ['e','d','r'];
    // Fallback
    if (/auto.?approve|auto approve/.test(t)) next.fallback = 'Auto-approve';
    else if (/notify|alert|tell/.test(t)) next.fallback = 'Notify owner';
    else if (/block|reject/.test(t)) next.fallback = 'Block';
    // Name (heuristic: first 5 words capitalized)
    if (!next.name) {
      const cleaned = (wf.desc || '').replace(/^(when|if|whenever|every time)\s+/i, '').trim();
      next.name = cleaned.split(/[,.]/)[0].split(/\s+/).slice(0, 7).join(' ');
      next.name = next.name.charAt(0).toUpperCase() + next.name.slice(1);
    }
    setWf(next);
    setLastFilledPrompt(wf.desc);
    closeAll();
  };

  // ── Summary text for collapsed cards ─────────────────────
  const trigOpt = TRIGGER_OPTS.find(o => o.id === wf.trigger);
  const whenText = trigOpt ? trigOpt.t : '';
  const matchText = wf.conds.length === 0 ? '' :
    wf.conds.map((c, i) => `${i === 0 ? '' : c.conj + ' '}${c.field} ${c.op} ${c.value}`).join(' ');
  const decideText = wf.admins.length === 0 ? '' :
    `${wf.requireMode.replace('Require ', '')} of ${wf.admins.length} admin${wf.admins.length === 1 ? '' : 's'}`;
  const fallbackText = wf.fallback;

  // ── Examples ─────────────────────────────────────────────
  const triggerExamples = TRIGGER_OPTS.slice(0, 3).map(o => ({ label: o.t, val: { trigger: o.id } }));
  const matchExamples = [
    { label: 'Budget ≥ $10k', val: { conds: [{ id: Date.now(), conj: 'If', field: 'Budget', op: '≥', value: '$10,000' }] } },
    { label: 'Headcount ≥ 50', val: { conds: [{ id: Date.now()+1, conj: 'If', field: 'Headcount', op: '≥', value: '50' }] } },
    { label: 'Offsite events', val: { conds: [{ id: Date.now()+2, conj: 'If', field: 'Event type', op: 'is', value: 'Offsite' }] } },
  ];
  const decideExamples = [
    { label: 'Any of Emma, Dan', val: { requireMode: 'Require any', admins: ['e', 'd'] } },
    { label: 'All execs', val: { requireMode: 'Require all', admins: ['e'] } },
    { label: 'Finance team', val: { requireMode: 'Require any', admins: ['e','d'] } },
  ];
  const fallbackExamples = FALLBACK_OPTS.slice(0, 3).map(o => ({ label: o.t, val: { fallback: o.id } }));

  // ── Save ─────────────────────────────────────────────────
  const canSave = !!wf.name && !!wf.trigger;
  const saveIt = (activate = true) => {
    if (!canSave) return;
    setSaved(true);
    if (onSave) {
      onSave({
        id: initialPolicy?.id || ('p' + Date.now()),
        name: wf.name || 'New policy',
        desc: wf.desc,
        trigger: TRIGGER_OPTS.find((t) => t.id === wf.trigger)?.t || 'Event is created',
        guards: `${wf.conds.length} guard${wf.conds.length === 1 ? '' : 's'}`,
        type: 'Approval guard',
        compliance: '100% compliance',
        on: initialPolicy ? initialPolicy.on : activate,
        _raw: { ...wf },
      });
    }
  };

  const RC = window.RecipeCard;

  return (
    <div className="split solo">
      <div className="split-right">
        <div className="split-head">
          <div className="crumb">
            <span>Policies</span>
            <I.chevron size={11} className="sep" />
            <span className="cur">{initialPolicy ? 'Edit policy' : 'New policy'}</span>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <button className="btn outline" style={{ height: 28, fontSize: 12 }} onClick={onClose}>Cancel</button>
            <div className="save-split" style={{ position: 'relative', display: 'inline-flex' }}>
              <button className="btn" style={{ height: 28, fontSize: 12, opacity: canSave ? 1 : 0.4, pointerEvents: canSave ? 'auto' : 'none', borderTopRightRadius: 0, borderBottomRightRadius: 0, paddingRight: 10 }}
                onClick={() => saveIt(true)}>
                <I.save size={12} /> {saved ? 'Saved' : 'Save'}
              </button>
              <button className="btn" style={{ height: 28, fontSize: 12, opacity: canSave ? 1 : 0.4, pointerEvents: canSave ? 'auto' : 'none', borderTopLeftRadius: 0, borderBottomLeftRadius: 0, paddingLeft: 6, paddingRight: 6, marginLeft: 1, borderLeft: '1px solid rgba(255,255,255,.25)' }}
                onClick={(e) => { e.stopPropagation(); setOpenMenu(m => m === 'savemenu' ? null : 'savemenu'); }}
                aria-label="Save options">
                <I.chevronDown size={11} />
              </button>
              {openMenu === 'savemenu' && (
                <div className="dd-menu" style={{ left: 'auto', right: 0, top: 'calc(100% + 4px)', minWidth: 200, padding: 4 }}>
                  <div className="dd-item" onClick={(e) => { e.stopPropagation(); setOpenMenu(null); saveIt(true); }}
                    style={{ display: 'flex', flexDirection: 'column', gap: 2, padding: '8px 10px' }}>
                    <div style={{ font: '500 12.5px/1.2 var(--font-sans)' }}>{initialPolicy ? 'Save changes' : 'Save & activate'}</div>
                    <div style={{ font: '400 11px/1.3 var(--font-sans)', color: 'var(--muted-foreground)' }}>Enforce immediately on new events</div>
                  </div>
                  <div className="dd-item" onClick={(e) => { e.stopPropagation(); setOpenMenu(null); saveIt(false); }}
                    style={{ display: 'flex', flexDirection: 'column', gap: 2, padding: '8px 10px' }}>
                    <div style={{ font: '500 12.5px/1.2 var(--font-sans)' }}>Save as draft</div>
                    <div style={{ font: '400 11px/1.3 var(--font-sans)', color: 'var(--muted-foreground)' }}>Keep editing — won't enforce yet</div>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>

        <div className="rt-solo" onClick={() => setOpenMenu(null)}>
          <div className="pref rt-solo-body rt-recipe">
            {/* Templates strip */}
            <div className="rt-tpl-top">
              <div className="rt-tpl-top-head">
                <div className="rt-tpl-top-label">Start from a template</div>
                <div className="rt-tpl-nav">
                  <button type="button" className="rt-tpl-nav-btn" aria-label="Previous"
                    onClick={(e) => { const r = e.currentTarget.closest('.rt-tpl-top').querySelector('.rt-tpl-scroll'); r && r.scrollBy({ left: -260, behavior: 'smooth' }); }}>
                    <I.chevron size={12} style={{transform: 'rotate(180deg)'}} />
                  </button>
                  <button type="button" className="rt-tpl-nav-btn" aria-label="Next"
                    onClick={(e) => { const r = e.currentTarget.closest('.rt-tpl-top').querySelector('.rt-tpl-scroll'); r && r.scrollBy({ left: 260, behavior: 'smooth' }); }}>
                    <I.chevron size={12} />
                  </button>
                </div>
              </div>
              <div className="rt-tpl-scroll">
                {TPLS.map((t, i) => {
                  const isActive = activeTemplate && activeTemplate.title === t.title;
                  return (
                    <button key={i} type="button" className={`rt-tpl ${isActive ? 'active' : ''}`} onClick={() => applyTemplate(t)}>
                      <div className="rt-tpl-ico"><t.icon size={14} /></div>
                      <div className="rt-tpl-text">
                        <div className="rt-tpl-title">{t.title}</div>
                        <div className="rt-tpl-desc">{t.desc}</div>
                      </div>
                      {isActive && <div className="rt-tpl-check"><I.check size={11} /></div>}
                    </button>
                  );
                })}
              </div>
            </div>

            <div className="rt-hr" />

            {/* Name + anatomy */}
            <div className="rt-name-block">
              <input value={wf.name} onChange={(e) => set({ name: e.target.value })}
                ref={nameRef}
                placeholder="Untitled policy"
                className="rt-name-input"
                onClick={(e) => e.stopPropagation()} />
              <div className="rt-anatomy">
                A policy fires on a <b>trigger</b>, evaluates <b>conditions</b>, then routes the <b>decision</b> — with a <b>fallback</b> if none match.
              </div>
            </div>

            {/* Prompt + send → magic-fill */}
            <div className={`rt-prompt ${activeTemplate ? 'has-tpl' : ''}`}>
              {activeTemplate && (
                <div className="rt-prompt-tpl">
                  <div className="rt-prompt-tpl-ico"><activeTemplate.icon size={11} /></div>
                  <span className="rt-prompt-tpl-label">Filled from template</span>
                  <span className="rt-prompt-tpl-name">{activeTemplate.title}</span>
                  <button type="button" className="rt-prompt-tpl-reset" onClick={resetForm}>
                    <I.close size={10} /> Reset
                  </button>
                </div>
              )}
              <div className="rt-prompt-input">
                <I.sparkle size={13} className="rt-prompt-spark" />
                <textarea className="rt-magic-input" value={wf.desc}
                  onChange={(e) => set({ desc: e.target.value })}
                  onClick={(e) => e.stopPropagation()}
                  onKeyDown={(e) => {
                    if ((e.key === 'Enter' && (e.metaKey || e.ctrlKey)) || (e.key === 'Enter' && !e.shiftKey)) {
                      e.preventDefault();
                      if (wf.desc.trim() && wf.desc.trim() !== lastFilledPrompt.trim()) magicFill();
                    }
                  }}
                  rows={2}
                  placeholder="Describe your policy — e.g. 'Require approval for events over $20k'" />
                <button type="button" className="rt-prompt-send"
                  disabled={!wf.desc.trim() || wf.desc.trim() === lastFilledPrompt.trim()}
                  onClick={magicFill}
                  aria-label="Generate policy">
                  <I.arrowUp size={13} />
                </button>
              </div>
              <div className="rt-prompt-hint">Press Enter to populate the fields below — or fill them yourself.</div>
            </div>

            {/* Recipe cards — always on the surface */}
            <div className="rt-recipe-list">
              <div className="rc static filled">
                <div className="rc-head">
                  <div className="rc-ico"><I.bolt size={14} /></div>
                  <div className="rc-h-text">
                    <div className="rc-label">When it fires</div>
                  </div>
                  <div className="rc-h-aside">
                    {triggerExamples.slice(0, 2).map((ex, i) => (
                      <button key={i} type="button" className="rc-ex-chip" onClick={() => set(ex.val)}>{ex.label}</button>
                    ))}
                  </div>
                </div>
                <div className="rc-body">
                  <TriggerPicker value={wf.trigger} onChange={(id) => set({ trigger: id })}
                    open={openMenu === 'trig'}
                    toggle={(e) => { e.stopPropagation(); setOpenMenu(m => m === 'trig' ? null : 'trig'); }} />
                </div>
              </div>

              <div className="rc static filled">
                <div className="rc-head">
                  <div className="rc-ico"><I.shieldCheck size={14} /></div>
                  <div className="rc-h-text">
                    <div className="rc-label">What it checks</div>
                  </div>
                  <div className="rc-h-aside">
                    {matchExamples.slice(0, 2).map((ex, i) => (
                      <button key={i} type="button" className="rc-ex-chip" onClick={() => set(ex.val)}>{ex.label}</button>
                    ))}
                  </div>
                </div>
                <div className="rc-body">
                  <div className="conds" style={{ background: '#fff', boxShadow: 'inset 0 0 0 1px var(--border)', borderRadius: 10, padding: 10 }}>
                  {wf.conds.length === 0 && (
                    <div style={{ font: '400 12px/1.4 var(--font-sans)', color: 'var(--muted-foreground)', padding: '4px 4px 8px' }}>
                      No conditions yet — this policy will fire on every event matching the trigger. Add a condition to narrow it down.
                    </div>
                  )}
                  {wf.conds.map((c, i) => (
                    <div key={c.id} className="cond-row">
                      <Dropdown className={`sel ${i === 0 ? 'op' : 'conj'}`}
                        value={c.conj} options={i === 0 ? ['If'] : CONJ_OPTS}
                        onChange={(v) => setWf(w => ({ ...w, conds: w.conds.map((x,j) => j===i ? {...x, conj: v} : x) }))}
                        openKey={`conj-${i}`} openMenu={openMenu} setOpenMenu={setOpenMenu} />
                      <Dropdown className="sel"
                        value={c.field} options={FIELD_OPTS}
                        onChange={(v) => setWf(w => ({ ...w, conds: w.conds.map((x,j) => j===i ? {...x, field: v} : x) }))}
                        openKey={`field-${i}`} openMenu={openMenu} setOpenMenu={setOpenMenu} />
                      <Dropdown className="sel op"
                        value={c.op} options={c.field === 'Event type' || c.field === 'Location' || c.field === 'Vendor' ? ['is', 'is not'] : OP_OPTS}
                        onChange={(v) => setWf(w => ({ ...w, conds: w.conds.map((x,j) => j===i ? {...x, op: v} : x) }))}
                        openKey={`op-${i}`} openMenu={openMenu} setOpenMenu={setOpenMenu} />
                      {c.field === 'Event type' ? (
                        <Dropdown className="sel num-input"
                          value={c.value} options={TYPE_OPTS}
                          onChange={(v) => setWf(w => ({ ...w, conds: w.conds.map((x,j) => j===i ? {...x, value: v} : x) }))}
                          openKey={`val-${i}`} openMenu={openMenu} setOpenMenu={setOpenMenu} hideChev />
                      ) : (
                        <input className="sel num-input"
                          style={{ border: 'none', outline: 'none', background: 'transparent', flex: '1 1 auto', minWidth: 0, font: '400 12.5px/1 var(--font-sans)' }}
                          value={c.value}
                          onChange={(e) => setWf(w => ({ ...w, conds: w.conds.map((x,j) => j===i ? {...x, value: e.target.value} : x) }))}
                          onClick={(e) => e.stopPropagation()} />
                      )}
                      {wf.conds.length > 0 && (
                        <button className="cond-x" onClick={(e) => { e.stopPropagation(); setWf(w => ({ ...w, conds: w.conds.filter((_,j) => j !== i) })); }}
                          title="Remove">
                          <I.close size={10} />
                        </button>
                      )}
                    </div>
                  ))}
                  <button className="add-cond" onClick={(e) => { e.stopPropagation();
                    setWf(w => ({ ...w, conds: [...w.conds, { id: Date.now(), conj: w.conds.length === 0 ? 'If' : 'And', field: 'Headcount', op: '≥', value: '50' }] }));
                  }}><I.plus size={11} /> Add condition</button>
                </div>
                </div>
              </div>

              <div className="rc static filled">
                <div className="rc-head">
                  <div className="rc-ico"><I.shield size={14} /></div>
                  <div className="rc-h-text">
                    <div className="rc-label">Who decides</div>
                  </div>
                  <div className="rc-h-aside">
                    {decideExamples.slice(0, 2).map((ex, i) => (
                      <button key={i} type="button" className="rc-ex-chip" onClick={() => set(ex.val)}>{ex.label}</button>
                    ))}
                  </div>
                </div>
                <div className="rc-body">
                  <div className="cond-row" style={{ background: '#fff', boxShadow: 'inset 0 0 0 1px var(--border)', borderRadius: 10, padding: 8 }}>
                    <Dropdown className="sel" style={{ flex: '1 1 auto' }}
                      value={wf.requireMode} options={['Require any', 'Require all', 'Require majority']}
                      onChange={(v) => set({ requireMode: v })}
                      openKey="req" openMenu={openMenu} setOpenMenu={setOpenMenu} />
                    <span style={{ font: '400 12.5px/1 var(--font-sans)', color: 'var(--muted-foreground)' }}>of</span>
                    <AdminPicker admins={wf.admins} setAdmins={(a) => set({ admins: a })}
                      open={openMenu === 'adm'}
                      toggle={(e) => { e.stopPropagation(); setOpenMenu(m => m === 'adm' ? null : 'adm'); }} />
                  </div>
                </div>
              </div>

              <div className="rc static filled">
                <div className="rc-head">
                  <div className="rc-ico"><I.alert size={14} /></div>
                  <div className="rc-h-text">
                    <div className="rc-label">Otherwise</div>
                  </div>
                  <div className="rc-h-aside">
                    {fallbackExamples.slice(0, 2).map((ex, i) => (
                      <button key={i} type="button" className="rc-ex-chip" onClick={() => set(ex.val)}>{ex.label}</button>
                    ))}
                  </div>
                </div>
                <div className="rc-body">
                  <FallbackPicker value={wf.fallback} onChange={(v) => set({ fallback: v })}
                    open={openMenu === 'fb'}
                    toggle={(e) => { e.stopPropagation(); setOpenMenu(m => m === 'fb' ? null : 'fb'); }} />
                </div>
              </div>
            </div>

            {/* Outcome */}
            <div className={`wf-outcome ${canSave ? 'pos' : ''}`} style={{ marginTop: 8 }}>
              <div className="ico">{canSave ? <I.check size={14} /> : <I.clock size={14} />}</div>
              <div className="bd">
                <div className="t">{canSave ? 'Policy is ready to enforce' : 'Add a name and trigger to continue'}</div>
                {canSave && <div className="d" style={{ font: '400 12px/1.3 var(--font-sans)', color: 'var(--muted-foreground)', marginTop: 2 }}>
                  Once active, every {trigOpt?.t.toLowerCase()} will be evaluated against this policy.
                </div>}
              </div>
              <I.info size={12} className="chev" />
            </div>
          </div>
        </div>
      </div>
    </div>);

}

// Generic dropdown used inside condition rows
function Dropdown({ className, style, value, options, onChange, openKey, openMenu, setOpenMenu, hideChev }) {
  const open = openMenu === openKey;
  return (
    <div className={className} style={{ ...style, position: 'relative', cursor: 'pointer' }}
    onClick={(e) => {e.stopPropagation();setOpenMenu(open ? null : openKey);}}>
      <span>{value}</span>
      {!hideChev && <I.chevronDown size={10} />}
      {open &&
      <div className="dd-menu">
          {options.map((o) =>
        <div key={o} className={`dd-item ${o === value ? 'sel' : ''}`}
        onClick={(e) => {e.stopPropagation();onChange(o);setOpenMenu(null);}}>
              {o}
            </div>
        )}
        </div>
      }
    </div>);

}

function TriggerPicker({ value, onChange, open, toggle }) {
  const current = TRIGGER_OPTS.find((t) => t.id === value) || TRIGGER_OPTS[0];
  const Ico = current.icon;
  return (
    <div style={{ position: 'relative' }}>
      <div className="wf-trigger" style={{ cursor: 'pointer' }} onClick={toggle}>
        <div className="ico"><Ico size={14} /></div>
        <div className="bd">

function rng(seed) {
  let s = seed;
  return () => {s = (s * 9301 + 49297) % 233280;return s / 233280;};
}
function mkSeries(seed, base, vol, trend, shockAt = null) {
  const r = rng(seed);
  const n = 52;
  const out = [];
  let v = base;
  for (let i = 0; i < n; i++) {
    v += trend + (r() - 0.5) * vol * 2;
    if (shockAt && i === shockAt) v += vol * (r() > 0.5 ? 4 : -4);
    out.push(Math.max(0, v));
  }
  return out;
}

const INS_SERIES_RAW = {
  spend: mkSeries(22, 2.38, 0.04, -0.002, 30),

// Program score = weighted composite of contributing metrics, normalized 0–100.
// Weights sum to 1.0. Each input is normalized to a 0–100 scale first.
const PROG_WEIGHTS = {
  comp: 0.30, // Compliance (already 0–100)
  sav: 0.25, // Savings % (cap at 50% = 100)
  vend: 0.20, // Vendor adoption (already 0–100)
  cont: 0.15, // Contracts signed (already 0–100)
  lead: 0.10 // Booking lead time (cap at 45d = 100)
};
const PROG_NORM = {
  comp: (v) => Math.min(100, v),
  sav: (v) => Math.min(100, v / 50 * 100),
  vend: (v) => Math.min(100, v),
  cont: (v) => Math.min(100, v),
  lead: (v) => Math.min(100, v / 45 * 100)
};

  ...INS_SERIES_RAW,
  prog: INS_SERIES_RAW.comp.map((_, i) => {
    let s = 0;
    for (const k of Object.keys(PROG_WEIGHTS)) {
      s += PROG_NORM[k](INS_SERIES_RAW[k][i]) * PROG_WEIGHTS[k];
    }

  __measureCtx.font = font;
  if (__measureCtx.measureText(text).width <= maxPx) return text;
  // binary-search the longest prefix that fits with an ellipsis
  let lo = 0, hi = text.length;
  while (lo < hi) {
    const mid = (lo + hi + 1) >> 1;
    const w = __measureCtx.measureText(text.slice(0, mid) + '…').width;
    if (w <= maxPx) lo = mid; else hi = mid - 1;
  }
  return lo <= 0 ? '' : text.slice(0, lo) + '…';
}

// Recharts LabelList content renderer: truncates to bar width minus 16px padding
function TruncatingInsideLabel(props) {
  const { x, y, width, height, value, fill } = props;
  const padX = 8;
  const avail = Math.max(0, (width || 0) - padX * 2);
  const text = fitText(String(value ?? ''), avail);
  if (!text) return null;
  return (
    <text x={(x || 0) + padX} y={(y || 0) + (height || 0) / 2} dominantBaseline="middle" fill={fill} fontSize={12}>{text}</text>
  );
}

const __supMeasureCtx = (() => { try { return document.createElement('canvas').getContext('2d'); } catch (e) { return null; } })();
function _supFitText(text, maxPx, font = '12px ui-sans-serif, system-ui, -apple-system, sans-serif') {
  if (!text) return '';
  if (!__supMeasureCtx || maxPx <= 0) return text;
  __supMeasureCtx.font = font;
  if (__supMeasureCtx.measureText(text).width <= maxPx) return text;
  let lo = 0, hi = text.length;
  while (lo < hi) {
    const mid = (lo + hi + 1) >> 1;
    const w = __supMeasureCtx.measureText(text.slice(0, mid) + '…').width;

const USR_DAILY = (() => {
  const out = [];
  const start = new Date('2026-02-01T00:00:00');
  // Deterministic pseudo-random (no Math.random — keep it stable across renders).
  const seeded = (i) => {
    const x = Math.sin(i * 9301 + 49297) * 233280;
    return x - Math.floor(x);
  };
  for (let i = 0; i < 89; i++) {
    const d = new Date(start);
    d.setDate(d.getDate() + i);
    const dow = d.getDay();
    const isWeekend = dow === 0 || dow === 6;
    // Logins: weekday baseline ~280, weekend ~110, plus mid-Mar surge for offsite cycle.
    const cycle = i >= 35 && i <= 50 ? 1.6 : 1; // Mar 8–23 surge
    const r1 = seeded(i + 1);
    const r2 = seeded(i + 100);
    const logins = Math.round((isWeekend ? 95 + r1 * 80 : 230 + r1 * 220) * cycle);
    // Events created: roughly correlated but with own weekly pattern.
    const events = Math.round((isWeekend ? 6 + r2 * 8 : 22 + r2 * 26) * (cycle * 0.85 + 0.2));
    out.push({ date: d.toISOString().slice(0, 10), logins, events });
  }
  return out;
})();

};

function AdoptionChart() {
  const [activeChart, setActiveChart] = React.useState('logins');
  const totals = React.useMemo(
    () => ({
      logins: USR_DAILY.reduce((a, r) => a + r.logins, 0),
      events: USR_DAILY.reduce((a, r) => a + r.events, 0)
    }),
    []
  );

  const _R = window.Recharts || {};
  const _RC = _R.ResponsiveContainer;
  const _BC = _R.BarChart;
  const _Bar = _R.Bar;
  const _CG = _R.CartesianGrid;
  const _XA = _R.XAxis;
  const _YA = _R.YAxis;
  const _TT = _R.Tooltip;

  if (!_BC) {
    return <section className="d-card u-adopt-card" style={{ height: 360, display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--muted-foreground)' }}>Loading chart…</section>;
  }

  const tickFmt = (v) => {
    const d = new Date(v);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  };
  const tipFmt = (v) => {
    const d = new Date(v);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  };

  return (
    <section className="d-card u-adopt-card">
      <div className="u-adopt-head">
        <div className="u-adopt-head-meta">
          <div className="u-adopt-title">Activity</div>
          <div className="u-adopt-desc">Daily activity for the last 3 months</div>
        </div>
        <div className="u-adopt-tabs">
          {Object.keys(USR_CHART_CONFIG).map((key) => {
            const cfg = USR_CHART_CONFIG[key];
            const isActive = activeChart === key;
            return (
              <button
                key={key}
                type="button"
                data-active={isActive}
                className="u-adopt-tab"
                onClick={() => setActiveChart(key)}>
                <span className="u-adopt-tab-label">{cfg.label}</span>
                <span className="u-adopt-tab-value">{totals[key].toLocaleString()}</span>
              </button>
            );
          })}
        </div>
      </div>

      <div className="u-adopt-chart">
        <_RC width="100%" height="100%">
          <_BC data={USR_DAILY} margin={{ top: 12, right: 12, left: 12, bottom: 0 }}>
            <_CG vertical={false} stroke="var(--border)" strokeDasharray="3 3" />
            <_XA
              dataKey="date"
              tickLine={false}
              axisLine={false}
              tickMargin={8}
              minTickGap={32}
              tickFormatter={tickFmt}
              tick={{ fill: 'var(--muted-foreground)', fontSize: 11, fontFamily: 'var(--font-sans)' }} />
            <_TT
              cursor={{ fill: 'var(--muted)', opacity: 0.4 }}
              content={({ active, payload, label }) => {
                if (!active || !payload || !payload.length) return null;
                const row = payload[0].payload;
                const cfg = USR_CHART_CONFIG[activeChart];
                return (
                  <div className="sc-tooltip" style={{ minWidth: 150 }}>
                    <div className="sc-tooltip-label">{tipFmt(label)}</div>
                    <div className="sc-tooltip-row" data-active="true">
                      <span className="sc-tooltip-swatch" style={{ background: cfg.color }} />
                      <span className="sc-tooltip-name">{cfg.label}</span>
                      <span className="sc-tooltip-value">{row[activeChart].toLocaleString()}</span>
                    </div>
                  </div>
                );
              }} />
            <_YA hide />
            <_Bar dataKey={activeChart} fill={USR_CHART_CONFIG[activeChart].color} radius={2} isAnimationActive={false} />
          </_BC>
        </_RC>
      </div>
    </section>
  );
}

window.EventChatPanel = EventChatPanel;

  <script type="text/babel">
// Root App — dual mode (home / admin)
const { useState: useStateA, useEffect: useEffectA, useRef: useRefA } = React;

function App() {
  const [mode, setMode] = useStateA(() => localStorage.getItem('app_mode') || 'home');
  const [homeSection, setHomeSection] = useStateA(() => {
    const saved = localStorage.getItem('home_section');
    return saved === 'home-dashboard' || !saved ? 'home-events' : saved;
  });
  const [adminSection, setAdminSection] = useStateA(() => localStorage.getItem('admin_section') || 'policies');
  const [dashboardTab, setDashboardTab] = useStateA(() => localStorage.getItem('dashboard_tab') || 'events-report');
  React.useEffect(() => { localStorage.setItem('dashboard_tab', dashboardTab); }, [dashboardTab]);
  const [portalSection, setPortalSection] = useStateA(() => localStorage.getItem('portal_section') || 'portal-home');
  const [view, setView] = useStateA(() => localStorage.getItem('admin_view') || 'landing');
  const [detailPolicy, setDetailPolicy] = useStateA(null);
  // Home-side: event detail focus
  const [openEvent, setOpenEvent] = useStateA(null);
  const [eventChatOpen, setEventChatOpen] = useStateA(false);

  // routines/policies state — persisted to localStorage
  const [routines, setRoutines] = useStateA(() => {
    try { const v = localStorage.getItem('app_routines'); if (v) return JSON.parse(v); } catch (e) {}
    return DATA.activeRoutines;
  });
  const [policies, setPolicies] = useStateA(() => {
    try { const v = localStorage.getItem('app_policies'); if (v) return JSON.parse(v); } catch (e) {}
    return DATA.activePolicies;
  });
  useEffectA(() => { try { localStorage.setItem('app_routines', JSON.stringify(routines)); } catch (e) {} }, [routines]);
  useEffectA(() => { try { localStorage.setItem('app_policies', JSON.stringify(policies)); } catch (e) {} }, [policies]);
  const [detailOpen, setDetailOpen] = useStateA(false);
  const [openRoutine, setOpenRoutine] = useStateA(null);
  const [collapsed, setCollapsed] = useStateA(false);

  // Bridge to RoutinesChat: it exposes save/cancel/saved on window; we re-render when those change.
  const [, _bumpRC] = useStateA(0);
  useEffectA(() => {
    const h = () => _bumpRC((n) => n + 1);
    window.addEventListener('routines-chat-state', h);
    return () => window.removeEventListener('routines-chat-state', h);
  }, []);
  const [focusMode, setFocusMode] = useStateA(false);
  const [sideChatW, setSideChatW] = useStateA(() => {
    const v = parseInt(localStorage.getItem('admin_sideChatW') || '380', 10);
    return Math.min(Math.max(v, 320), 560);
  });
  useEffectA(() => {localStorage.setItem('admin_sideChatW', String(sideChatW));}, [sideChatW]);
  const [suggestedAction, setSuggestedAction] = useStateA(null);
  const [sideChat, setSideChat] = useStateA(null);
  const [pastChats, setPastChats] = useStateA([
  { id: 'q1-spend', label: 'Q1 spend rep…', time: '12m' },
  { id: 'chicago', label: 'Chicago ven…', time: '12m' },
  { id: 'catering-head', label: 'Catering hea…', time: '12m' },
  { id: 'q4-budget', label: 'Q4 budget re…', time: '12m' }]
  );

  const askAI = (title) => {
    const trimmed = title.length > 18 ? title.slice(0, 15) + '…' : title;
    setPastChats((cs) => [{ id: 'ai-' + Date.now(), label: trimmed, time: 'now', active: true }, ...cs.map((c) => ({ ...c, active: false }))]);
    setSideChat({ title, id: 'ai-' + Date.now() });
    setCollapsed(true);
  };

  useEffectA(() => {localStorage.setItem('app_mode', mode);}, [mode]);
  useEffectA(() => {localStorage.setItem('home_section', homeSection);}, [homeSection]);
  useEffectA(() => {localStorage.setItem('admin_section', adminSection);}, [adminSection]);
  useEffectA(() => {localStorage.setItem('portal_section', portalSection);}, [portalSection]);
  useEffectA(() => {localStorage.setItem('admin_view', view);}, [view]);

  const toggleRoutine = (id) => setRoutines((rs) => rs.map((r) => r.id === id ? { ...r, on: !r.on } : r));
  const togglePolicy = (id) => setPolicies((ps) => ps.map((p) => p.id === id ? { ...p, on: !p.on } : p));

  const isHome = mode === 'home';
  const isPortal = mode === 'portal';
  const isAdmin = mode === 'admin';
  const section = isHome ? homeSection : isPortal ? portalSection : adminSection;
  const setSection = (s) => {
    if (isHome) {
      setHomeSection(s);
      setOpenEvent(null);
      setEventChatOpen(false);
    } else if (isPortal) {
      setPortalSection(s);
      setOpenEvent(null);
    } else {
      setAdminSection(s);
      setView('landing');
      setDetailOpen(false);
      setSideChat(null);
    }
  };

  const routineSection = false;
  const inChatMode = isAdmin && adminSection === 'policies' && view === 'chat';

  // ========== Build body ==========
  let body = null;

  if (isHome) {
    if (openEvent) {
      body = <EventDetail
        onBack={() => {setOpenEvent(null);setEventChatOpen(false);}}
        onOpenChat={() => setEventChatOpen((o) => !o)}

    } else if (homeSection === 'home-events') {
      body = <HomeEventsList goEvent={(id) => {setOpenEvent(id);setEventChatOpen(false);}} />;
    } else if (homeSection === 'home-routines') {
      // Routines lives under Home now.
      if (view === 'chat') {
        body = <RoutinesChat onClose={() => {setView('landing'); window.__editingRoutine = null;}}
        initialPrompt={window.__routinePrompt}
        initialRoutine={window.__editingRoutine}
        onSave={(r) => {
          setRoutines((rs) => {
            const idx = rs.findIndex(x => x.id === r.id);
            if (idx >= 0) { const next = [...rs]; next[idx] = r; return next; }
            return [r, ...rs];
          });
          setTimeout(() => {setView('landing'); window.__editingRoutine = null;}, 900);
        }} />;
      } else if (view === 'empty') {
        body = <RoutinesEmpty
          onSubmit={(p) => {window.__routinePrompt = p;setView('chat');}}
          onPickTemplate={(t) => {window.__routinePrompt = `Create a routine: ${t.label.toLowerCase()}`;setView('chat');}} />;
      } else {
        body = <RoutinesList
          routines={routines}
          toggleRoutine={toggleRoutine}
          openRoutine={(r) => setOpenRoutine(r)}
          onSubmit={(p) => {window.__routinePrompt = p;setView('chat');}}
          onPickTemplate={(t) => {window.__routinePrompt = `Create a routine: ${t.label.toLowerCase()}`;setView('chat');}} />;
      }
    } else {
      const titles = {
        'home-tasks': 'My tasks',
        'home-inbox': 'Inbox',
        'home-suppliers': 'Suppliers',
        'home-marketplace': 'Marketplace',
        'home-agent': 'My agent'
      };
      body =
      <div className="home-stub">
          <h1>{titles[homeSection] || 'Coming soon'}</h1>
          <p>This section is out of scope for this mock — focused on Dashboard and Events right now.</p>
          <button className="btn outline" onClick={() => setHomeSection('home-events')}>← Back to Home</button>
        </div>;

    }
  } else if (isPortal) {
    const portalTitles = {
      'portal-home': 'Portal',
      'portal-requests': 'My requests',
      'portal-new-request': 'New request',
      'portal-catalog': 'Service catalog',
      'portal-help': 'Help & guides'
    };
    body =
    <div className="home-stub">
        <h1>{portalTitles[portalSection] || 'Portal'}</h1>
        <p>Portal lets employees request events and services. Out of scope for this mock — Home and Admin are the priority.</p>
        <button className="btn outline" onClick={() => setMode('home')}>← Back to Home</button>
      </div>;

  } else if (adminSection === 'policies') {
    if (view === 'chat') {
      body = <PoliciesChat onClose={() => {setView('landing'); window.__editingPolicy = null;}}
      initialPolicy={window.__editingPolicy}
      onSave={(p) => {
        setPolicies((ps) => {
          const idx = ps.findIndex(x => x.id === p.id);
          if (idx >= 0) { const next = [...ps]; next[idx] = p; return next; }
          return [p, ...ps];
        });
        window.__editingPolicy = null;
        setView('landing');
      }} />;
    } else {
      body = <PoliciesLanding
        policies={policies}
        togglePolicy={togglePolicy}
        openDetail={(id) => {const p = policies.find((x) => x.id === id);setDetailPolicy({ mode: 'active', policy: p });setDetailOpen(true);}}
        openSuggested={(p) => {setDetailPolicy({ mode: 'suggested', policy: p });setDetailOpen(true);}}
        goInsights={() => {setAdminSection('insights');setView('landing');}}
        openChat={() => setView('chat')} />;
    }
  } else if (adminSection === 'insights') {
    body = <Insights onAskAI={askAI} onOpenSuggested={(s) => setSuggestedAction(s)} />;
  } else if (adminSection === 'users') {
    body = <Users />;
  } else if (adminSection === 'events') {
    body = <Events />;
  } else if (adminSection === 'invoices') {
    body = <Invoices />;
  } else if (adminSection === 'contracts') {
    body = <Contracts />;
  } else if (adminSection === 'taskreporting') {
    body = <TaskReporting />;
  } else if (adminSection === 'approvals') {
    body = <Approvals />;
  } else if (adminSection === 'preferred') {
    body = <Preferred />;
  } else if (adminSection === 'intakeforms') {
    body = <IntakeForms />;
  } else if (adminSection === 'settings') {
    body = <CompanySettings />;
  } else if (adminSection === 'offices') {
    body = <Offices />;
  } else if (adminSection === 'spaces') {
    body = <Spaces />;
  } else if (adminSection === 'requests') {
    body = <Requests />;
  } else if (adminSection === 'dashboard') {
    body = <Dashboard tab={dashboardTab} setTab={setDashboardTab} />;
  } else {
    body =
    <div className="home-stub" style={{ padding: "0px" }}>
        <h1>{adminSection.charAt(0).toUpperCase() + adminSection.slice(1)}</h1>
        <p>This section is out of scope for this mock.</p>
      </div>;

  }

  const showSideChat = !!sideChat && !inChatMode && isAdmin;
  const mainHidden = focusMode;

  // Home breadcrumb — array of segments; last is current page.
  const homeCrumb = (() => {
    if (!isHome) return null;
    // Event detail: Home > Event name
    if (openEvent) return [
    { label: 'Home', onBack: () => {setOpenEvent(null);setEventChatOpen(false);} },
    { label: 'Summer Design Summit' }];

    // Routines creation/chat subpage: Routines > New routine
    if (homeSection === 'home-routines' && view === 'chat') return [
    { label: 'Routines', onBack: () => setView('landing') },
    { label: 'New routine' }];

    const map = {
      'home-events': { cur: null },
      'home-tasks': { cur: 'My tasks' },
      'home-routines': { cur: 'Routines' },
      'home-inbox': { cur: 'Inbox' },
      'home-suppliers': { cur: 'Suppliers' },
      'home-marketplace': { cur: 'Marketplace' },
      'home-agent': { cur: 'My agent' }
    };
    const m = map[homeSection] || { cur: null };
    if (!m.cur) return [{ label: 'Home' }];
    // Routines landing: no back button — top-level Home tab
    if (homeSection === 'home-routines') return [
    { label: 'Home' },
    { label: m.cur }];

    return [
    { label: 'Home', onBack: () => setHomeSection('home-events') },
    { label: m.cur }];

  })();

  // Admin page-head config — title (overrides crumb's last segment) + right-side action button(s).
  // Each page used to render its own .*-page-head; that's been hoisted into the Topbar.
  const adminPageHead = (() => {
    if (isHome) return null;
    const btnSm = { height: 28, fontSize: 12 };
    const map = {
      users: {
        title: 'Adoption',
        right: <button className="btn" style={btnSm}><I.plus size={12} /> Add users</button>
      },
      spaces: {
        title: 'Internal spaces',
        right: <button className="btn" style={btnSm}>Share form</button>
      },
      intakeforms: {
        title: 'Intake forms',
        right: <button className="btn" style={btnSm}>Share form</button>
      },
      invoices: {
        title: 'Invoices',
        right: (
          <>
            <button className="btn outline" style={btnSm}><I.filter size={12} /> Filters</button>
            <button className="btn outline" style={btnSm}>USD <I.chevronDown size={11} /></button>
          </>
        )
      },
      preferred: { title: 'Preferred', right: null },
      taskreporting: { title: 'Task reporting', right: null },
      requests: { title: 'Requests', right: null },
      events: {
        title: 'Events',
        right: (
          <div className="ev-view-toggle" style={{ marginRight: 4 }}>
            <button className="ev-view-btn"><I.grid2 size={13} /></button>
            <button className="ev-view-btn active"><I.list size={13} /></button>
          </div>
        )
      },
      approvals: { title: 'Approvals', right: null },
      settings: {
        title: 'Company settings',
        right: <button className="btn" style={btnSm}><I.check size={12} /> Save</button>
      },
      offices: {
        title: 'Offices',
        right: <button className="btn outline" style={btnSm}><I.plus size={12} /> Add office</button>
      },
      contracts: { title: 'Contracts', right: null },
      dashboard: {
        title: 'Events report',
        right: dashboardTab === 'suppliers' ? null : dashboardTab === 'time-savings' ? (
          <>
            <button className="btn outline" style={btnSm}>
              <span style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center', width: 14, height: 14, borderRadius: 999, border: '1px dashed currentColor', color: 'var(--muted-foreground)', fontSize: 11, lineHeight: 1, marginRight: 4 }}>+</span>
              Event dates <I.chevronDown size={11} />
            </button>
            <input
              type="text"
              defaultValue="$75.00"
              aria-label="Hourly rate"
              style={{ width: 78, height: 28, padding: '0 8px', border: '1px solid var(--border)', borderRadius: 6, fontSize: 12, textAlign: 'right', background: 'var(--background)', color: 'var(--foreground)' }}
            />
            <button className="btn outline" style={btnSm}><I.filter size={12} /> Filters</button>
            <button className="btn outline" style={btnSm}>USD <I.chevronDown size={11} /></button>
          </>
        ) : (
          <>
            <button className="btn outline" style={btnSm}><I.filter size={12} /> Filters</button>
            <button className="btn outline" style={btnSm}>USD <I.chevronDown size={11} /></button>
          </>
        )
      }
    };
    return map[adminSection] || null;
  })();

  return (
    <div className={`app ${collapsed ? 'mini' : ''} ${showSideChat ? 'has-side-chat' : ''} ${focusMode ? 'focus' : ''}`}
    style={showSideChat ? { '--side-chat-w': sideChatW + 'px' } : undefined}>
      <Sidebar mode={mode} setMode={(m) => {
        setMode(m);
        setOpenEvent(null);
        setEventChatOpen(false);
        setSideChat(null);
        setDetailOpen(false);
      }}
      section={section} setSection={setSection}
      collapsed={collapsed} onToggle={() => setCollapsed((c) => !c)}
      focusMode={focusMode} onToggleFocus={() => setFocusMode((f) => !f)}
      pastChats={pastChats}
      onOpenAIChat={() => askAI('New chat')} />

      <div className={`panel ${showSideChat ? 'panel-split' : ''}`}>
        {showSideChat &&
        <>
            <SideChatPane chat={sideChat} onClose={() => setSideChat(null)}
          onToggleSidebar={() => setCollapsed((c) => !c)} />
            <SideChatResizer width={sideChatW} setWidth={setSideChatW} collapsed={collapsed} />
          </>
        }

        {!mainHidden && <div className="main">
        {!inChatMode && <Topbar
          section={section}
          homeCrumb={homeCrumb}
          onToggleSidebar={() => setCollapsed((c) => !c)}
          minimizeMode={false}
          showSidebarToggle={!collapsed && !showSideChat}
          title={adminPageHead && adminPageHead.title}
          right={!isHome && adminSection === 'policies' ?
          <button className="btn" style={{ height: 28, fontSize: 12 }} onClick={() => setView('chat')}>
              <I.plus size={12} /> New policy
            </button> :
          !isHome && adminSection === 'insights' ?
          <>
              <button className="btn outline" style={{ height: 28, fontSize: 12 }}>
                <I.filter size={12} /> Filters
              </button>
            </> :
          !isHome && adminPageHead && adminPageHead.right ? adminPageHead.right :
          isHome && homeSection === 'home-routines' && view !== 'chat' ?
          <button className="btn" style={{ height: 28, fontSize: 12 }} onClick={() => setView('chat')}>
              <I.plus size={12} /> New routine
            </button> :
          isHome && homeSection === 'home-routines' && view === 'chat' ?
          <>
              <button className="btn outline" style={{ height: 28, fontSize: 12 }} onClick={() => window.__routinesChatCancel && window.__routinesChatCancel()}>Cancel</button>
              <button className="btn" style={{ height: 28, fontSize: 12, opacity: window.__routinesChatCanSave ? 1 : 0.4, pointerEvents: window.__routinesChatCanSave ? 'auto' : 'none' }} onClick={() => window.__routinesChatSave && window.__routinesChatSave()}>
                <I.check size={12} /> {window.__routinesChatSaved ? 'Saved' : 'Save & enable'}
              </button>
            </> :
          isHome && homeSection === 'home-events' && !openEvent ?
          <button className="btn" style={{ height: 28, fontSize: 12 }}>
              <I.plus size={12} /> New event
            </button> :
          null} />}
        <div className={`content ${isHome && openEvent ? 'content-event' : ''}`} style={{ padding: "0px" }}>
          {body}
        </div>
      </div>}
      </div>

      {mainHidden &&
      <button className="restore-pill" onClick={() => setFocusMode(false)} title="Bring dashboard back">
          <div className="rp-preview">
            <div className="rp-bar" style={{ padding: "14px 14px 14px 18px" }}></div>
            <div className="rp-bar short"></div>
            <div className="rp-bar shorter"></div>
          </div>
          <span className="rp-label">{section.charAt(0).toUpperCase() + section.slice(1)}</span>
          <I.chevron size={12} style={{ transform: 'rotate(180deg)' }} />
        </button>
      }

      {detailOpen && !isHome && adminSection === 'policies' && view !== 'chat' &&
      <PolicyDetailFlyout
        mode={detailPolicy?.mode || 'active'}
        policy={detailPolicy?.policy}
        onClose={() => setDetailOpen(false)}
        onEdit={() => {window.__editingPolicy = detailPolicy?.policy; setDetailOpen(false);setView('chat');}} />
      }

      {openRoutine && isHome && homeSection === 'home-routines' &&
      <RoutineDetailFlyout
        routine={openRoutine}
        onClose={() => setOpenRoutine(null)}
        onToggle={() => {toggleRoutine(openRoutine.id);setOpenRoutine((r) => r ? { ...r, on: !r.on } : r);}}
        onEdit={() => {window.__routinePrompt = openRoutine.desc || openRoutine.name; window.__editingRoutine = openRoutine; setOpenRoutine(null);setView('chat');}}
        onDelete={() => {setRoutines((rs) => rs.filter((r) => r.id !== openRoutine.id));setOpenRoutine(null);}}
        onDuplicate={() => {const copy = { ...openRoutine, id: 'r-' + Date.now(), name: openRoutine.name + ' (copy)', on: false };setRoutines((rs) => [copy, ...rs]);setOpenRoutine(null);}}
        onRunNow={() => {setOpenRoutine(null);}} />
      }

      {suggestedAction &&
      <SuggestedActionFlyout
        action={suggestedAction}
        onClose={() => setSuggestedAction(null)}
        onAskAI={askAI} />
      }
    </div>);

}

// Left-side chat pane that appears next to Insights on Ask AI
function SideChatPane({ chat, onClose, onToggleSidebar }) {
  const title = chat?.title || 'Ask AI';
  const trim = title.length > 40 ? title.slice(0, 37) + '...' : title;
  const buildResponse = (t) => {
    const lower = t.toLowerCase();
    if (lower.includes('room block') || lower.includes('over-estimation')) {
      return {
        bullets: [
        '11 events hit with attrition fees this FY',
        'Total penalties: $28,400',
        'SF avg over-estimation: 26%',
        'NYC avg over-estimation: 19%',
        'Top offender: Engineering All-Hands (Feb) — 40 unused rooms'],

        outro: "A policy requiring historical attendance data before sizing would eliminate most of this. Want me to draft it?"
      };
    }
    if (lower.includes('hyatt') || lower.includes('preferred rate')) {
      return {
        bullets: [
        '14 Hyatt events this year totaling $218K',
        'No corporate rate — paying list',
        'Target savings: 18–24% = $39K–52K/yr',
        'Hyatt Global Sales already has a deck for you'],

        outro: "I can open a sourcing request and pre-fill the rate sheet. Continue?"
      };
    }
    if (lower.includes('3 quotes') || lower.includes('competitive')) {
      return {
        bullets: [
        'Only 34% of $25K+ events collected 3 quotes',
        'Events that did collect 3 quotes saved 18% more on average',
        'Top miss: Catering (only 12% multi-quote)',
        'Projected savings: $94K/yr'],

        outro: "Want me to propose a 'require 3 quotes' policy for events over $25K?"
      };
    }
    if (lower.includes('ai-first') || lower.includes('sourcing')) {
      return {
        bullets: [
        'AI-assisted sourcing: 0.8 hrs avg',
        'Manual sourcing: 6.2 hrs avg',
        '68 events sourced manually this year = 425 hours',
        'Quality scores are equal on both paths'],

        outro: "Shall I make AI-first the default and keep manual as an override?"
      };
    }
    if (lower.includes('recommendation') || lower.includes('break down')) {
      return {
        bullets: [
        'Require 3 quotes above $25K — $94K/yr impact',
        'Hyatt preferred rate — $38–52K/yr impact',
        'Fix room block sizing — $28K/yr impact',
        'Mandate AI-first sourcing — 425 hrs/yr saved',
        'Planner approval for AV over $10K — compliance +6pts'],

        outro: "I can queue drafts for all five or prioritize the top 3 — which would you like?"
      };
    }
    return {
      bullets: [
      "I've pulled the last 90 days of data tied to this.",
      'Preliminary estimate shows meaningful impact.',
      'Risk is low if rolled out to admins first.'],

      outro: 'Want me to prepare a short recommendation?'
    };
  };
  const resp = buildResponse(title);
  const now = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });

  return (
    <div className="side-chat">
      <div className="sc-head">
        <button className="icon-btn" onClick={onToggleSidebar} title="Toggle sidebar"><I.sidebar size={16} /></button>
        <div className="sc-title">{trim}</div>
        <button className="icon-btn" style={{ marginLeft: 'auto' }} onClick={onClose} title="Close chat"><I.close size={15} /></button>
      </div>
      <div className="sc-feed">
        <div className="msg user">
          <div className="col" style={{ alignItems: 'flex-end' }}>
            <div className="hdr"><span>{now}</span> <span className="name">Denny Lavacca</span>
              <span className="av"><img src="assets/denny.webp" alt="" onError={(e) => {e.target.style.display = 'none';}} /></span>
            </div>
            <div className="bubble">Tell me more about: {title.charAt(0).toLowerCase() + title.slice(1)}</div>
          </div>
        </div>
        <div className="msg">
          <div className="av" style={{ background: 'var(--decorative-lavender-300)' }}><span style={{ color: '#fff', font: '500 10px/1 var(--font-sans)' }}>M</span></div>
          <div className="col">
            <div className="hdr"><span className="name">Marcy</span> <span>{now}</span></div>
            <div className="bubble" style={{ font: '400 13.5px/1.55 var(--font-sans)' }}>
              <div style={{ fontWeight: 500, marginBottom: 8 }}>{title.replace(/\.$/, '')} — breakdown:</div>
              <ul style={{ margin: 0, paddingLeft: 18, display: 'flex', flexDirection: 'column', gap: 3 }}>
                {resp.bullets.map((b, i) => <li key={i}>{b}</li>)}
              </ul>
              <div style={{ marginTop: 10 }}>{resp.outro}</div>
            </div>
          </div>
        </div>
      </div>
      <div className="sc-actions">
        <button className="sc-action primary"><I.check size={13} /> Review policy & approve</button>
        <button className="sc-action"><I.close size={13} /> Save and exit</button>
        <button className="sc-action"><I.edit size={13} /> Something else</button>
      </div>
      <div className="sc-input">
        <div className="box">
          <input placeholder="Reply to Marcy..." />
          <button className="send"><I.arrowUp size={13} /></button>
        </div>
        <div className="disclaimer">Planned uses AI, the output can have mistakes. Please double-check responses.</div>
      </div>
    </div>);

}
window.SideChatPane = SideChatPane;

function SideChatResizer({ width, setWidth, collapsed }) {
  const startRef = useRefA({ x: 0, w: 0 });
  const sidebarW = collapsed ? 56 : 248;
  const onDown = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, w: width };
    const onMove = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const nw = Math.min(Math.max(startRef.current.w + dx, 320), 560);
      setWidth(nw);
    };
    const onUp = () => {
      window.removeEventListener('pointermove', onMove);
      window.removeEventListener('pointerup', onUp);
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    };
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp);
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  };
  return <div className="sc-resizer" onPointerDown={onDown} title="Drag to resize"><span /></div>;
}
window.SideChatResizer = SideChatResizer;

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
