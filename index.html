  <style>
/* ==========================================================================
   Planned Design System — Tokens
   Source: packages/ui/src/styles/globals.css (@planned/ui)
   --------------------------------------------------------------------------
   The canonical @planned/ui system is Tailwind v4 + Base UI + shadcn primitives.
   This file mirrors the CSS custom properties as a plain, framework-free stylesheet
   that can be consumed by the HTML mocks and UI-kit previews in this project.
   Values match the live tokens exactly.
   ========================================================================== */

/* ---------- Fonts ---------------------------------------------------------- */
@font-face {
  font-family: 'Aeonik';
  src: url('fonts/Aeonik-Regular.ttf') format('truetype');
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'Aeonik';
  src: url('fonts/Aeonik-Medium.ttf') format('truetype');
  font-weight: 500;
  font-style: normal;
  font-display: swap;
}
/* AeonikPro OTFs the user attached — kept as an optional higher-quality upgrade. */
@font-face {
  font-family: 'Aeonik Pro';
  src: url('fonts/AeonikPro-Regular.otf') format('opentype');
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'Aeonik Pro';
  src: url('fonts/AeonikPro-Medium.otf') format('opentype');
  font-weight: 500;
  font-style: normal;
  font-display: swap;
}

:root {
  /* --- Core palette (OKLCH, matching globals.css) ---------------------- */
  --background: oklch(1 0 0);
  --foreground: oklch(0.145 0 0);
  --card: oklch(1 0 0);
  --card-foreground: oklch(0.145 0 0);
  --popover: oklch(1 0 0);
  --popover-foreground: oklch(0.145 0 0);
  --primary: oklch(0.205 0 0);
  --primary-foreground: oklch(0.985 0 0);
  --secondary: oklch(0.97 0 0);
  --secondary-foreground: oklch(0.205 0 0);
  --muted: oklch(0.97 0 0);
  --muted-foreground: oklch(0.556 0 0);
  --accent: oklch(0.97 0 0);
  --accent-foreground: oklch(0.205 0 0);
  --destructive: oklch(0.545 0.1998 33.25);
  --warning: oklch(0.968 0.0305 81.76);
  --warning-foreground: oklch(0.5294 0.08 56.11);
  --positive: oklch(0.9625 0.0336 157.66);
  --positive-foreground: oklch(0.5064 0.1249 154.5);
  --active: oklch(0.9656 0.0171 248.01);
  --active-foreground: oklch(0.5646 0.1787 254.66);
  --border: oklch(0.922 0 0);
  --input: oklch(0.922 0 0);
  --ring: oklch(0.708 0 0);

  /* --- Functional colors (from design-tokens.tokens-V2.json) --------
     Four semantic ramps for state + intent. Each has four roles:
       -subtle   bg tint used for badges, callouts, hover-bleed
       -primary  the canonical color — used for icons, borders, solid fills
       -active   brighter/saturated variant for hover / active states
       -disabled muted neutralized version
     Shadcn's neutral `--primary` is kept as-is (for buttons); these
     functional tokens are additive.                                      */
  --action-subtle:    #ebf5ff;   /* blue 100 */
  --action-primary:   #0c74db;   /* blue 600 */
  --action-active:    #1f8fff;   /* blue 500 */
  --action-disabled:  #f0f3f5;

  --positive-subtle:   #e1faea;  /* green 100 */
  --positive-primary:  #057943;  /* green 700 */
  --positive-active:   #00b25f;  /* green 500 */
  --positive-disabled: #ebf2ef;

  --warning-subtle:    #fff3de;  /* yellow 100 */
  --warning-primary:   #8f5f3c;  /* yellow 700 */
  --warning-active:    #ff9928;  /* yellow 500 */
  --warning-disabled:  #f5f0e9;

  --alert-subtle:      #ffe9e0;  /* red 100 */
  --alert-primary:     #ca2a00;  /* red 700 */
  --alert-active:      #ff4300;  /* red 500 */
  --alert-disabled:    #f2edeb;

  /* --- Decorative palette ---------------------------------------------
     Five hues × 4 steps (100/300/600/900). Used for event badges, user
     avatars, illustrations — NOT for state or action. Each hue has a
     consistent lightness arc tuned for both bg and text.                  */
  --decorative-lavender-100:  #f4f0fa;
  --decorative-lavender-300:  #e4d4f7;
  --decorative-lavender-600:  #aa82d9;
  --decorative-lavender-900:  #5d4080;

  --decorative-butterfly-pea-100: #f0f6fa;
  --decorative-butterfly-pea-300: #d4e8f7;
  --decorative-butterfly-pea-600: #5fb2ed;
  --decorative-butterfly-pea-900: #2d5d80;

  --decorative-mint-100:  #f0faf7;
  --decorative-mint-300:  #c4eee3;
  --decorative-mint-600:  #7fd4bd;
  --decorative-mint-900:  #2e6657;

  --decorative-matcha-100: #f6faf0;
  --decorative-matcha-300: #ddf0c2;
  --decorative-matcha-600: #b0d47f;
  --decorative-matcha-900: #3b4d22;

  --decorative-champagne-100: #faf3f0;
  --decorative-champagne-300: #e2d4cf;
  --decorative-champagne-600: #d4967f;
  --decorative-champagne-900: #4d2e22;

  /* Chart ramp — a cool, blue-leaning analogous set */
  --chart-1: oklch(0.809 0.105 251.813);
  --chart-2: oklch(0.623 0.214 259.815);
  --chart-3: oklch(0.546 0.245 262.881);
  --chart-4: oklch(0.488 0.243 264.376);
  --chart-5: oklch(0.424 0.199 265.638);

  /* Sidebar (slightly lighter canvas than main bg) */
  --sidebar: oklch(0.985 0 0);
  --sidebar-foreground: oklch(0.145 0 0);
  --sidebar-primary: oklch(0.205 0 0);
  --sidebar-primary-foreground: oklch(0.985 0 0);
  --sidebar-accent: oklch(0.97 0 0);
  --sidebar-accent-foreground: oklch(0.205 0 0);
  --sidebar-border: oklch(0.922 0 0);
  --sidebar-ring: oklch(0.708 0 0);

  /* --- Radii ----------------------------------------------------------- */
  --radius:      8px;                /* md — base */
  --radius-sm:   6px;
  --radius-md:   8px;
  --radius-lg:  10px;
  --radius-xl:  12px;
  --radius-2xl: 14px;
  --radius-full: 9999px;

  /* --- Typography ------------------------------------------------------ */
  --font-sans: 'Aeonik', 'Aeonik Pro', ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  --font-heading: var(--font-sans);
  --font-mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;  /* Semantic text roles (used throughout previews) */
  --text-display: 600 40px/1.05 var(--font-sans);
  --text-h1: 500 28px/1.15 var(--font-sans);
  --text-h2: 500 20px/1.25 var(--font-sans);
  --text-h3: 500 16px/1.3 var(--font-sans);
  --text-body: 400 14px/1.45 var(--font-sans);
  --text-body-sm: 400 13px/1.45 var(--font-sans);
  --text-caption: 400 12px/1.4 var(--font-sans);
  --text-micro: 500 11px/1.3 var(--font-sans);

  /* --- Spacing scale (Tailwind-aligned) -------------------------------- */
  --space-0: 0;
  --space-1: 4px;
  --space-2: 8px;
  --space-2-5: 10px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 20px;
  --space-6: 24px;
  --space-8: 32px;
  --space-10: 40px;
  --space-12: 48px;

  /* --- Elevation — Tailwind v4 shadow scale ---------------------------- */
  --ring-hairline: 0 0 0 1px color-mix(in oklab, oklch(0.145 0 0) 10%, transparent);
  --shadow-2xs: 0 1px rgb(0 0 0 / 0.05);
  --shadow-xs:  0 1px 2px 0 rgb(0 0 0 / 0.05);
  --shadow-sm:  0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
  --shadow-md:  0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
  --shadow-lg:  0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
  --shadow-xl:  0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
  --shadow-2xl: 0 25px 50px -12px rgb(0 0 0 / 0.25);
  --shadow-ring: 0 0 0 1px rgb(0 0 0 / 0.1);
  --shadow-ring-inset: inset 0 0 0 1px rgb(0 0 0 / 0.1);

  /* --- Motion ---------------------------------------------------------- */
  --duration-fast: 100ms;
  --duration-base: 200ms;
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
}

.dark {
  --background: oklch(0.145 0 0);
  --foreground: oklch(0.985 0 0);
  --card: oklch(0.205 0 0);
  --card-foreground: oklch(0.985 0 0);
  --popover: oklch(0.205 0 0);
  --popover-foreground: oklch(0.985 0 0);
  --primary: oklch(0.922 0 0);
  --primary-foreground: oklch(0.205 0 0);
  --secondary: oklch(0.269 0 0);
  --secondary-foreground: oklch(0.985 0 0);
  --muted: oklch(0.269 0 0);
  --muted-foreground: oklch(0.708 0 0);
  --accent: oklch(0.269 0 0);
  --accent-foreground: oklch(0.985 0 0);
  --destructive: oklch(0.704 0.191 22.216);
  --border: oklch(1 0 0 / 10%);
  --input: oklch(1 0 0 / 15%);
  --ring: oklch(0.556 0 0);
  --sidebar: oklch(0.205 0 0);
  --sidebar-foreground: oklch(0.985 0 0);
  --sidebar-primary: oklch(0.488 0.243 264.376);
  --sidebar-primary-foreground: oklch(0.985 0 0);
  --sidebar-accent: oklch(0.269 0 0);
  --sidebar-accent-foreground: oklch(0.985 0 0);
  --sidebar-border: oklch(1 0 0 / 10%);
  --sidebar-ring: oklch(0.556 0 0);
}

/* ---------- Semantic element styles (used by preview cards) ------------- */
html, body { background: var(--background); color: var(--foreground); }
body { font: var(--text-body); -webkit-font-smoothing: antialiased; }

h1 { font: var(--text-h1); letter-spacing: -0.01em; }
h2 { font: var(--text-h2); letter-spacing: -0.005em; }
h3 { font: var(--text-h3); }
p  { font: var(--text-body); color: var(--foreground); }
small, .caption { font: var(--text-caption); color: var(--muted-foreground); }

code, pre, kbd {
  font-family: var(--font-mono);
  font-size: 0.875em;
}

</style>
  <style>

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body { background: #fff; color: var(--foreground); font: var(--text-body); -webkit-font-smoothing: antialiased; }
button { font-family: inherit; }

/* ===== App shell =====
   Canvas is slightly darker so the unified white .panel card floats above it.
   Sidebar sits on the canvas; .panel is the single white surface. */
.app {
  display: grid;
  grid-template-columns: 248px 1fr;
  height: 100vh;
  overflow: hidden;
  padding: 8px 8px 8px 0;
  gap: 0;
  box-sizing: border-box;
  background: oklch(0.975 0 0);
  transition: grid-template-columns .28s cubic-bezier(0.4, 0, 0.2, 1);
}
.app.mini { grid-template-columns: 56px 1fr; }

/* ===== Unified white panel =====
   THE white card. Owns all the rounding, border, and shadow.
   Both .side-chat and .main are flat children — no individual card styling. */
.panel {
  display: flex;
  position: relative;
  height: 100%;
  min-width: 0;
  min-height: 0;
  overflow: hidden;
  border-radius: 14px;
  background: #fff;
  border: 1px solid oklch(0.91 0 0);
}

/* .main: flat flex column, fills remaining width */
.panel > .main {
  flex: 1 1 0;
  min-width: 0;
  min-height: 0;
  display: flex;
  flex-direction: column;
  background: #fff;
  overflow: hidden;
  /* no border-radius, no box-shadow, no margin — panel owns those */
}

/* .side-chat: flat, fixed width, right border as the divider */
.panel > .side-chat {
  flex: 0 0 var(--side-chat-w, 380px);
  min-width: 0;
  height: 100%;
  background: #fff;
  border-right: 1px solid oklch(0.92 0 0);
  /* no border-radius, no box-shadow — panel owns those */
}

/* .side-chat interior layout — no card styling (panel owns that) */
.side-chat {
  background: #fff;
  display: flex; flex-direction: column;
  height: 100%;
  overflow: hidden;
  min-width: 0;
  min-height: 0;
  position: relative;
}
.sc-head { display: flex; align-items: center; gap: 8px; padding: 0 12px; height: 50px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.sc-head .icon-btn { background: none; border: none; cursor: pointer; color: var(--muted-foreground); padding: 6px; border-radius: 6px; display: inline-flex; }
.sc-head .icon-btn:hover { background: var(--muted); color: var(--foreground); }
.sc-title { font: 500 13.5px/1.2 var(--font-sans); color: var(--foreground); letter-spacing: -0.005em; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sc-feed { flex: 1; overflow-y: auto; padding: 18px 20px; display: flex; flex-direction: column; gap: 18px; }
.sc-feed .msg { display: flex; gap: 10px; }
.sc-feed .msg.user { flex-direction: row-reverse; }
.sc-feed .msg .av { width: 22px; height: 22px; border-radius: 50%; overflow: hidden; flex-shrink: 0; background: var(--muted); display: inline-flex; align-items: center; justify-content: center; }
.sc-feed .msg .av img { width: 100%; height: 100%; object-fit: cover; }
.sc-feed .msg .col { display: flex; flex-direction: column; gap: 6px; min-width: 0; max-width: 100%; }
.sc-feed .msg .hdr { display: flex; align-items: center; gap: 6px; font: 400 11px/1 var(--font-sans); color: var(--muted-foreground); }
.sc-feed .msg .hdr .name { color: var(--foreground); font-weight: 500; }
.sc-feed .msg .bubble { background: var(--muted); border-radius: 10px; padding: 10px 12px; font: 400 13.5px/1.55 var(--font-sans); color: var(--foreground); }
.sc-feed .msg.user .bubble { background: color-mix(in oklab, var(--action-subtle) 80%, transparent); }
.sc-actions { padding: 8px 16px 0; display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; }
.sc-action { background: none; border: none; text-align: left; padding: 8px 10px; border-radius: 7px; font: 400 13px/1 var(--font-sans); color: var(--foreground); cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
.sc-action svg { color: var(--muted-foreground); }
.sc-action:hover { background: var(--muted); }
.sc-action.primary { background: var(--muted); font-weight: 500; }
.sc-action.primary svg { color: var(--foreground); }
.sc-input { padding: 10px 16px 14px; flex-shrink: 0; }
.sc-input .box { display: flex; align-items: center; gap: 6px; background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 6px 6px 6px 12px; }
.sc-input input { flex: 1; border: none; outline: none; background: transparent; font: 400 13.5px/1.4 var(--font-sans); color: var(--foreground); min-width: 0; }
.sc-input input::placeholder { color: var(--muted-foreground); }
.sc-input .send { width: 26px; height: 26px; border-radius: 7px; background: var(--foreground); color: #fff; border: none; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
.sc-input .disclaimer { margin-top: 8px; text-align: center; font: 400 10.5px/1.35 var(--font-sans); color: var(--muted-foreground); }

/* Drag handle styles consolidated below (around line 915) */

.sidebar { background: var(--sidebar); border-right: none; display: flex; flex-direction: column; padding: 0 0 0; height: 100%; position: sticky; top: 0; overflow: hidden; }
.sidebar.mini { width: 56px; grid-template-columns: none; }
.sidebar.mini .nav-item span, .sidebar.mini .sb-section, .sidebar.mini .brand-text, .sidebar.mini .ws-text, .sidebar.mini .ws-chev, .sidebar.mini .count, .sidebar.mini .ws-avatar .av-name { display: none; }
.sidebar.mini .nav-item { justify-content: center; padding: 7px 0; width: 28px; margin: 1px auto; border-radius: 7px; }
.sidebar.mini .brand { justify-content: center; padding: 10px 0; }
.sidebar.mini .workspace { justify-content: center; padding: 10px 0; }
.sidebar.mini .ws-avatar { margin: 0; }

.sb-head { display: flex; align-items: center; justify-content: space-between; padding: 0 12px 0 14px; height: 50px; flex-shrink: 0; }
.sidebar.mini .sb-head { padding: 0; justify-content: center; }
.sidebar.mini .tgl { display: none; }
.brand { display: flex; align-items: center; gap: 8px; font: 500 15px/1 var(--font-sans); letter-spacing: -0.01em; }
.brand svg.logo { width: 22px; height: 22px; color: var(--foreground); }
.brand-text { color: var(--foreground); }
.sb-head .tgl { background: none; border: none; cursor: pointer; color: var(--muted-foreground); padding: 4px; border-radius: 6px; display: inline-flex; }
.sb-head .tgl:hover { background: var(--muted); color: var(--foreground); }

.nav { display: flex; flex-direction: column; padding: 0 8px; gap: 1px; flex: 1; min-height: 0; overflow-y: auto; overflow-x: hidden; scrollbar-width: thin; }
.nav::-webkit-scrollbar { width: 6px; height: 0; }
.nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.sidebar.mini .nav { overflow-x: hidden; }
.sidebar.mini .nav::-webkit-scrollbar { width: 0; height: 0; }
.sb-section { padding: 14px 8px 4px; font: 400 12px/1 var(--font-sans); color: var(--muted-foreground); }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 6px 8px; border-radius: 7px; font: 400 13px/1 var(--font-sans); color: var(--foreground); cursor: pointer; background: none; border: none; width: 100%; text-align: left; }
.nav-item:hover { background: var(--muted); }
.nav-item.active { background: color-mix(in oklab, var(--action-subtle) 70%, transparent); color: var(--action-primary); }
.nav-item.active svg { color: var(--action-primary); }
.nav-item svg { width: 16px; height: 16px; color: var(--muted-foreground); flex-shrink: 0; }
.nav-item .count { margin-left: auto; font: 500 10px/1 var(--font-sans); color: var(--action-primary); background: var(--action-subtle); padding: 3px 5px; border-radius: 4px; letter-spacing: 0.04em; }
.nav-item .time { margin-left: auto; font: 400 11px/1 var(--font-sans); color: var(--muted-foreground); }
.nav-item.muted { color: var(--muted-foreground); }
.nav-item.muted svg { color: var(--muted-foreground); }

.workspace { margin-top: auto; padding: 10px 10px 10px; display: flex; align-items: center; gap: 9px; border-top: 1px solid var(--border); flex-shrink: 0; }
.sidebar.mini .workspace { padding: 10px 7px; }
.ws-avatar { width: 26px; height: 26px; border-radius: 50%; background: var(--decorative-champagne-600); color: #fff; display:inline-flex; align-items:center; justify-content:center; font: 500 11px/1 var(--font-sans); overflow: hidden; flex-shrink: 0; }
.ws-avatar img { width:100%; height:100%; object-fit: cover; }
.ws-text { flex:1; min-width:0; font: 400 13px/1.2 var(--font-sans); }
.ws-chev { color: var(--muted-foreground); }

/* ===== Main content — flat flex column, panel owns the card styling ===== */
.main {
  display: flex; flex-direction: column; min-width: 0; min-height: 0;
  background: #fff;
  height: 100%;
  margin: 0;
  overflow: hidden;
}
.topbar { height: 46px; display: flex; align-items: center; justify-content: space-between; padding: 0 18px 0 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.tb-left { display:flex; align-items:center; gap: 10px; }
.tb-left .icon-btn { background: none; border: none; cursor: pointer; color: var(--muted-foreground); padding: 6px; border-radius: 6px; display: inline-flex; }
.tb-left .icon-btn:hover { background: var(--muted); color: var(--foreground); }
.crumb { display: flex; align-items: center; gap: 8px; font: 400 13px/1 var(--font-sans); color: var(--muted-foreground); }
.crumb .sep { color: var(--border); }
.crumb .cur { color: var(--foreground); display:inline-flex; align-items:center; gap:4px; }
.crumb .cur svg { opacity: 0.4; }
.crumb.has-back { padding: 4px 8px; margin: -4px -8px; border-radius: 6px; transition: background-color .12s ease; }
.crumb.has-back:hover { background: var(--muted); }
.crumb.has-back:hover span { color: var(--foreground); }
.crumb-parent { appearance: none; background: transparent; border: none; cursor: pointer; padding: 0; margin: 0; display: inline-flex; align-items: center; color: inherit; font: inherit; position: relative; }
.crumb-parent .back-ico { width: 0; opacity: 0; margin-right: 0; transform: translateX(2px) rotate(180deg); transition: width .14s ease, opacity .14s ease, margin-right .14s ease, transform .14s ease; overflow: hidden; }
.crumb-parent .txt { transition: color .12s ease; }
.crumb.has-back:hover .crumb-parent { color: var(--foreground); }
.crumb.has-back:hover .crumb-parent .back-ico { width: 12px; opacity: 1; margin-right: 4px; transform: translateX(0) rotate(180deg); }
.crumb-seg { appearance: none; background: transparent; border: none; cursor: pointer; padding: 0; margin: 0; color: inherit; font: inherit; }
.crumb-seg:hover { color: var(--foreground); text-decoration: underline; text-underline-offset: 2px; }

/* Liveline chart */
.liveline { position: relative; }
.liveline canvas { display: block; }
.liveline-badge { transition: background-color .18s ease, color .18s ease, border-color .18s ease; }
.ll-windows { display: inline-flex; gap: 2px; padding: 2px; background: var(--muted); border-radius: 8px; }
.ll-windows button { appearance: none; background: transparent; border: none; cursor: pointer;
  padding: 4px 10px; border-radius: 6px; font: 500 11.5px/1 var(--font-sans); color: var(--muted-foreground);
  transition: background-color .12s ease, color .12s ease; }
.ll-windows button:hover { color: var(--foreground); }
.ll-windows button[data-active="true"] { background: #fff; color: var(--foreground); box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
.ll-windows-rounded button { border-radius: 999px; padding: 4px 10px; }
.ll-windows-text { background: transparent; padding: 0; gap: 10px; }
.ll-windows-text button { padding: 2px 2px; border-radius: 0; }
.ll-windows-text button[data-active="true"] { background: transparent; box-shadow: none; color: var(--foreground); border-bottom: 1.5px solid var(--foreground); border-radius: 0; }
.tb-right { display:flex; align-items:center; gap: 4px; color: var(--muted-foreground); }
.tb-right .icon-btn { background:none; border:none; cursor:pointer; color: var(--muted-foreground); padding: 6px; border-radius: 6px; display: inline-flex; }
.tb-right .icon-btn:hover { background: var(--muted); color: var(--foreground); }

.content { flex: 1; overflow: auto; }
.content-inner { max-width: 920px; margin: 0 auto; padding: 28px 28px 80px; }
.content-wide { max-width: 1180px; margin: 0 auto; padding: 28px 28px 80px; }

/* ===== Inputs / primitives ===== */
.btn { display:inline-flex; align-items:center; justify-content:center; gap:6px;
  height:32px; padding: 0 12px; border-radius:8px; border:1px solid transparent;
  font: 500 13px/1 var(--font-sans); cursor:pointer; transition: all .1s ease-out;
  background: var(--foreground); color: #fff; }
.btn:hover { background: var(--primary); }
.btn:active { transform: translateY(1px); }
.btn.outline { background:#fff; color: var(--foreground); border-color: var(--border); }
.btn.outline:hover { background: var(--muted); }
.btn.ghost { background: transparent; color: var(--foreground); }
.btn.ghost:hover { background: var(--muted); }
.btn.sm { height: 26px; padding: 0 10px; font-size: 12px; border-radius: 7px; }
.btn.xs { height: 22px; padding: 0 8px; font-size: 11px; border-radius: 6px; }

.input { height: 32px; padding: 0 10px; border-radius: 8px; font: 400 13px/1 var(--font-sans);
  border: 1px solid var(--border); background: #fff; color: var(--foreground); outline:none; width: 100%; }
.input:focus { border-color: var(--action-primary); box-shadow: 0 0 0 3px color-mix(in oklab, var(--action-primary) 20%, transparent); }

/* ===== Kit: template chip ===== */
.tpl-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 640px; margin: 0 auto; }
.tpl { display: flex; align-items: center; gap: 10px; padding: 11px 14px; background: #fff; border-radius: 10px;
  box-shadow: inset 0 0 0 1px var(--border); cursor: pointer; transition: background .1s, box-shadow .1s; font: 400 13px/1 var(--font-sans); outline: none; border: none; color: var(--foreground); }
.tpl:hover { background: color-mix(in oklab, var(--muted) 40%, transparent); }
.tpl:focus, .tpl:focus-visible { outline: none; box-shadow: inset 0 0 0 1px var(--border); }
.tpl svg { width: 15px; height: 15px; color: var(--muted-foreground); flex-shrink: 0; }
.tpl.active { box-shadow: inset 0 0 0 1px var(--border); background: color-mix(in oklab, var(--muted) 60%, transparent); }

/* ===== Prompt box (for empty state) ===== */
.prompt { max-width: 640px; margin: 0 auto 28px; background: #fff; border-radius: 14px;
  box-shadow: inset 0 0 0 1px var(--border); padding: 14px 16px 10px; }
.prompt textarea { width: 100%; border: none; outline: none; resize: none; background: transparent; font: 400 14px/1.4 var(--font-sans); color: var(--foreground); min-height: 44px; font-family: var(--font-sans); }
.prompt textarea::placeholder { color: var(--muted-foreground); }
.prompt .row { display: flex; align-items: center; justify-content: space-between; padding-top: 4px; }
.prompt .plus { width: 26px; height: 26px; border-radius: 50%; background: none; border: none; color: var(--muted-foreground); display:inline-flex; align-items:center; justify-content:center; cursor:pointer; }
.prompt .plus:hover { background: var(--muted); color: var(--foreground); }
.prompt .send { width: 28px; height: 28px; border-radius: 50%; background: #fff; border: 1px solid var(--border); color: var(--muted-foreground); display:inline-flex; align-items:center; justify-content:center; cursor:pointer; }
.prompt .send:hover { background: var(--muted); color: var(--foreground); }

/* ===== Centered big title ===== */
.center-head { text-align: center; margin: 40px 0 24px; }
.center-head h1 { font: 400 30px/1.1 var(--font-sans); letter-spacing: -0.02em; margin: 0 0 8px; color: var(--foreground); }
.center-head p { font: 400 13px/1.4 var(--font-sans); color: var(--muted-foreground); margin: 0; }

.section-head { display:flex; align-items:center; justify-content:space-between; margin: 48px 0 12px; }
.section-head h3 { font: 400 14px/1 var(--font-sans); margin: 0; color: var(--foreground); }
.section-head h3 .cnt { display:inline-flex; align-items:center; padding: 2px 7px; font: 500 11px/1 var(--font-sans); background: var(--muted); color: var(--muted-foreground); border-radius: 5px; margin-left: 8px; }

/* ===== Active-item list (routines/policies) ===== */
.list { background: #fff; border-radius: 12px; box-shadow: inset 0 0 0 1px var(--border); overflow: hidden; }
.list-row { display: flex; align-items: center; gap: 14px; padding: 14px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s; }
.list-row:last-child { border-bottom: 0; }
.list-row:hover { background: color-mix(in oklab, var(--muted) 50%, transparent); }
.lr-icon { width: 18px; height: 18px; color: var(--muted-foreground); flex-shrink: 0; }
.lr-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
.lr-title { font: 400 13.5px/1.2 var(--font-sans); color: var(--foreground); }
.lr-desc { font: 400 12.5px/1.2 var(--font-sans); color: var(--muted-foreground); }
.lr-meta { display: flex; align-items: center; gap: 10px; margin-top: 2px; flex-wrap: wrap; }
.lr-chip { display:inline-flex; align-items:center; gap: 4px; font: 400 11.5px/1 var(--font-sans); color: var(--muted-foreground); }
.lr-chip svg { width: 12px; height: 12px; color: var(--muted-foreground); }
.lr-chip.pill { padding: 3px 7px; background: var(--muted); border-radius: 5px; color: var(--foreground); }
.lr-tail { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

/* Toggle switch */
.tog { width: 32px; height: 18px; border-radius: 999px; background: var(--border); position: relative; cursor: pointer; transition: background .15s; border: none; padding: 0; flex-shrink: 0; }
.tog.on { background: var(--action-primary); }
.tog::after { content:''; position:absolute; top:2px; left:2px; width:14px; height:14px; border-radius:50%; background:#fff; transition: transform .15s ease-out; box-shadow: var(--shadow-xs); }
.tog.on::after { transform: translateX(14px); }

.ellipsis-btn { background:none; border:none; cursor:pointer; color: var(--muted-foreground); padding: 4px; border-radius: 5px; display:inline-flex; }
.ellipsis-btn:hover { background: var(--muted); color: var(--foreground); }

/* ===== Chat composition view ===== */
.split { display: grid; grid-template-columns: 1fr 1fr; height: 100%; min-height: 0; overflow: hidden; }
.split.solo { grid-template-columns: 1fr; }
.split.solo .split-right { border-left: none; }
.split.solo .wf { width: 100%; padding: 32px 40px 40px; }
.split.solo .wf > * { max-width: 640px; width: 100%; margin-left: auto; margin-right: auto; }
.wf-save { display: inline-flex; align-items: center; gap: 6px; padding: 7px 12px; border-radius: 7px; background: var(--foreground); color: #fff; border: none; cursor: pointer; font: 500 12.5px/1 var(--font-sans); white-space: nowrap; }
.wf-save:hover { opacity: 0.9; }

/* Policy builder footer */
.wf-footer {
  flex: none;
  display: flex; align-items: center; gap: 8px;
  padding: 12px 24px;
  background: #fff;
  border-top: 1px solid var(--border);
}
.wf-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; border-radius: 7px;
  background: #fff; color: var(--foreground);
  border: 1px solid var(--border); cursor: pointer;
  font: 500 12.5px/1 var(--font-sans); white-space: nowrap;
}
.wf-btn:hover { background: var(--muted); }
.wf-btn.primary { background: var(--foreground); color: #fff; border-color: var(--foreground); }
.wf-btn.primary:hover { background: var(--foreground); opacity: 0.9; }

/* Template picker row */
.tpl-picker { margin-bottom: 6px; }
.tpl-picker-bottom { margin-top: 20px; padding-top: 24px; border-top: 1px solid var(--border); margin-bottom: 0; }
.tpl-picker-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 10px; }
.tpl-picker-title { font: 500 13px/1.2 var(--font-sans); color: var(--foreground); }
.tpl-picker-sub { font: 400 12px/1.4 var(--font-sans); color: var(--muted-foreground); margin-top: 2px; }
.tpl-clear {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 5px 9px; border-radius: 6px;
  background: #fff; color: var(--muted-foreground);
  border: 1px solid var(--border); cursor: pointer;
  font: 400 11.5px/1 var(--font-sans); white-space: nowrap; flex: none;
}
.tpl-clear:hover { background: var(--muted); color: var(--foreground); }

.tpl-row {
  display: grid; gap: 10px;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
}

.tpl-card {
  position: relative;
  display: flex; flex-direction: column; gap: 6px;
  padding: 14px; border-radius: 10px;
  background: #fff; border: 1px solid var(--border);
  text-align: left; cursor: pointer; font: inherit; color: inherit;
  transition: transform .12s ease, border-color .12s ease, box-shadow .12s ease;
}
.tpl-card:hover { border-color: var(--foreground); transform: translateY(-1px); box-shadow: 0 2px 8px -2px rgb(0 0 0 / 0.08); }
.tpl-card.active { border-color: var(--foreground); box-shadow: 0 0 0 2px var(--foreground); }

.tpl-ico {
  width: 28px; height: 28px; border-radius: 7px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--foreground);
}
.tpl-card.lavender .tpl-ico { background: var(--decorative-lavender-100); color: var(--decorative-lavender-900); }
.tpl-card.matcha .tpl-ico { background: var(--decorative-matcha-100, #eef5e6); color: var(--decorative-matcha-900, #3b4d22); }
.tpl-card.champagne .tpl-ico { background: var(--decorative-champagne-100); color: var(--decorative-champagne-900); }

.tpl-name { font: 500 13px/1.3 var(--font-sans); color: var(--foreground); }
.tpl-sum { font: 400 12px/1.4 var(--font-sans); color: var(--muted-foreground); text-wrap: pretty; }

/* Routines: template picker on landing */
.rt-tpl-picker { text-align: left; max-width: 640px; margin: 0 auto; }
.rt-tpl-row { grid-template-columns: repeat(3, 1fr); }
@media (max-width: 720px) { .rt-tpl-row { grid-template-columns: repeat(2, 1fr); } }

/* Routine detail flyout: framed Routine card */
.rt-routine-card {
  background: var(--muted);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px 16px;
}
.rt-routine-card .wf-trigger,
.rt-routine-card .wf-step .conds,
.rt-routine-card .wf-step .conds .sel,
.rt-routine-card .wf-outcome { background: #fff; }

/* Routines page: 48px between sections */
.rt-page .center-head { margin: 0 0 48px; }
.rt-page .prompt { margin: 0 auto 48px; }
.rt-page .rt-section-head { margin: 48px 0 12px; }

/* Routines chat: progressive disclosure fade-in */
@keyframes rt-step-in { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
.rt-step-in { animation: rt-step-in .25s ease both; }
.tpl-check {
  position: absolute; top: 10px; right: 10px;
  width: 18px; height: 18px; border-radius: 99px;
  background: var(--foreground); color: #fff;
  display: inline-flex; align-items: center; justify-content: center;
}
.split-left { display: flex; flex-direction: column; border-right: 1px solid var(--border); background: #fff; min-height: 0; overflow: hidden; }
.split-right { background: #fff; display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
.split-head { flex: none; height: 46px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 18px; font: 400 13px/1 var(--font-sans); color: var(--foreground); justify-content: space-between; }
.split-head .close-btn { background:none; border:none; cursor:pointer; color: var(--muted-foreground); padding: 4px; border-radius: 5px; display:inline-flex; }
.split-head .close-btn:hover { background: var(--muted); color: var(--foreground); }

.chat-feed { overflow-y: auto; padding: 22px 22px 12px; display: flex; flex-direction: column; gap: 18px; min-height: 0; flex: 0 1 auto; }
.split-left .chat-input { flex: none; margin-top: auto; }
.msg { display:flex; gap: 10px; align-items: flex-start; }
.msg.user { justify-content: flex-end; }
.msg .av { width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0; background: var(--decorative-lavender-300); overflow: hidden; display:inline-flex; align-items:center; justify-content:center; }
.msg .av img { width:100%; height:100%; object-fit: cover; }
.msg .col { display: flex; flex-direction: column; gap: 6px; max-width: 480px; }
.msg.user .col { align-items: flex-end; }
.msg .hdr { font: 400 11.5px/1 var(--font-sans); color: var(--muted-foreground); display:flex; gap:6px; align-items:center; }
.msg .hdr .name { color: var(--foreground); font-weight: 500; }
.msg .bubble { font: 400 13.5px/1.5 var(--font-sans); color: var(--foreground); }
.msg.user .bubble { background: var(--muted); padding: 6px 12px; border-radius: 10px; }
.chip-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
.chip { display:inline-flex; align-items:center; gap: 6px; padding: 6px 11px; background: #fff; border-radius: 999px;
  box-shadow: inset 0 0 0 1px var(--border); font: 400 12.5px/1 var(--font-sans); color: var(--foreground); cursor: pointer; transition: all .1s; }
.chip:hover { background: var(--muted); }
.chip svg { width: 13px; height: 13px; color: var(--muted-foreground); }
.chip.selected { background: var(--foreground); color: #fff; box-shadow: none; }
.chip.selected svg { color: #fff; }

/* Routine card inside chat */
.rt-card { display:flex; align-items:center; gap: 12px; padding: 12px 14px; background: #fff; border-radius: 10px;
  box-shadow: inset 0 0 0 1px var(--border); font: 400 13px/1 var(--font-sans); cursor:pointer; min-width: 320px; }
.rt-card .ico { width: 32px; height: 32px; border-radius: 7px; background: var(--muted); display:inline-flex; align-items:center; justify-content:center; color: var(--muted-foreground); }
.rt-card .bd { flex: 1; display:flex; flex-direction:column; gap:3px; }
.rt-card .bd .t { font: 500 13px/1 var(--font-sans); }
.rt-card .bd .d { font: 400 11.5px/1 var(--font-sans); color: var(--muted-foreground); }
.rt-card .ch { color: var(--muted-foreground); }

.chat-cta { padding: 4px 6px 0; display:flex; flex-direction: column; gap: 2px; align-self: stretch; }
.cta-btn { display:flex; align-items:center; gap: 10px; padding: 10px 12px; border-radius: 8px; font: 400 13px/1 var(--font-sans);
  background: none; border: none; cursor: pointer; color: var(--foreground); text-align: left; width: 100%; }
.cta-btn:hover { background: var(--muted); }
.cta-btn.primary { background: var(--muted); font-weight: 500; }
.cta-btn svg { width: 14px; height: 14px; color: var(--muted-foreground); }
.cta-btn.primary svg { color: var(--foreground); }

.chat-input { padding: 10px 16px 14px; border-top: 1px solid var(--border); }
.chat-input .box { display:flex; align-items:center; gap: 8px; padding: 8px 10px; background: #fff; border-radius: 10px; box-shadow: inset 0 0 0 1px var(--border); }
.chat-input .box input { flex: 1; border: none; outline: none; font: 400 13px/1.4 var(--font-sans); color: var(--foreground); background: transparent; }
.chat-input .box input::placeholder { color: var(--muted-foreground); }
.chat-input .box .send { width: 26px; height: 26px; border-radius: 6px; background: var(--foreground); color: #fff; border: none; cursor: pointer; display:inline-flex; align-items:center; justify-content:center; }
.chat-input .disclaimer { text-align: center; font: 400 11px/1 var(--font-sans); color: var(--muted-foreground); margin-top: 8px; }

/* Right preferences panel */
.pref { padding: 20px 24px 40px; display:flex; flex-direction: column; gap: 18px; }

/* Solo routine editor (no AI chat pane) — centered full-panel layout */
.rt-solo {
  background: #fff;
  display: flex; flex-direction: column;
  height: 100%;
  min-height: 0;
  overflow-y: auto;
  overflow-x: hidden;
}
.rt-solo-body {
  flex: 1;
  padding: 28px 24px 48px;
  max-width: 720px;
  width: 100%;
  margin: 0 auto;
}
.pref h2 { font: 500 17px/1.2 var(--font-sans); margin: 0 0 6px; letter-spacing: -0.01em; }
.pref .fld-row { display:flex; gap: 8px; }
.pref .fld-row > * { flex: 1; min-width: 0; }
.fld { display:flex; align-items:center; gap:6px; padding: 7px 10px; background: #fff; border-radius: 8px; box-shadow: inset 0 0 0 1px var(--border); font: 400 12.5px/1 var(--font-sans); cursor: pointer; min-width: 0; }
.fld svg { width: 13px; height: 13px; color: var(--muted-foreground); flex-shrink:0; }
.fld.sel { color: var(--action-primary); box-shadow: inset 0 0 0 1px var(--action-primary); background: var(--action-subtle); }
.fld.sel svg { color: var(--action-primary); }
.fld .trail { margin-left: auto; color: var(--muted-foreground); display:inline-flex; align-items:center; gap: 5px; }
.fld .pill { display:inline-flex; align-items:center; gap: 3px; padding: 2px 6px; background: var(--muted); border-radius: 4px; font: 400 10.5px/1 var(--font-sans); color: var(--muted-foreground); }
.pref-label { font: 400 13px/1 var(--font-sans); color: var(--foreground); margin: 0 0 8px; }

.pref-box { background: #fff; border-radius: 10px; box-shadow: inset 0 0 0 1px var(--border); padding: 14px; font: 400 13px/1.55 var(--font-sans); color: var(--foreground); }

/* Tabs (Time/Trigger) */
.tabs { display: grid; grid-template-columns: 1fr 1fr; padding: 3px; background: var(--muted); border-radius: 8px; }
.tab { display:inline-flex; align-items:center; justify-content:center; gap: 6px; padding: 6px 10px; border-radius: 6px; font: 400 12.5px/1 var(--font-sans); background: transparent; border: none; cursor: pointer; color: var(--muted-foreground); }
.tab.active { background: #fff; color: var(--foreground); box-shadow: var(--shadow-xs); }
.tab svg { width: 13px; height: 13px; }

/* Radio option */
.radio-grp { display:flex; flex-direction: column; gap: 8px; }
.radio { display:flex; align-items:flex-start; gap: 10px; padding: 11px 14px; background: #fff; border-radius: 10px; box-shadow: inset 0 0 0 1px var(--border); cursor: pointer; }
.radio.sel { box-shadow: inset 0 0 0 1.5px var(--action-primary); background: color-mix(in oklab, var(--action-subtle) 50%, transparent); }
.radio-dot { width: 15px; height: 15px; border-radius: 50%; box-shadow: inset 0 0 0 1.5px var(--border); background: #fff; flex-shrink:0; margin-top: 1px; position: relative; }
.radio.sel .radio-dot { box-shadow: inset 0 0 0 1.5px var(--action-primary); }
.radio.sel .radio-dot::after { content: ''; position:absolute; inset: 3px; background: var(--action-primary); border-radius: 50%; }
.radio .rt-body { flex: 1; display:flex; flex-direction: column; gap: 2px; min-width: 0; }
.radio .rt-body .t { font: 500 13px/1.2 var(--font-sans); }
.radio .rt-body .d { font: 400 12px/1.2 var(--font-sans); color: var(--muted-foreground); }
.radio .adm { display:inline-flex; align-items:center; gap:3px; font: 400 11px/1 var(--font-sans); color: var(--muted-foreground); padding: 3px 6px; background: var(--muted); border-radius: 5px; }
.radio .adm svg { width: 11px; height: 11px; }

/* Delivery tab group */
.del-tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.del-tab { display:inline-flex; align-items:center; justify-content:center; gap: 6px; padding: 8px 10px; border-radius: 8px; font: 400 12.5px/1 var(--font-sans); background: #fff; box-shadow: inset 0 0 0 1px var(--border); border: none; cursor: pointer; color: var(--foreground); }
.del-tab.sel { color: var(--action-primary); background: var(--action-subtle); box-shadow: inset 0 0 0 1px var(--action-primary); }

/* Preview email */
.email-prev { background: #fff; border-radius: 10px; box-shadow: inset 0 0 0 1px var(--border); overflow: hidden; font: 400 12.5px/1.5 var(--font-sans); }
.email-prev .meta { display:flex; justify-content:space-between; padding: 10px 14px; color: var(--muted-foreground); border-bottom: 1px solid var(--border); background: color-mix(in oklab, var(--muted) 40%, transparent); }
.email-prev .meta span { display:inline-flex; align-items:center; gap: 4px; }
.email-prev .body { padding: 14px; display:flex; flex-direction: column; gap: 10px; }
.email-prev .body .subj { font: 500 13px/1.2 var(--font-sans); }
.email-prev .evt { display:flex; gap: 9px; align-items:flex-start; }
.email-prev .evt .dot { width: 6px; height: 6px; background: var(--alert-primary); border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
.email-prev .evt .evt-body { display:flex; flex-direction: column; gap: 2px; }
.email-prev .evt .evt-body .t { font: 500 12.5px/1.3 var(--font-sans); }
.email-prev .evt .evt-body .d { color: var(--muted-foreground); font: 400 11.5px/1.3 var(--font-sans); }
.email-prev .foot-bar { padding: 8px 12px; background: color-mix(in oklab, var(--action-subtle) 50%, transparent); display:flex; align-items:center; gap: 6px; color: var(--action-primary); font: 400 11.5px/1 var(--font-sans); }

/* ===== Recipe-card routine builder ===== */
.rt-recipe { gap: 22px; }
.rt-name-block { display:flex; flex-direction: column; gap: 4px; }
.rt-name-input { border: none; outline: none; font: 500 22px/1.2 var(--font-sans); letter-spacing: -0.018em; width: 100%; background: transparent; padding: 0; color: var(--foreground); }
.rt-name-input::placeholder { color: color-mix(in oklab, var(--muted-foreground) 70%, transparent); }
.rt-anatomy { font: 400 12.5px/1.5 var(--font-sans); color: var(--muted-foreground); }
.rt-anatomy b { color: var(--foreground); font-weight: 500; }

/* Templates row at top */
.rt-tpl-top { display: flex; flex-direction: column; gap: 8px; }
.rt-tpl-top-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.rt-tpl-top-label { font: 400 11.5px/1 var(--font-sans); color: var(--muted-foreground); letter-spacing: 0.01em; }
.rt-tpl-nav { display: flex; align-items: center; gap: 4px; }
.rt-tpl-nav-btn { width: 22px; height: 22px; border-radius: 6px; background: #fff; border: 1px solid var(--border); display: inline-flex; align-items: center; justify-content: center; cursor: pointer; color: var(--muted-foreground); transition: all .12s ease; }
.rt-tpl-nav-btn:hover { background: var(--muted); color: var(--foreground); border-color: var(--foreground); }
.rt-tpl-scroll { display: flex; gap: 6px; overflow-x: auto; scroll-behavior: smooth; scrollbar-width: none; -ms-overflow-style: none; padding-bottom: 2px; }
.rt-tpl-scroll::-webkit-scrollbar { display: none; }
.rt-tpl { flex: 0 0 240px; display:flex; align-items: flex-start; gap: 9px; padding: 9px 11px; background: #fff; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; text-align: left; font-family: inherit; transition: all .12s ease; min-width: 0; position: relative; }
.rt-tpl:hover { border-color: var(--action-primary); box-shadow: 0 1px 0 rgba(0,0,0,.02); }
.rt-tpl.active { border-color: var(--action-primary); background: var(--action-subtle); }
.rt-tpl.active .rt-tpl-ico { background: var(--action-primary); color: #fff; }
.rt-tpl-check { position: absolute; top: 6px; right: 6px; width: 16px; height: 16px; border-radius: 50%; background: var(--action-primary); color: #fff; display:inline-flex; align-items:center; justify-content:center; }

/* Active template banner */
.rt-active-tpl { display:flex; align-items: center; gap: 10px; padding: 9px 11px; background: var(--action-subtle); border: 1px solid color-mix(in oklab, var(--action-primary) 30%, var(--border)); border-radius: 8px; }
.rt-active-tpl-ico { width: 22px; height: 22px; border-radius: 6px; background: var(--action-primary); color: #fff; display:inline-flex; align-items:center; justify-content:center; flex-shrink: 0; }
.rt-active-tpl-text { flex: 1; min-width: 0; display:flex; align-items: baseline; gap: 6px; flex-wrap: wrap; }
.rt-active-tpl-label { font: 400 11px/1 var(--font-sans); color: var(--muted-foreground); text-transform: uppercase; letter-spacing: 0.06em; }
.rt-active-tpl-name { font: 500 12.5px/1.2 var(--font-sans); color: var(--foreground); }
.rt-active-tpl-reset { display:inline-flex; align-items:center; gap: 4px; padding: 5px 10px; border-radius: 6px; background: #fff; border: 1px solid var(--border); cursor: pointer; font: 500 11.5px/1 var(--font-sans); color: var(--foreground); transition: all .12s ease; }
.rt-active-tpl-reset:hover { border-color: var(--foreground); }
.rt-active-tpl-reset svg { width: 11px; height: 11px; }

/* Multi-select del-tab check */
.del-tab .del-tab-check { width: 14px; height: 14px; border-radius: 50%; background: var(--action-primary); color: #fff; display:inline-flex; align-items:center; justify-content:center; margin-right: 2px; }
.del-tab .del-tab-check svg { width: 9px; height: 9px; }
.rt-tpl-ico { width: 22px; height: 22px; border-radius: 6px; background: var(--muted); display:inline-flex; align-items:center; justify-content:center; color: var(--muted-foreground); flex-shrink: 0; margin-top: 1px; }
.rt-tpl:hover .rt-tpl-ico { background: var(--action-subtle); color: var(--action-primary); }
.rt-tpl-text { flex: 1; min-width: 0; display:flex; flex-direction: column; gap: 1px; }
.rt-tpl-title { font: 500 12px/1.3 var(--font-sans); color: var(--foreground); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.rt-tpl-desc { font: 400 11px/1.35 var(--font-sans); color: var(--muted-foreground); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

/* Horizontal divider between quick-pick row and the form */
.rt-hr { height: 1px; background: var(--border); margin: 4px 0; }

/* Prompt — describe + send (Enter) to populate */
.rt-prompt { display:flex; flex-direction: column; gap: 6px; }
.rt-prompt-input { display:flex; align-items: flex-start; gap: 9px; padding: 11px 11px 11px 12px; background: #fff; border: 1px solid var(--border); border-radius: 10px; transition: border-color .12s ease; }
.rt-prompt-input:focus-within { border-color: var(--action-primary); }
.rt-prompt-spark { color: var(--muted-foreground); flex-shrink: 0; margin-top: 3px; }
.rt-prompt-input:focus-within .rt-prompt-spark { color: var(--action-primary); }
.rt-prompt-input .rt-magic-input { flex: 1; min-width: 0; border: none; outline: none; background: transparent; resize: none; font: 400 13px/1.55 var(--font-sans); color: var(--foreground); padding: 0; }
.rt-prompt-input .rt-magic-input::placeholder { color: var(--muted-foreground); }
.rt-prompt-send { width: 26px; height: 26px; border-radius: 6px; background: var(--foreground); color: #fff; display:inline-flex; align-items:center; justify-content:center; border: none; cursor: pointer; flex-shrink: 0; transition: opacity .12s ease, background .12s ease; }
.rt-prompt-send:disabled { background: var(--muted); color: var(--muted-foreground); cursor: not-allowed; }
.rt-prompt-send:not(:disabled):hover { background: var(--action-primary); }
.rt-prompt-hint { font: 400 11px/1.4 var(--font-sans); color: var(--muted-foreground); padding: 0 4px; }

/* Active template strip — sits attached to top of prompt box */
.rt-prompt.has-tpl .rt-prompt-input { border-top-left-radius: 0; border-top-right-radius: 0; border-top: none; }
.rt-prompt-tpl {
  display: flex; align-items: center; gap: 7px;
  padding: 7px 10px;
  background: var(--action-subtle);
  border: 1px solid color-mix(in oklab, var(--action-primary) 35%, var(--border));
  border-bottom: 1px solid color-mix(in oklab, var(--action-primary) 22%, var(--border));
  border-radius: 10px 10px 0 0;
  margin-bottom: -1px;
  position: relative;
  z-index: 1;
}
.rt-prompt-tpl-ico {
  width: 18px; height: 18px; border-radius: 5px;
  background: var(--action-primary); color: #fff;
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.rt-prompt-tpl-label {
  font: 400 10px/1 var(--font-sans);
  color: var(--muted-foreground);
  text-transform: uppercase; letter-spacing: 0.07em;
}
.rt-prompt-tpl-name {
  font: 500 12px/1 var(--font-sans);
  color: var(--foreground);
  flex: 1; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.rt-prompt-tpl-reset {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 4px 8px;
  border-radius: 5px;
  background: #fff;
  border: 1px solid var(--border);
  cursor: pointer;
  font: 500 10.5px/1 var(--font-sans);
  color: var(--muted-foreground);
  flex-shrink: 0;
}
.rt-prompt-tpl-reset:hover { border-color: var(--foreground); color: var(--foreground); }
.rt-prompt-tpl-reset svg { width: 9px; height: 9px; }
.rt-prompt.has-tpl .rt-prompt-input:focus-within { border-color: var(--action-primary); }
.rt-prompt.has-tpl .rt-prompt-tpl { transition: border-color .12s ease; }

.rt-magic { display:flex; flex-direction: column; gap: 8px; padding: 14px 14px 12px; background: color-mix(in oklab, var(--action-subtle) 50%, #fff); border-radius: 12px; box-shadow: inset 0 0 0 1px color-mix(in oklab, var(--action-primary) 18%, var(--border)); }
.rt-magic-input { width: 100%; border: none; outline: none; background: transparent; resize: none; font: 400 13px/1.55 var(--font-sans); color: var(--foreground); padding: 0; }
.rt-magic-input::placeholder { color: var(--muted-foreground); }
.rt-magic-btn { display:inline-flex; align-items:center; gap: 5px; padding: 4px 9px; border-radius: 999px; background: var(--action-primary); color: #fff; border: none; cursor: pointer; font: 500 11.5px/1 var(--font-sans); }
.rt-magic-btn:hover { background: color-mix(in oklab, var(--action-primary) 88%, #000); }

.rt-recipe-list { display:flex; flex-direction: column; gap: 10px; }

.rc { background: #fff; border-radius: 12px; box-shadow: inset 0 0 0 1px var(--border); overflow: visible; transition: box-shadow .15s ease; position: relative; }
.rc:has(.dd-menu) { z-index: 5000; }
.rc.open { box-shadow: inset 0 0 0 1.5px var(--action-primary), 0 1px 0 rgba(0,0,0,.02); position: relative; z-index: 100; }
.rc.empty.open { box-shadow: inset 0 0 0 1.5px var(--action-primary); }
.rc-head { width: 100%; display:flex; align-items:center; gap: 11px; padding: 12px 14px; background: transparent; border: none; cursor: pointer; text-align: left; font-family: inherit; }
.rc-head:hover { background: color-mix(in oklab, var(--muted) 35%, transparent); }
.rc.open .rc-head:hover { background: transparent; }
.rc-ico { width: 28px; height: 28px; border-radius: 8px; background: var(--muted); display:inline-flex; align-items:center; justify-content:center; color: var(--muted-foreground); flex-shrink: 0; }
.rc.filled .rc-ico { background: var(--action-subtle); color: var(--action-primary); }
.rc.open .rc-ico { background: var(--action-subtle); color: var(--action-primary); }
.rc-h-text { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
.rc-label { font: 500 13px/1.2 var(--font-sans); color: var(--foreground); }
.rc-value { font: 400 12.5px/1.35 var(--font-sans); color: var(--muted-foreground); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
.rc-h-cta { flex-shrink: 0; }
.rc-set { display:inline-flex; align-items:center; gap: 4px; padding: 5px 10px; border-radius: 999px; background: var(--muted); color: var(--foreground); font: 500 11.5px/1 var(--font-sans); }
.rc-set svg { width: 11px; height: 11px; }
.rc.empty .rc-head:hover .rc-set { background: var(--action-primary); color: #fff; }
.rc-edit { display:inline-flex; align-items:center; gap: 4px; color: var(--action-primary); font: 500 11.5px/1 var(--font-sans); }

.rc-examples { display:flex; flex-wrap: wrap; gap: 6px; padding: 0 14px 12px 53px; animation: rt-step-in .2s ease both; }
.rc-ex-chip { display:inline-flex; align-items:center; padding: 5px 10px; border-radius: 999px; background: #fff; box-shadow: inset 0 0 0 1px var(--border); border: none; cursor: pointer; font: 400 11.5px/1 var(--font-sans); color: var(--foreground); transition: all .12s ease; }
.rc-ex-chip:hover { background: var(--action-subtle); box-shadow: inset 0 0 0 1px var(--action-primary); color: var(--action-primary); }

.rc-body { padding: 4px 14px 14px 53px; display:flex; flex-direction: column; gap: 10px; animation: rt-step-in .2s ease both; }
.rc-inline-examples { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; }
.rc-inline-label { font: 400 11.5px/1 var(--font-sans); color: var(--muted-foreground); margin-right: 2px; }
.rc-foot { display:flex; justify-content:flex-end; margin-top: 2px; }
.btn.ghost.sm { padding: 5px 12px; background: transparent; border: none; cursor: pointer; font: 500 12px/1 var(--font-sans); color: var(--action-primary); border-radius: 6px; }
.btn.ghost.sm:hover { background: var(--action-subtle); }

/* Always-on (non-collapsible) recipe card */
.rc.static { box-shadow: inset 0 0 0 1px var(--border); overflow: visible; }
.rc.static .rc-body { overflow: visible; }
.rc.static .rc-head { cursor: default; padding: 12px 14px 6px; }
.rc.static .rc-head:hover { background: transparent; }
.rc.static .rc-ico { background: var(--action-subtle); color: var(--action-primary); }
.rc.static .rc-body { padding: 6px 14px 14px 53px; }
.rc.static .rc-h-aside { margin-left: auto; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; justify-content: flex-end; }
.rc.static .rc-h-aside .rc-ex-chip { padding: 4px 9px; font-size: 11px; }

/* Recipe progress */
.rt-progress { display:flex; flex-direction: column; gap: 6px; }
.rt-progress-track { height: 4px; background: var(--muted); border-radius: 999px; overflow: hidden; }
.rt-progress-fill { height: 100%; background: var(--action-primary); border-radius: 999px; transition: width .25s ease; }
.rt-progress-text { font: 400 11.5px/1 var(--font-sans); color: var(--muted-foreground); }

/* ===== Policy workflow (right pane) ===== */
.wf { padding: 20px 24px 40px; display:flex; flex-direction: column; gap: 16px; flex: 1; min-height: 0; overflow-y: auto; }
.wf-sec-label { font: 400 12.5px/1 var(--font-sans); color: var(--muted-foreground); margin: 0 0 8px; }
.wf-name-input { width: 100%; padding: 7px 9px; background: #fff; border-radius: 7px; box-shadow: inset 0 0 0 1px var(--border); font: 400 12.5px/1 var(--font-sans); color: var(--foreground); outline: none; border: none; }
.wf-name-input::placeholder { color: var(--muted-foreground); }
.wf-name-input:focus { box-shadow: inset 0 0 0 1.5px var(--action-primary); }
.wf-trigger { display:flex; gap: 10px; align-items:center; padding: 12px 14px; background: #fff; border-radius: 10px; box-shadow: inset 0 0 0 1px var(--border); }
.wf-trigger .ico { width: 28px; height: 28px; border-radius: 7px; background: var(--muted); display:inline-flex; align-items:center; justify-content:center; color: var(--muted-foreground); }
.wf-trigger .bd { flex:1; }
.wf-trigger .bd .t { font: 500 13px/1.2 var(--font-sans); }
.wf-trigger .bd .d { font: 400 12px/1.2 var(--font-sans); color: var(--muted-foreground); }
.wf-step { background: #fff; border-radius: 10px; box-shadow: inset 0 0 0 1px var(--border); display: flex; }
.wf-step .num { width: 34px; background: color-mix(in oklab, var(--muted) 60%, transparent); display:flex; align-items: center; justify-content: center; font: 500 13px/1 var(--font-sans); color: var(--foreground); flex-shrink:0; border-right: 1px solid var(--border); }
.wf-step .conds { flex:1; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
.cond-row { display: flex; gap: 6px; align-items: center; }
.cond-row .sel { flex: 1; min-width: 0; padding: 7px 9px; background: #fff; border-radius: 7px; box-shadow: inset 0 0 0 1px var(--border); font: 400 12.5px/1 var(--font-sans); color: var(--foreground); display:inline-flex; align-items:center; justify-content: space-between; gap: 6px; cursor: pointer; }
.cond-row .sel svg { width: 12px; height: 12px; color: var(--muted-foreground); flex-shrink:0; }
.cond-row .op { width: 44px; flex: 0 0 44px; }
.cond-row .conj { width: 60px; flex: 0 0 60px; }
.cond-row .num-input { flex: 1; min-width: 0; }
.add-cond { padding: 7px; text-align:center; background: transparent; border: none; cursor: pointer; font: 400 12.5px/1 var(--font-sans); color: var(--muted-foreground); border-radius: 7px; width: 100%; display:inline-flex; align-items:center; justify-content:center; gap: 4px; }
.add-cond:hover { background: var(--muted); color: var(--foreground); }
.add-cond svg { width: 12px; height: 12px; }
.avatar-pile { display:inline-flex; align-items:center; }
.avatar-pile .av { width: 20px; height: 20px; border-radius: 50%; margin-left: -4px; box-shadow: 0 0 0 2px #fff; overflow:hidden; background: var(--decorative-lavender-300); display:inline-flex; align-items:center; justify-content:center; color:#fff; font: 500 9px/1 var(--font-sans); }
.avatar-pile .av:first-child { margin-left: 0; }
.avatar-pile .av.more { background: var(--muted); color: var(--muted-foreground); font-size: 8px; }

.add-step { padding: 8px 14px; background: #fff; border-radius: 8px; box-shadow: inset 0 0 0 1px var(--border); border: none; cursor: pointer; font: 400 12.5px/1 var(--font-sans); color: var(--foreground); display:inline-flex; align-items:center; justify-content: center; gap: 5px; align-self: center; }
.add-step:hover { background: var(--muted); }
.add-step svg { width: 12px; height: 12px; }

.wf-outcome { padding: 12px 14px; border-radius: 10px; box-shadow: inset 0 0 0 1px var(--border); display:flex; gap: 10px; align-items:center; background: #fff; }
.wf-outcome.pos { background: color-mix(in oklab, var(--positive-subtle) 60%, transparent); box-shadow: inset 0 0 0 1px color-mix(in oklab, var(--positive-primary) 20%, transparent); }
.wf-outcome.paused { background: var(--muted); box-shadow: inset 0 0 0 1px var(--border); }
.wf-outcome.paused .ico { background: color-mix(in oklab, var(--muted-foreground) 18%, var(--muted)); color: var(--muted-foreground); }
.wf-outcome.paused .bd .t { color: var(--muted-foreground); }
.wf-outcome .ico { width: 28px; height: 28px; border-radius: 7px; background: var(--muted); display:inline-flex; align-items:center; justify-content:center; color: var(--muted-foreground); }
.wf-outcome.pos .ico { background: var(--positive-primary); color: #fff; }
.wf-outcome .bd { flex:1; }
.wf-outcome .bd .t { font: 500 13px/1.2 var(--font-sans); }
.wf-outcome .bd .d { font: 400 12px/1.2 var(--font-sans); color: var(--muted-foreground); }
.wf-outcome .chev { color: var(--muted-foreground); }

/* Dropdown menus (workflow editors) */
.dd-menu { position: absolute; top: calc(100% + 4px); left: 0; min-width: 140px; background: #fff; border-radius: 8px; box-shadow: var(--shadow-lg), inset 0 0 0 1px var(--border); z-index: 9999; padding: 4px; max-height: 260px; overflow-y: auto; }
.dd-item { padding: 6px 10px; font: 400 12.5px/1.2 var(--font-sans); color: var(--foreground); cursor: pointer; border-radius: 5px; white-space: nowrap; }
.dd-item:hover { background: var(--muted); }
.dd-item.sel { background: var(--action-subtle); color: var(--action-primary); }
.cond-x { background: transparent; border: none; cursor: pointer; color: var(--muted-foreground); padding: 4px; border-radius: 4px; display:inline-flex; flex-shrink: 0; }
.cond-x:hover { background: var(--alert-subtle); color: var(--alert-primary); }
.cond-row .sel input:focus { outline: none; }

/* ===== Policies landing ===== */
.kpi-grid { display:grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.kpi { background: #fff; border-radius: 10px; box-shadow: inset 0 0 0 1px var(--border); padding: 10px 13px; display:flex; flex-direction: column; gap: 6px; }
.kpi .lbl { font: 400 12px/1 var(--font-sans); color: var(--muted-foreground); display:flex; align-items:center; gap: 4px; }
.kpi .lbl svg { width: 12px; height: 12px; opacity: 0.6; }
.kpi .v-row { display:flex; align-items: flex-end; gap: 10px; justify-content:space-between; }
.kpi .v { font: 500 22px/1 var(--font-sans); letter-spacing: -0.01em; }
.kpi .d-pos { display:inline-flex; align-items:center; gap: 2px; font: 500 11px/1 var(--font-sans); color: var(--positive-primary); background: var(--positive-subtle); padding: 3px 5px; border-radius: 4px; }
.kpi .d-neg { display:inline-flex; align-items:center; gap: 2px; font: 500 11px/1 var(--font-sans); color: var(--alert-primary); background: var(--alert-subtle); padding: 3px 5px; border-radius: 4px; }
.kpi .vwrap { display:flex; align-items:center; gap: 8px; }
.kpi .spark { width: 56px; height: 28px; }

.chart-card { margin: 48px 0 0; padding: 14px 0 4px; }
.chart-box { position: relative; height: 190px; }
.chart-ranges { display:flex; align-items:center; justify-content:center; gap: 32px; margin-top: 6px; font: 400 12px/1 var(--font-sans); color: var(--muted-foreground); }
.chart-ranges .r { padding: 4px 2px; cursor:pointer; position: relative; }
.chart-ranges .r.sel { color: var(--action-primary); font-weight: 500; }
.chart-ranges .r.sel::after { content:''; position:absolute; left:0; right:0; bottom:-4px; height:2px; background: var(--action-primary); border-radius: 1px; }

.chart-annot { margin-top: 14px; padding: 10px 14px; background: color-mix(in oklab, var(--alert-subtle) 40%, transparent); border-radius: 8px; display:flex; align-items:flex-start; gap: 8px; font: 400 12.5px/1.4 var(--font-sans); color: var(--foreground); background-image: repeating-linear-gradient(135deg, transparent 0 10px, color-mix(in oklab, var(--alert-primary) 3%, transparent) 10px 20px); }
.chart-annot .spark-ico { font-size: 12px; flex-shrink:0; }

.sugg { background: #fff; border-radius: 10px; box-shadow: inset 0 0 0 1px var(--border); overflow: hidden; }
.sugg-row { display:flex; align-items:center; gap: 14px; padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .1s; }
.sugg-row:last-child { border-bottom: 0; }
.sugg-row:hover { background: color-mix(in oklab, var(--muted) 40%, transparent); }
.sugg-row.big { align-items:flex-start; padding: 14px 16px; }
.sugg-row .dot { width:14px; height:14px; border-radius: 50%; box-shadow: inset 0 0 0 1.5px var(--ring); flex-shrink:0; margin-top: 1px; }
.sugg-row .bd { flex:1; display:flex; flex-direction:column; gap: 2px; }
.sugg-row .t { font: 400 13.5px/1.3 var(--font-sans); color: var(--foreground); }
.sugg-row .d { font: 400 12.5px/1.3 var(--font-sans); color: var(--muted-foreground); }
.sugg-row .impact { display:inline-flex; align-items:center; gap: 3px; font: 500 11.5px/1 var(--font-sans); color: var(--positive-primary); padding: 4px 0; flex-shrink:0; }
.sugg-row .chev { color: var(--muted-foreground); }
.sugg-row .sugg-cta {
  display:inline-flex; align-items:center; gap: 5px;
  font: 500 12px/1 var(--font-sans);
  color: #fff;
  background: var(--foreground);
  border: 1px solid var(--foreground);
  border-radius: 6px;
  padding: 6px 12px;
  cursor: pointer;
  flex-shrink: 0;
  transition: opacity .1s;
}
.sugg-row .sugg-cta:hover { opacity: 0.85; }

.side-link { display:inline-flex; align-items:center; gap: 4px; font: 400 12.5px/1 var(--font-sans); color: var(--muted-foreground); cursor:pointer; background:none; border:none; padding: 0; }
.side-link:hover { color: var(--foreground); }

/* ===== Policy detail flyout ===== */
.flyout-backdrop { position: fixed; inset: 0; background: color-mix(in oklab, var(--foreground) 10%, transparent); backdrop-filter: blur(1px); z-index: 30; animation: fadein .15s ease-out; }

/* ============================================================
   Motion Pass — Emil Kowalski's animation guidelines
   - Micro-interactions 100-150ms · Standard UI 150-250ms · Modals 200-300ms
   - Entry/exit: ease-out (cubic-bezier(0.22, 1, 0.36, 1))
   - On-screen morph: ease-in-out
   - Hover: ease · Constant: linear
   - Exits ~20% faster than entries
   - Buttons: scale(0.97) on :active · Popovers from scale(0.95) not scale(0)
   ============================================================ */

:root {
  --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
  --ease-hover: cubic-bezier(0.4, 0, 0.2, 1);
  --dur-micro: 120ms;
  --dur-hover: 150ms;
  --dur-ui: 200ms;
  --dur-modal: 260ms;
  --dur-exit: 160ms;
}

/* ---- Buttons: responsive press-down ---- */
button, .btn, .cta-btn, .sc-action, .chip, .nav-item, .kpi, .metric-pill, .tab, .del-tab, .icon-btn, .ask-ai-btn, .send {
  transition: background var(--dur-hover) var(--ease-hover),
              color var(--dur-hover) var(--ease-hover),
              box-shadow var(--dur-hover) var(--ease-hover),
              border-color var(--dur-hover) var(--ease-hover),
              transform var(--dur-micro) var(--ease-out);
}
button:active, .btn:active, .cta-btn:active, .sc-action:active, .chip:active, .icon-btn:active, .ask-ai-btn:active, .send:active, .tab:active, .del-tab:active, .tog:active {
  transform: scale(0.97);
  transition-duration: 60ms;
}
/* Don't scale controls where it'd look wrong (rows, large cards) */
.nav-item:active, .list-row:active, .sugg-row:active, .kpi:active, .metric-pill:active { transform: none; }

/* ---- Hit area for small icon buttons (44px min via pseudo) ---- */
.icon-btn { position: relative; }
.icon-btn::before { content: ''; position: absolute; inset: 50% 50% 50% 50%; width: 44px; height: 44px; transform: translate(-50%, -50%); }

/* ---- Popovers / dropdowns: scale from trigger, not from zero ---- */
.dd-menu {
  transform-origin: top left;
  animation: pop-in var(--dur-ui) var(--ease-out);
  will-change: transform, opacity;
}
.dd-menu[data-align="right"] { transform-origin: top right; }
@keyframes pop-in {
  from { opacity: 0; transform: scale(0.96) translateY(-2px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

/* ---- Tooltips ---- */
.tooltip, [role="tooltip"] {
  transform-origin: center bottom;
  animation: tt-in var(--dur-hover) var(--ease-out);
}
@keyframes tt-in {
  from { opacity: 0; transform: scale(0.96) translateY(2px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

/* ---- Flyouts / drawers: 260ms in, ~200ms out ---- */
.flyout-backdrop { animation: fadein var(--dur-modal) var(--ease-out); will-change: opacity; }
.flyout {
  animation: slide-drawer var(--dur-modal) var(--ease-out);
  will-change: transform, opacity;
}
@keyframes slide-drawer {
  from { transform: translateX(24px); opacity: 0; }
  to   { transform: translateX(0); opacity: 1; }
}

/* ---- Side chat pane ---- */
.side-chat {
  /* animation disabled — was causing stuck-at-start frame */
  /* animation: side-slide var(--dur-modal) var(--ease-out) both;
  animation-iteration-count: 1; */
  will-change: transform, opacity;
}
@keyframes side-slide {
  from { transform: translateX(-12px); opacity: 0; }
  to   { transform: translateX(0); opacity: 1; }
}

/* ---- Chat messages appear ---- */
.sc-feed .msg, .chat-feed .msg {
  animation: msg-in var(--dur-ui) var(--ease-out);
  will-change: transform, opacity;
}
@keyframes msg-in {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ---- Hover flicker fix: animate child, not parent ----
   For rows/cards where hovering lifts content, hover the container
   but transform only the inner element. Here we just keep scale
   off row parents (set above) and let bg color change. */

/* ---- Resizer: child element animates, not the hit target ---- */
.sc-resizer { transition: none; } /* wide hit area stays static */
.sc-resizer span { transition: background var(--dur-hover) var(--ease-hover), height var(--dur-hover) var(--ease-out); }

/* ---- Toggles: snappier ---- */
.tog::after { transition: transform var(--dur-hover) var(--ease-out); }
.tog { transition: background var(--dur-hover) var(--ease-hover); }

/* ---- KPI sparkline / cards: hover lift handled via child if any ---- */
.kpi, .metric-pill { transition: box-shadow var(--dur-hover) var(--ease-hover), background var(--dur-hover) var(--ease-hover); }

/* ---- Rows: no transform, just bg ---- */
.list-row, .sugg-row, .nav-item {
  transition: background var(--dur-hover) var(--ease-hover), color var(--dur-hover) var(--ease-hover);
}

/* ---- Respect reduced motion ---- */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

.sc-chart-xaxis {
