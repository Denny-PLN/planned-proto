  justify-content: space-between;
  font: 400 11.5px/1 var(--font-sans);
  color: var(--muted-foreground);
  margin-top: 12px;
  padding: 0 8px;
}
.sc-card-foot {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 14px 22px 18px;
  border-top: 1px solid var(--border);
  background: color-mix(in oklab, var(--muted) 40%, transparent);
  font: 400 13px/1.55 var(--font-sans);
  color: var(--muted-foreground);
}
.sc-card-foot .spk {
  flex-shrink: 0;
  width: 20px; height: 20px;
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--action-subtle);
  color: var(--action-primary);
  border-radius: 5px;
  font-size: 11px;
  margin-top: 1px;
}
.sc-card-foot b { color: var(--foreground); font-weight: 500; }


/* Range pill selector (inside sc-card) */
.sc-range-pills {
  display: flex;
  width: fit-content;
  margin-left: auto;
  align-items: center;
  gap: 2px;
  padding: 3px;
  background: var(--muted);
  border-radius: 8px;
  margin-bottom: 16px;
}
.sc-range-pill {
  appearance: none;
  border: 0;
  background: transparent;
  padding: 5px 11px;
  font: 500 12px/1 var(--font-sans);
  color: var(--muted-foreground);
  border-radius: 6px;
  cursor: pointer;
  transition: background .12s ease, color .12s ease;
}
.sc-range-pill:hover { color: var(--foreground); }
.sc-range-pill[data-active="true"] {
  background: var(--foreground);
  color: var(--primary-foreground, #fff);
  box-shadow: var(--shadow-xs);
}

/* When the header has no title block, make the tabs fill the header row */
.sc-card-header > .sc-tabs:only-child { flex: 1; border-top: 0; }


/* shadcn-style ChartTooltip (HTML overlay) */
.sc-chart-box { position: relative; }
.sc-tooltip {
  z-index: 5;
  pointer-events: none;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 8px;
  box-shadow: var(--shadow-md);
  padding: 8px 10px;
  font: 400 12px/1.35 var(--font-sans);
  color: var(--foreground);
  min-width: 140px;
}
.sc-tt-label {
  font: 500 12px/1.3 var(--font-sans);
  color: var(--foreground);
  margin-bottom: 6px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.sc-tt-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
.sc-tt-indicator {
  display: inline-block;
  width: 10px;
  height: 10px;
  border-radius: 2px;
  flex-shrink: 0;
}
.sc-tt-name {
  color: var(--muted-foreground);
  font: 400 12px/1.2 var(--font-sans);
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.sc-tt-value {
  color: var(--foreground);
  font: 500 12px/1.2 var(--font-sans);
  font-variant-numeric: tabular-nums;
}


/* ========================================================================
   Toggle — shadcn/ui toggle (single press-to-toggle button)
   On state uses --muted bg · hover uses --muted bg · radius --radius-lg (sm → --radius-md)
   ======================================================================== */
.toggle {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 7px;
  height: 36px; padding: 0 12px;
  min-width: 36px;
  background: transparent;
  border: none;
  border-radius: var(--radius-lg);
  font: 500 13px/1 var(--font-sans);
  color: var(--foreground);
  cursor: pointer;
  transition: background .12s ease, color .12s ease, border-color .12s ease;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.toggle > svg { color: var(--muted-foreground); flex-shrink: 0; }
.toggle:hover { background: var(--muted); }
.toggle[aria-pressed="true"], .toggle.on { background: var(--muted); }
.toggle:focus-visible { outline: 2px solid var(--ring); outline-offset: 2px; }
.toggle:disabled, .toggle[aria-disabled="true"] {
  opacity: 0.5; pointer-events: none;
}

/* Outline variant */
.toggle.outline {
  border: 1px solid var(--border);
  background: #fff;
}
.toggle.outline:hover { background: var(--muted); border-color: var(--border); }
.toggle.outline[aria-pressed="true"], .toggle.outline.on { background: var(--muted); }

/* Sizes */
.toggle.sm { height: 30px; padding: 0 10px; min-width: 30px; font-size: 12.5px; border-radius: var(--radius-md); gap: 6px; }
.toggle.lg { height: 42px; padding: 0 16px; min-width: 42px; font-size: 14px; border-radius: var(--radius-lg); gap: 8px; }


/* Routine detail flyout extras */
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted-foreground); display: inline-block; }
.status-dot.on { background: var(--positive-primary); box-shadow: 0 0 0 3px color-mix(in oklab, var(--positive-primary) 20%, transparent); }
.status-dot.off { background: var(--muted-foreground); }

.rt-runs { display: flex; flex-direction: column; gap: 6px; padding-top: 12px; }
.rt-run-row {
  display: grid; grid-template-columns: 24px 1fr auto; align-items: center; gap: 10px;
  padding: 10px 12px; background: #fff; border-radius: 8px;
  box-shadow: inset 0 0 0 1px var(--border);
}
.rt-run-ico {
  width: 22px; height: 22px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  color: #fff;
}
.rt-run-ico.ok { background: var(--positive-primary); }
.rt-run-ico.skip { background: var(--muted-foreground); }
.rt-run-row .bd .t { font: 500 12.5px/1.2 var(--font-sans); color: var(--foreground); }
.rt-run-row .bd .d { font: 400 11.5px/1.3 var(--font-sans); color: var(--muted-foreground); margin-top: 2px; }
.rt-run-row .ghost-btn {
  width: 26px; height: 26px; border-radius: 6px; border: none; background: transparent;
  color: var(--muted-foreground); cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
}
.rt-run-row .ghost-btn:hover { background: var(--muted); color: var(--foreground); }

/* ============================================================
   Insights — Fey-style layout
   Top strip → hero (score + big chart) → daily recap → tray
   ============================================================ */

.ins-page {
  display: flex; flex-direction: column;
  align-items: center;
  gap: 28px;
  width: 100%;
  padding: 4px 0 8px;
}

/* Most children constrain themselves to 1024px, centered — EXCEPT the chart group which goes edge-to-edge */
.ins-page > .ins-vitals,
.ins-page > .ins-recap,
.ins-page > .ins-op-split,
.ins-page > .ins-section {
  max-width: 1024px;
  width: 100%;
}
.ins-page > .ins-chart-group {
  width: 100%;
  max-width: 1024px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* ---- Vitals row: overall ring + 3 sub-scores, horizontal strip ---- */
.ins-vitals {
  display: grid;
  grid-template-columns: 1.3fr 1fr 1fr 1fr;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 4px;
  box-shadow: var(--shadow-xs);
}
.ins-vital {
  display: flex; align-items: center; gap: 14px;
  padding: 16px 20px;
  border-right: 1px solid var(--border);
  min-width: 0;
}
.ins-vital:last-child { border-right: none; }
.ins-vital .bd { min-width: 0; display: flex; flex-direction: column; gap: 4px; }
.ins-vital .v {
  font: 400 26px/1 var(--font-sans);
  letter-spacing: -0.02em;
  color: var(--foreground);
  display: inline-flex; align-items: baseline; gap: 3px;
}
.ins-vital .v .total { font: 400 13px/1 var(--font-sans); color: var(--muted-foreground); letter-spacing: 0; }
.ins-vital .lbl {
  font: 400 12.5px/1.2 var(--font-sans);
  color: var(--muted-foreground);
  display: inline-flex; align-items: center; gap: 6px;
  white-space: nowrap;
}
.ins-vital .lbl .trend {
  display: inline-flex; align-items: center; gap: 2px;
  padding: 2px 5px;
  border-radius: 4px;
  font: 500 10.5px/1 var(--font-sans);
  font-variant-numeric: tabular-nums;
}
.ins-vital .lbl .trend.up { color: var(--positive-primary); background: var(--positive-subtle); }
.ins-vital .lbl .trend.dn { color: var(--alert-primary); background: var(--alert-subtle); }
.ins-vital.primary .v { font-size: 32px; }
.ins-vital.primary .lbl { font-weight: 500; color: var(--foreground); }

/* ---- Stats + chart group: tight 24px vertical rhythm ---- */
.ins-chart-group {
  display: flex;
  flex-direction: column;
  gap: 24px;
  padding: 0;
}

/* ---- Metric-card grid (design system: components-metric-card) ---- */
.metric-card-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
  max-width: 1024px;
}
.metric-card {
  display: flex;
  flex-direction: column;
  gap: 4px;
  background: var(--card, #fff);
  color: var(--card-foreground, var(--foreground));
  border: 1px solid var(--border);
  border-radius: var(--radius-xl, 12px);
  padding: 18px 20px;
}
.metric-card .metric-title {
  font: 400 13px/1.3 var(--font-sans);
  color: var(--muted-foreground);
}
.metric-card .metric-value-row {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.metric-card .metric-value {
  font: 500 20px/1.25 var(--font-sans);
  letter-spacing: -0.005em;
  color: var(--foreground);
  font-variant-numeric: tabular-nums;
}
.metric-card .metric-sub {
  font: 400 13px/1.3 var(--font-sans);
  color: var(--muted-foreground);
  font-variant-numeric: tabular-nums;
  margin-top: 2px;
}
.metric-card .mc-badge {
  display: inline-flex;
  align-items: center;
  height: 20px;
  padding: 0 8px;
  border-radius: 999px;
  font: 500 12px/1 var(--font-sans);
  flex: none;
}
.metric-card .mc-badge.positive {
  background: var(--positive, #ecfdf3);
  color: var(--positive-foreground, #027a48);
}
.metric-card .mc-badge.warning {
  background: var(--warning-bg, #fff4e5);
  color: var(--warning-fg, #b54708);
}
.metric-card .mc-badge.neutral {
  background: var(--muted);
  color: var(--muted-foreground);
}

/* ---- hasTarget variant: progress bar + split caption ---- */
.metric-card.has-target .metric-progress {
  position: relative;
  width: 100%;
  height: 4px;
  border-radius: 999px;
  background: var(--muted);
  overflow: hidden;
  margin-top: 10px;
}
.metric-card.has-target .metric-progress-fill {
  position: absolute;
  inset: 0 auto 0 0;
  background: var(--foreground);
  border-radius: 999px;
}
.metric-card.has-target .metric-target-row {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 12px;
  margin-top: 8px;
}
.metric-card.has-target .metric-target-label {
  font: 400 13px/1.3 var(--font-sans);
  color: var(--muted-foreground);
}
.metric-card.has-target .metric-target-value {
  font: 400 13px/1.3 var(--font-sans);
  color: var(--foreground);
  font-variant-numeric: tabular-nums;
}

/* ---- Chart header row: metrics (left) + range pills (right) ---- */
.ins-chart-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  padding: 0;
  max-width: 1024px;
  width: 100%;
  margin: 0 auto;
}

/* ---- At-a-glance stats: left-aligned strip ---- */
.ins-glance {
  display: flex;
  justify-content: flex-start;
  gap: 16px;
  padding: 0;
}
.ins-glance-item { width: 100px; }
.ins-glance-item {
  appearance: none;
  background: transparent;
  border: none;
  padding: 2px 0 8px;
  text-align: left;
  cursor: pointer;
  font-family: inherit;
  display: flex; flex-direction: column;
  gap: 4px;
  min-width: 0;
  position: relative;
}
.ins-glance-item .lbl {
  display: inline-flex; align-items: center; gap: 6px;
  font: 400 12px/1 var(--font-sans);
  color: var(--muted-foreground);
}
.ins-glance-item .lbl .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: transparent;
  border: 1px solid var(--border);
}
.ins-glance-item .lbl .dot.on {
  background: var(--action-primary);
  border-color: var(--action-primary);
}
.ins-glance-item .v {
  font: 500 18px/1.1 var(--font-sans);
  letter-spacing: -0.015em;
  color: var(--foreground);
  font-variant-numeric: tabular-nums;
}
.ins-glance-item .dlt {
  font: 500 11px/1 var(--font-sans);
  font-variant-numeric: tabular-nums;
}
.ins-glance-item .dlt.up { color: var(--positive-primary); }
.ins-glance-item .dlt.dn { color: var(--alert-primary); }
.ins-glance-item[data-active="true"] .v { color: var(--foreground); font-weight: 600; }
.ins-glance-item[data-active="true"]::after {
  content: "";
  position: absolute;
  left: 0; right: 0; bottom: -2px;
  height: 2px;
  background: var(--action-primary);
  border-radius: 2px;
}

/* ---- FULL-BLEED chart block ---- */
/* Breaks out to fill the .content width edge-to-edge by negating
   the .content 40px horizontal padding. .content must also have
   overflow-x: hidden so the bleed doesn't produce a scrollbar. */
.ins-chart-bleed {
  position: relative;
  width: 100%;
  padding: 0;
  display: flex; flex-direction: column;
  gap: 0;
}
/* Left-edge mask — fades the line & fill into white so the cut doesn't feel abrupt */
.ins-chart-bleed::before {
  content: "";
  position: absolute;
  left: 0; top: 0;
  width: 80px; height: 408px;
  background: linear-gradient(to right, #fff 0%, rgba(255,255,255,0.85) 40%, rgba(255,255,255,0) 100%);
  pointer-events: none;
  z-index: 2;
}
.ins-chart-box {
  position: relative;
  width: 100%;
  min-height: 408px;
}
.ins-chart-axis {
  display: flex; justify-content: space-between;
  padding: 2px 48px 0 48px;
  font: 400 11.5px/1 var(--font-sans);
  color: var(--muted-foreground);
  font-variant-numeric: tabular-nums;
}
.ins-chart-controls {
  display: flex; justify-content: center;
  padding: 14px 0 2px;
}

/* Range pills — pill row below chart */
.sc-range-pills {
  display: inline-flex; align-items: center;
  gap: 2px;
  padding: 2px;
  background: var(--muted);
  border-radius: 8px;
}
.sc-range-pill {
  appearance: none;
  background: transparent; border: none;
  cursor: pointer;
  padding: 5px 10px;
  border-radius: 6px;
  font: 500 11.5px/1 var(--font-sans);
  color: var(--muted-foreground);
  font-variant-numeric: tabular-nums;
  transition: background .12s ease, color .12s ease;
}
.sc-range-pill:hover { color: var(--foreground); }
.sc-range-pill[data-active="true"] {
  background: #fff;
  color: var(--foreground);
  box-shadow: 0 1px 2px rgba(0,0,0,0.04);
}

/* ---- Daily recap — slim framed panel BELOW the chart ---- */
.ins-recap {
  padding: 16px 20px 14px;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 12px;
  display: flex; flex-direction: column; gap: 8px;
  box-shadow: var(--shadow-xs);
}
.ins-recap-head {
  display: flex; align-items: center; gap: 10px;
  font: 500 12.5px/1 var(--font-sans);
  color: var(--foreground);
}
.ins-recap-head .ico { color: var(--action-primary); font-size: 13px; }
.ins-recap-head .t { letter-spacing: -0.005em; }
.ins-recap-head .stamp {
  margin-left: auto;
  font: 400 11.5px/1 var(--font-sans);
  color: var(--muted-foreground);
}
.ins-recap-expand {
  appearance: none; background: transparent; border: none;
  width: 24px; height: 24px; border-radius: 6px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--muted-foreground);
  cursor: pointer;
}
.ins-recap-expand:hover { background: var(--muted); color: var(--foreground); }
.ins-recap-body {
  font: 400 13.5px/1.6 var(--font-sans);
  color: var(--foreground);
  text-wrap: pretty;
}
.ins-recap-body b { font-weight: 500; }
.ins-recap .ask-ai-link { margin-top: 2px; }

/* ---- Tray: sections continue after hero ---- */
.ins-page .ins-section { display: flex; flex-direction: column; gap: 14px; }
.ins-page .ins-section-head { display: flex; align-items: center; justify-content: space-between; }
.ins-page .ins-section-title {
  font: 500 14.5px/1.2 var(--font-sans);
  color: var(--foreground);
  letter-spacing: -0.005em;
}

/* ============================================================
   Main content wrappers — these are shared by every page but
   had no CSS. Insights uses .content-wide for a slightly wider
   comfy reading column; Home/Events use .content-inner (narrow).
   ============================================================ */
/* second .main rule — kept only as a no-op; primary rule is earlier */
.content {
  flex: 1; min-height: 0;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 28px 40px 64px;
  scrollbar-gutter: stable;
}
.content-wide {
  max-width: 1180px;
  margin: 0 auto;
  width: 100%;
}
.content-inner {
  max-width: 920px;
  margin: 0 auto;
  width: 100%;
}
.home-dash { max-width: 1080px; margin: 0 auto; padding: 8px 0; width: 100%; }
.home-greet {
  font: 400 28px/1.2 var(--font-sans);
  letter-spacing: -0.015em;
  color: var(--foreground);
  margin: 0 0 24px;
}
.home-greet b { font-weight: 500; }

/* Ask AI inline link (used in recap) */
.ask-ai-link {
  appearance: none;
  background: none;
  border: none;
  padding: 0;
  cursor: pointer;
  display: inline-flex; align-items: center; gap: 4px;
  font: 500 12.5px/1 var(--font-sans);
  color: var(--action-primary);
  align-self: flex-start;
}
.ask-ai-link:hover { text-decoration: underline; }

/* Operational pressure grid */
.op-press-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
.op-card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  box-shadow: var(--shadow-xs);
  display: flex; flex-direction: column; gap: 4px;
}
.op-card .v { font: 500 22px/1.1 var(--font-sans); letter-spacing: -0.015em; color: var(--foreground); }
.op-card .lbl { font: 400 12px/1.2 var(--font-sans); color: var(--muted-foreground); }
.op-card .sub {
  display: inline-flex; align-items: center; gap: 6px;
  font: 400 11.5px/1.2 var(--font-sans);
  color: var(--muted-foreground);
  margin-top: 4px;
}
.op-card .sub .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted-foreground); }

/* Suggested actions list */
.sa {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.sa-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
}
.sa-head .t { font: 500 13.5px/1 var(--font-sans); color: var(--foreground); }
.sa-filter {
  appearance: none; background: #fff; border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 10px;
  font: 400 12px/1 var(--font-sans); color: var(--foreground);
  display: inline-flex; align-items: center; gap: 6px;
  cursor: pointer;
}
.sa-filter:hover { background: var(--muted); }
.sa-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 16px;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  align-items: center;
}
.sa-row:last-child { border-bottom: none; }
.sa-row:hover { background: color-mix(in oklab, var(--muted) 30%, transparent); }
.sa-row .bd { min-width: 0; }
.sa-row .bd .t { font: 500 13.5px/1.3 var(--font-sans); color: var(--foreground); }
.sa-row .bd .d { font: 400 12.5px/1.5 var(--font-sans); color: var(--muted-foreground); margin-top: 4px; }
.sa-row .bd .meta {
  display: inline-flex; align-items: center; gap: 10px;
  margin-top: 8px;
  font: 400 11.5px/1 var(--font-sans);
  color: var(--muted-foreground);
}
.sa-row .bd .meta .chip-p {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 7px; border-radius: 4px;
  background: var(--positive-subtle); color: var(--positive-primary);
  font-weight: 500;
}
.sa-row .bd .meta .chip-p .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--positive-primary); }
.sa-row .bd .meta .pts { color: var(--muted-foreground); }
.sa-row .act { display: inline-flex; align-items: center; gap: 6px; }

/* ============================================================
   Policies landing — same full-width chart pattern as Insights
   ============================================================ */

.pol-page {
  display: flex; flex-direction: column;
  align-items: center;
  gap: 28px;
  width: 100%;
  padding: 4px 0 8px;
}

/* All children constrain to 1024px, centered */
.pol-page > * {
  max-width: 1024px;
  width: 100%;
}
/* Tighten header → table spacing inside policies */
.pol-page > .section-head { margin: 0; }
.pol-page > .section-head + .sugg,
.pol-page > .section-head + .list { margin-top: -16px; }
.pol-page > .pol-chart-group {
  width: 100%;
  max-width: none;
}

/* Recap inside chart-group: center at 1024px like other modules */
.pol-chart-group > .ins-recap {
  max-width: 1024px;
  width: 100%;
  margin: 0 auto;
}

.pol-chart-group {
  display: flex;
  flex-direction: column;
  gap: 56px;
  padding: 8px 0 24px;
}

/* Header row: KPI tabs (left) + range pills (right), centered at 1024px */
.pol-chart-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  padding: 0;
  max-width: 1024px;
  width: 100%;
  margin: 0 auto;
}

/* Full-bleed chart wrapper */
.pol-chart-bleed {
  position: relative;
  width: 100%;
  padding: 0;
  display: flex; flex-direction: column;
  gap: 0;
}
.pol-chart-bleed::before {
  content: "";
  position: absolute;
  left: 0; top: 0;
  width: 80px; height: 408px;
  background: linear-gradient(to right, #fff 0%, rgba(255,255,255,0.85) 40%, rgba(255,255,255,0) 100%);
  pointer-events: none;
  z-index: 2;
}
.pol-chart-box {
  position: relative;
  width: 100%;
  min-height: 408px;
}
.pol-chart-axis {
  display: flex; justify-content: space-between;
  padding: 2px 48px 0 48px;
  font: 400 11.5px/1 var(--font-sans);
  color: var(--muted-foreground);
  font-variant-numeric: tabular-nums;
}

/* Recap foot — centered at 1024px */
.pol-chart-foot {
  display: flex; align-items: flex-start; gap: 10px;
  max-width: 1024px;
  width: 100%;
  margin: 0 auto;
  padding: 12px 0 0;
  font: 400 13px/1.5 var(--font-sans);
  color: var(--muted-foreground);
}
.pol-chart-foot b { font-weight: 500; color: var(--foreground); }
.pol-chart-foot .spk { color: var(--action-primary); }


/* ============================================================
   Chart card embedded recap/summary (Insights)
   The daily recap lives inside the Program insights card, below
   the chart body. No outer border/shadow — it's already framed
   by .sc-card.
   ============================================================ */
.sc-card-recap {
  border-top: 1px solid var(--border);
  padding: 16px 22px 18px;
  display: flex; flex-direction: column; gap: 8px;
  background: #fff;
}
.ins-recap--embedded {
  /* strip the standalone frame — card provides it */
  padding: 0;
  background: transparent;
  border: 0;
  border-radius: 0;
  box-shadow: none;
}



/* Chart card toolbar row: title+desc (left) | range pills (right).
   Sits between the metric-tabs header and the chart body, with gap
   to the plot. */


/* Chart section toolbar — sits ABOVE the chart card, within .ins-chart-group.
   Controls the gap between the title/range row and the chart card. */
.ins-chart-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 0 2px;
}
.ins-chart-toolbar-title {
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-width: 0;
}
.ins-chart-toolbar .sc-range-pills {
  margin: 0;
  flex-shrink: 0;
}

/* ============================================================
   Op-pressure + Suppliers split (Insights page, below chart)
   ============================================================ */
.ins-op-split {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
  gap: 16px;
  align-items: stretch;
}
@media (max-width: 860px) {
  .ins-op-split { grid-template-columns: 1fr; }
}
/* Vertical stack of op-pressure cards */
.metric-card-grid.vertical {
  display: flex !important;
  flex-direction: column;
  gap: 10px;
}
.metric-card-grid.vertical .metric-card {
  width: 100%;
  flex: 1;
}

/* Leaderboard card */
.ins-op-split .sup-card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 10px;
  display: flex; flex-direction: column;
  overflow: visible;
  align-self: stretch;
}
.ins-op-split .sup-card-head {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 10px;
}
.ins-op-split .sup-card-head .title { font: 500 14px/1.2 var(--font-sans); color: var(--foreground); }
.ins-op-split .sup-card-head .desc  { font: 400 12px/1.4 var(--font-sans); color: var(--muted-foreground); }
.ins-op-split .sup-list { border: none; border-radius: 0; overflow-y: auto; flex: 1; min-height: 0; }
.ins-op-split .sup-row { padding: 12px 14px; gap: 10px; grid-template-columns: 20px 28px 1fr auto; }
.ins-op-split .sup-row .logo { width: 28px; height: 28px; font-size: 10px; border-radius: 6px; }
.ins-op-split .sup-row .rank { font-size: 12px; }
.ins-op-split .sup-row .top .name { font-size: 12.5px; }
.ins-op-split .sup-row .top .cat,
.ins-op-split .sup-row .top .rate,
.ins-op-split .sup-row .top .planner { font-size: 10.5px; }
.ins-op-split .sup-row .bar-meta .v,
.ins-op-split .sup-row .bar-meta .m { font-size: 10.5px; }
.ins-op-split .sup-row .trend { font-size: 10.5px; padding: 3px 6px; }


.sup-tabs { display: inline-flex; gap: 4px; background: var(--muted); border-radius: 8px; padding: 3px; }
.sup-tab {
  appearance: none; background: transparent; border: none;
  padding: 6px 10px; border-radius: 6px;
  font: 500 12px/1 var(--font-sans); color: var(--muted-foreground);
  cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
}
.sup-tab .count {
  font: 400 11px/1 var(--font-sans); color: var(--muted-foreground);
  background: #fff; padding: 2px 6px; border-radius: 99px;
  box-shadow: inset 0 0 0 1px var(--border);
}
.sup-tab.on { background: #fff; color: var(--foreground); box-shadow: 0 1px 2px rgb(0 0 0 / 0.04), inset 0 0 0 1px var(--border); }
.sup-tab.on .count { background: var(--muted); box-shadow: none; }

.sup-list {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.sup-row {
  display: grid;
  grid-template-columns: 28px 36px 1fr auto;
  gap: 14px;
  align-items: center;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
}
.sup-row:last-child { border-bottom: none; }
.sup-row:hover { background: color-mix(in oklab, var(--muted) 30%, transparent); }

.sup-row .rank {
  font: 500 14px/1 var(--font-sans); color: var(--muted-foreground);
  text-align: center;
  font-variant-numeric: tabular-nums;
}
.sup-row .logo {
  width: 36px; height: 36px; border-radius: 8px;
  background: var(--muted); color: var(--foreground);
  display: inline-flex; align-items: center; justify-content: center;
  font: 600 11px/1 var(--font-sans); letter-spacing: 0.02em;
}
.sup-row .logo.bm { background: var(--decorative-champagne-100, #f8efdd); color: var(--decorative-champagne-900, #6b4d14); }

.sup-row .bd { min-width: 0; display: flex; flex-direction: column; gap: 6px; }
.sup-row .top { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; row-gap: 4px; }
.sup-row .top .name { font: 500 13.5px/1.2 var(--font-sans); color: var(--foreground); }
.sup-row .top .cat {
  font: 400 11px/1 var(--font-sans); color: var(--muted-foreground);
  padding: 3px 7px; border-radius: 4px;
  background: var(--muted);
  margin-left: 4px;
}
.sup-row .top .rate,
.sup-row .top .planner {
  font: 400 11.5px/1 var(--font-sans); color: var(--muted-foreground);
}

.sup-row .bar-wrap { display: flex; flex-direction: column; gap: 4px; }
.sup-row .bar {
  width: 100%; height: 5px; border-radius: 99px;
  background: var(--muted);
  overflow: hidden;
}
.sup-row .bar .fill {
  height: 100%; border-radius: 99px;
  background: var(--action-primary);
}
.sup-row.bookmark .bar .fill { background: var(--action-primary); }
.sup-row .bar-meta {
  display: flex; align-items: center; gap: 10px;
  font: 400 11.5px/1 var(--font-sans);
}
.sup-row .bar-meta .v { font-weight: 500; color: var(--foreground); font-variant-numeric: tabular-nums; }
.sup-row .bar-meta .m { color: var(--muted-foreground); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.sup-row .trend {
  display: inline-flex; align-items: center; gap: 3px;
  font: 500 11.5px/1 var(--font-sans);
  padding: 4px 8px; border-radius: 4px;
}
.sup-row .trend.up { color: var(--positive-primary); background: color-mix(in oklab, var(--positive-primary) 10%, transparent); }
.sup-row .trend.dn { color: var(--alert-primary); background: color-mix(in oklab, var(--alert-primary) 10%, transparent); }
.sup-row .trend.flat { color: var(--muted-foreground); background: var(--muted); }

.sup-savers { display: inline-flex; align-items: center; }
.sup-savers .savr-av,
.sup-savers .savr-more {
  width: 22px; height: 22px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font: 600 9.5px/1 var(--font-sans);
  background: var(--muted); color: var(--foreground);
  box-shadow: 0 0 0 2px #fff;
  margin-left: -6px;
}
.sup-savers .savr-av:first-child { margin-left: 0; }
.sup-savers .savr-more { background: var(--foreground); color: #fff; margin-left: -6px; }

/* ============================================================
   PAGE POLISH — final pass
   ============================================================ */

/* More generous vertical rhythm between hero, op-split, and suggested */
.ins-page { gap: 32px; padding: 8px 0 24px; }

/* Hero chart toolbar: tighter title / range pill alignment */
.ins-chart-toolbar {
  align-items: flex-end;
}
.ins-chart-toolbar-title .sc-card-title {
  font-weight: 500;
  letter-spacing: -0.015em;
  font-size: 18px;
  line-height: 1.2;
}
.ins-chart-toolbar-title .sc-card-desc {
  margin-top: 4px;
  font-size: 13px;
  color: var(--muted-foreground);
}

/* Chart card — softer shadow, crisper border */
.ins-chart-group .sc-card {
  border-radius: 12px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.02), 0 0 0 1px var(--border);
  border: none;
  overflow: hidden;
}

/* Vital tabs — subtle active treatment, lighter inactive state */
.ins-chart-group .sc-vitals-header .sc-tab {
  transition: background 120ms ease;
}
.ins-chart-group .sc-vitals-header .sc-tab:hover:not([data-active="true"]) {
  background: color-mix(in oklab, var(--muted) 40%, transparent);
}

/* Op-split polish */
.ins-op-split {
  gap: 20px;
}

/* Metric cards in op-split: airier padding, softer border, slightly bolder numbers */
.ins-op-split .metric-card {
  padding: 18px 20px 16px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: #fff;
  box-shadow: 0 1px 2px rgba(15, 23, 42, 0.03);
  transition: box-shadow 160ms ease, transform 160ms ease;
}
.ins-op-split .metric-card:hover {
  box-shadow: 0 2px 8px rgba(15, 23, 42, 0.05);
}
.ins-op-split .metric-card .metric-title {
  font-size: 12.5px;
  color: var(--muted-foreground);
  letter-spacing: 0;
}
.ins-op-split .metric-card .metric-value {
  font-size: 28px;
  font-weight: 500;
  letter-spacing: -0.025em;
  line-height: 1.1;
}
.ins-op-split .metric-card .metric-progress {
  height: 4px;
  background: color-mix(in oklab, var(--muted) 80%, transparent);
  border-radius: 999px;
}
.ins-op-split .metric-card .metric-progress-fill {
  background: var(--action-primary);
  border-radius: 999px;
}
.ins-op-split .metric-card .metric-target-row { margin-top: 10px; }
.ins-op-split .metric-card .metric-target-label {
  font-size: 12.5px;
  color: var(--muted-foreground);
}
.ins-op-split .metric-card .metric-target-value {
  font-size: 12.5px;
  color: var(--foreground);
  font-variant-numeric: tabular-nums;
  font-weight: 500;
}

/* Supplier leaderboard card — match metric-card visual weight */
.ins-op-split .sup-card {
  border-radius: 12px;
  border: 1px solid var(--border);
  box-shadow: 0 1px 2px rgba(15, 23, 42, 0.03);
}
.ins-op-split .sup-card-head {
  padding: 16px 20px 14px;
  display: flex !important;
  flex-direction: row !important;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}
.ins-op-split .sup-card-head .title {
  font-size: 14.5px;
  font-weight: 500;
  letter-spacing: -0.01em;
}

/* Legend (Preferred / Favorite + info tooltip) */
.sup-legend {
  display: inline-flex; align-items: center; gap: 16px;
  font: 500 13px/1 var(--font-sans);
  color: var(--muted-foreground);
}
.sup-legend-item {
  display: inline-flex; align-items: center; gap: 7px;
}
.sup-legend-label { color: var(--muted-foreground); }
.sup-legend-ico { display: inline-flex; }
.sup-legend-ico.preferred { color: #1d9bf0; }
.sup-legend-ico.favorite  { color: #e63946; }

.sup-legend-divider {
  width: 1px; height: 16px; background: var(--border);
  display: inline-block; margin: 0 2px;
}

.sup-legend-info {
  position: relative;
  display: inline-flex; align-items: center; justify-content: center;
  width: 22px; height: 22px; border-radius: 50%;
  border: 1px solid var(--border);
  color: var(--muted-foreground);
  background: #fff;
  cursor: help; outline: none;
  transition: background 100ms ease, color 100ms ease, border-color 100ms ease;
}
.sup-legend-info:hover,
.sup-legend-info:focus-visible {
  color: var(--foreground);
  border-color: var(--muted-foreground);
}

.sup-legend-tip {
  position: absolute;
  bottom: calc(100% + 10px); right: -8px;
  width: 280px;
  padding: 14px 16px;
  background: #1f2937;
  color: #fff;
  border-radius: 12px;
  box-shadow: 0 12px 32px rgba(15, 23, 42, 0.22);
  font: 400 13px/1.45 var(--font-sans);
  display: flex; flex-direction: column; gap: 14px;
  opacity: 0; pointer-events: none;
  transform: translateY(2px);
  transition: opacity 120ms ease, transform 120ms ease;
  z-index: 10;
  text-align: left;
}
.sup-legend-tip::after {
  content: ""; position: absolute;
  bottom: -5px; right: 14px; width: 10px; height: 10px;
  background: #1f2937; transform: rotate(45deg);
  border-radius: 1px;
}
.sup-legend-info:hover .sup-legend-tip,
.sup-legend-info:focus-visible .sup-legend-tip {
  opacity: 1; pointer-events: auto; transform: translateY(0);
}
.sup-legend-tip .tip-row {
  display: grid;
  grid-template-columns: 18px 1fr;
  column-gap: 8px;
  row-gap: 4px;
  align-items: center;
}
.sup-legend-tip .tip-row .sup-legend-ico { grid-column: 1; grid-row: 1; }
.sup-legend-tip .tip-row b {
  grid-column: 2; grid-row: 1;
  font: 600 14px/1.2 var(--font-sans); color: #fff;
}
.sup-legend-tip .tip-row .tip-body {
  grid-column: 2; grid-row: 2;
  color: rgba(255,255,255,0.78);
  font: 400 13px/1.45 var(--font-sans);
}

/* Inline flags next to supplier name */
.sup-row .top .sup-flags {
  display: inline-flex; align-items: center; gap: 4px;
  margin-left: -4px;
}
.sup-row .top .sup-flag {
  display: inline-flex; align-items: center; justify-content: center;
  line-height: 0;
}
.sup-row .top .sup-flag.preferred { color: #1d9bf0; }
.sup-row .top .sup-flag.favorite  { color: #e63946; }
.ins-op-split .sup-row {
  padding: 11px 20px;
  transition: background 100ms ease;
}
.ins-op-split .sup-row:hover { background: color-mix(in oklab, var(--muted) 30%, transparent); }
.ins-op-split .sup-row .rank {
  color: var(--muted-foreground);
  font-variant-numeric: tabular-nums;
  font-weight: 400;
  text-align: center;
}
.ins-op-split .sup-row .logo {
  background: var(--muted);
  color: var(--foreground);
  font-weight: 600;
  letter-spacing: 0.02em;
}
.ins-op-split .sup-row .top {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}
.ins-op-split .sup-row .top .name {
  font-weight: 500;
  letter-spacing: -0.005em;
}
.ins-op-split .sup-row .top .cat {
  padding: 2px 6px;
  background: var(--muted);
  color: var(--muted-foreground);
  border-radius: 4px;
  font-size: 10.5px;
  font-weight: 500;
  line-height: 1;
  letter-spacing: 0.01em;
}
.ins-op-split .sup-row .bar {
  background: color-mix(in oklab, var(--muted) 80%, transparent);
}
.ins-op-split .sup-row .bar .fill {
  background: var(--action-primary);
}
.ins-op-split .sup-row .bar-meta .v { font-weight: 500; }

/* Suggested actions polish */
.ins-page > .ins-section .ins-section-title {
  font-size: 16px;
  font-weight: 500;
  letter-spacing: -0.015em;
}
.sa {
  border-radius: 12px;
  box-shadow: 0 1px 2px rgba(15, 23, 42, 0.03);
}
.sa-row {
  padding: 16px 20px;
  transition: background 100ms ease;
}
.sa-row .bd .t {
  font-size: 14px;
  font-weight: 500;
  letter-spacing: -0.005em;
}
.sa-row .bd .d {
  font-size: 13px;
  line-height: 1.5;
  margin-top: 3px;
}
.sa-row .bd .meta {
  margin-top: 8px;
  gap: 14px;
}
.sa-row .bd .meta .chip-p {
  padding: 3px 8px 3px 6px;
  background: color-mix(in oklab, var(--positive-primary) 10%, transparent);
  border-radius: 4px;
  font-weight: 500;
  font-size: 11.5px;
}
.sa-row .bd .meta .chip-p .dot { width: 6px; height: 6px; }
.sa-row .bd .meta .pts {
  font-size: 11.5px;
  color: var(--muted-foreground);
}

/* Filter pill: match design system refinement */
.sa-filter {
  padding: 6px 11px;
  border-radius: 8px;
  font-size: 12.5px;
  gap: 7px;
  transition: background 100ms ease, border-color 100ms ease;
}
.sa-filter:hover {
  background: var(--muted);
  border-color: color-mix(in oklab, var(--border) 70%, var(--foreground) 10%);
}



/* ===========================================================
   Dashboard — Admin > Dashboard > Events report (static recreation)
   =========================================================== */

.dash {
  display: flex;
  flex-direction: column;
  align-items: center;
  background: #fff;
  min-height: 100%;
  padding: 20px 24px 24px;
}
/* Constrain content width to match Insights / Policies (1024px) */
.dash > * {
  max-width: 1024px;
  width: 100%;
}

/* Tabs strip */
.d-tabs {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 18px 0 18px;
  background: #fff;
  border-bottom: 1px solid var(--border);
  flex: none;
}
.d-tab {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  font: 400 13px/1 var(--font-sans);
  color: var(--muted-foreground);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  cursor: default;
  white-space: nowrap;
}
.d-tab svg { color: var(--muted-foreground); }

.d-btn {

.d-btn.ghost { background: transparent; border-color: transparent; color: var(--foreground); }

  grid-template-columns: repeat(3, 1fr);

.dk-card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px 16px;
}
.dk-label {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font: 400 12.5px/1 var(--font-sans);
  color: var(--muted-foreground);
  margin-bottom: 10px;
}
.dk-info {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 13px;

}
.dk-value {

/* Cards in grids */

  background: #fff;
  border: 1px solid var(--border);

  padding: 14px 16px 18px;
  display: flex;
  flex-direction: column;

  align-items: center;

  margin-bottom: 14px;
}
.d-card-title {
  font: 400 12.5px/1 var(--font-sans);
  color: var(--muted-foreground);
}
.d-card-title-amt {

  color: var(--foreground);

  background: var(--muted);
  border-radius: 7px;

  gap: 2px;
}
.d-seg-btn {
  font: 400 11.5px/1 var(--font-sans);
  color: var(--muted-foreground);

  opacity: 1;
}
.sb-mi.active > svg { opacity: 1; }

.sb-pill {
  height: 18px; min-width: 18px; padding: 0 6px;
  border-radius: 999px;
  background: color-mix(in oklab, var(--sidebar-foreground) 9%, transparent);
  color: var(--sidebar-foreground);
  font: 500 11px/18px var(--font-sans);
  text-align: center;
  justify-self: end;
}
.sb-badge-new {
  padding: 0 6px;
  height: 17px;
  border-radius: 4px;
  background: color-mix(in oklab, var(--action-primary) 16%, transparent);
  color: var(--action-primary);
  font: 600 9.5px/17px var(--font-sans);
  letter-spacing: 0.06em;
}
.sb-mi-action {
  width: 20px; height: 20px; border-radius: 4px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--sidebar-foreground); opacity: 0;
  transition: opacity .12s ease, background .12s ease;
}
.sb-mi:hover .sb-mi-action { opacity: .7; }
.sb-mi-action:hover { background: color-mix(in oklab, var(--sidebar-foreground) 10%, transparent); opacity: 1 !important; }

.sb-mi-time { font: 400 10.5px/1 var(--font-sans); color: var(--sidebar-foreground); opacity: .5; }

/* Footer: NavUser (inset variant — flush, no top border) */
.sb-footer { padding-top: 4px; flex-shrink: 0; }
.sb-user {
  display: grid;
  grid-template-columns: 32px 1fr 14px;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-radius: 8px;
  background: transparent; border: none; cursor: pointer;
  width: 100%; text-align: left;
  color: inherit;
}
.sb-user:hover { background: var(--sidebar-accent); }
.sb-user-avatar {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--decorative-champagne-600);
  color: #fff;
  display: inline-flex; align-items: center; justify-content: center;
  font: 500 12px/1 var(--font-sans);
  letter-spacing: -0.01em;
  flex-shrink: 0;
}
.sb-user-meta { display: flex; flex-direction: column; min-width: 0; gap: 2px; }
.sb-user-name { font: 500 13px/1.2 var(--font-sans); color: var(--sidebar-foreground); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sb-user-email { font: 400 11px/1.3 var(--font-sans); color: var(--sidebar-foreground); opacity: .6; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Collapsed rail */
.sb-root[data-collapsed="true"] .sb-team-meta,
.sb-root[data-collapsed="true"] .sb-team-chev,
.sb-root[data-collapsed="true"] .sb-mi-text,
.sb-root[data-collapsed="true"] .sb-mi-action,
.sb-root[data-collapsed="true"] .sb-mi-time,
.sb-root[data-collapsed="true"] .sb-pill,
.sb-root[data-collapsed="true"] .sb-badge-new,
.sb-root[data-collapsed="true"] .sb-user-meta,
.sb-root[data-collapsed="true"] .sb-label,
.sb-root[data-collapsed="true"] .sb-mode-menu { display: none !important; }
.sb-root[data-collapsed="true"] .sb-team,
.sb-root[data-collapsed="true"] .sb-user {
  grid-template-columns: 32px;
  justify-content: center;
}
.sb-root[data-collapsed="true"] .sb-mi {
  grid-template-columns: 1fr;
  justify-items: center;
  padding: 7px 0;
  width: 100%;
  height: 32px;
  margin: 1px 0;
}
.sb-root[data-collapsed="true"] .sb-content { overflow-x: hidden; }
.sb-root[data-collapsed="true"] .sb-team {
  grid-template-columns: 1fr;
  justify-items: center;
  padding: 6px 0;
}
.sb-root[data-collapsed="true"] .sb-user {
  grid-template-columns: 1fr;
  justify-items: center;
  padding: 6px 0;
}

/* ========================================================================
   Home-mode additions
   ======================================================================== */

/* Mode switch at top of sidebar */
.mode-switch {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 2px;
  padding: 3px;
  margin: 0 8px 10px;
  background: var(--muted);
  border-radius: 9px;
}
.ms-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 6px 8px;
  font: 500 12px/1 var(--font-sans);
  color: var(--muted-foreground);
  background: transparent;
  border: none;
  border-radius: 7px;
  cursor: pointer;
  transition: all .12s ease;
}
.ms-btn svg { color: var(--muted-foreground); }
.ms-btn:hover:not(.active) { color: var(--foreground); }
.ms-btn.active {
  background: #fff;
  color: var(--foreground);
  box-shadow: var(--shadow-xs, 0 1px 2px rgba(0,0,0,.06));
}
.ms-btn.active svg { color: var(--foreground); }
.sidebar.mini .mode-switch { display: none; }

/* ========== Home Dashboard (Ellie home) ========== */
.home-dash { max-width: 980px; margin: 0 auto; padding: 60px 40px 80px; }
.home-greet { font: 400 28px/1.15 var(--font-sans); letter-spacing: -0.015em; color: var(--foreground); margin: 0 0 24px; }
.home-greet b { font-weight: 500; }

/* Chat entry input (dashboard) */
.chat-entry {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px 10px;
  box-shadow: 0 1px 2px rgba(0,0,0,.02);
}
.chat-entry textarea {
  width: 100%;
  border: none;
  outline: none;
  resize: none;
  background: transparent;
  font: 400 14px/1.4 var(--font-sans);
  color: var(--foreground);
  min-height: 22px;
  font-family: var(--font-sans);
}
.chat-entry textarea::placeholder { color: var(--muted-foreground); }
.chat-entry .row { display: flex; align-items: center; justify-content: space-between; padding-top: 4px; }
.chat-entry .row .left, .chat-entry .row .right { display: flex; align-items: center; gap: 6px; }
.chat-entry .ic-btn {
  background: none; border: none; cursor: pointer; color: var(--muted-foreground);
  width: 26px; height: 26px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center;
}
.chat-entry .ic-btn:hover { background: var(--muted); color: var(--foreground); }
.chat-entry .send {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--foreground); color: #fff; border: none; cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
}
.chat-entry .send:hover { background: var(--primary); }

.chip-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
.prompt-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 11px; border-radius: 999px;
  border: 1px solid var(--border); background: #fff;
  font: 400 12.5px/1 var(--font-sans); color: var(--foreground); cursor: pointer;
  transition: background .12s;
}
.prompt-chip svg { color: var(--muted-foreground); }
.prompt-chip:hover { background: var(--muted); }

/* Home section header */
.home-section { margin-top: 36px; }
.home-section-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 10px; }
.home-section-head h3 {
  font: 400 14px/1 var(--font-sans);
  color: var(--foreground);
  margin: 0;
  display: inline-flex;
  align-items: baseline;
  gap: 8px;
}
.home-section-head .cnt {
  font: 500 11px/1 var(--font-sans);
  padding: 2px 7px;
  background: var(--muted);
  color: var(--muted-foreground);
  border-radius: 5px;
}
.home-section-head a {
  font: 400 12px/1 var(--font-sans);
  color: var(--muted-foreground);
  text-decoration: none;
  cursor: pointer;
}
.home-section-head a:hover { color: var(--foreground); }

/* Attention items */
.attn-list { display: flex; flex-direction: column; gap: 8px; }
.attn-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 10px;
}
.attn-icon {
  width: 30px; height: 30px; border-radius: 8px;
  background: var(--muted);
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--muted-foreground);
  flex-shrink: 0;
}
.attn-body { flex: 1; min-width: 0; }
.attn-title { font: 500 13px/1.3 var(--font-sans); color: var(--foreground); }
.attn-meta { font: 400 11.5px/1.3 var(--font-sans); color: var(--muted-foreground); margin-top: 2px; }

/* Events table */
.events-card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.event-row {
  display: grid;
  grid-template-columns: 1.7fr 1fr 0.9fr 0.7fr 0.8fr 100px;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  border-top: 1px solid var(--border);
  cursor: default;
  width: 100%;
  text-align: left;
  background: none;
  border-left: 0; border-right: 0; border-bottom: 0;
  font: inherit;
  color: inherit;
}
.event-row:first-child { border-top: 0; }
.event-row.clickable { cursor: pointer; }
.event-row.clickable:hover { background: color-mix(in oklab, var(--muted) 50%, transparent); }
.event-row .ev-t { min-width: 0; }
.event-row .ev-title { font: 500 13.5px/1.3 var(--font-sans); color: var(--foreground); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.event-row .ev-code { font: 400 11.5px/1.2 var(--font-sans); color: var(--muted-foreground); margin-top: 3px; }
.event-row .ev-cell { font: 400 12.5px/1 var(--font-sans); color: var(--foreground); font-variant-numeric: tabular-nums; }
.event-row .ev-muted { color: var(--muted-foreground); }

/* Avatar stack */
.avatar-stack { display: inline-flex; justify-content: flex-end; }
.avatar-stack .av {
  width: 22px; height: 22px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font: 500 10px/1 var(--font-sans);
  color: #fff;
  border: 1.5px solid #fff;
  margin-left: -6px;
  flex-shrink: 0;
}
.avatar-stack .av:first-child { margin-left: 0; }

/* ========== Event Detail ========== */
.event-page { max-width: 1240px; margin: 0 auto; padding: 28px 36px 80px; }
.event-page.compact { max-width: 100%; padding: 18px 20px 60px; }
.ev-crumb { display: flex; align-items: center; gap: 6px; font: 400 12.5px/1 var(--font-sans); color: var(--muted-foreground); margin-bottom: 18px; cursor: pointer; }
.ev-crumb:hover { color: var(--foreground); }
.ev-crumb .sep { color: var(--border); }
.ev-crumb .cur { color: var(--foreground); }

.ev-header {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 22px 24px;
  margin-bottom: 12px;
  display: flex; align-items: flex-start; justify-content: space-between; gap: 16px;
}
.event-page.compact .ev-header { padding: 14px 18px; flex-direction: column; align-items: flex-start; gap: 12px; }
.ev-kicker { font: 500 11px/1 var(--font-sans); color: var(--muted-foreground); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
.ev-h1 { margin: 0; font: 400 24px/1.2 var(--font-sans); letter-spacing: -0.01em; color: var(--foreground); }
.event-page.compact .ev-h1 { font-size: 16px; font-weight: 500; }
.ev-meta { display: flex; align-items: center; gap: 18px; margin-top: 12px; font: 400 13px/1 var(--font-sans); color: var(--foreground); flex-wrap: wrap; }
.event-page.compact .ev-meta { gap: 12px; font-size: 11.5px; margin-top: 5px; }
.ev-meta span { display: inline-flex; align-items: center; gap: 5px; }
.ev-meta svg { color: var(--muted-foreground); }
.ev-head-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

/* Sourcing pipeline card */
.ev-card {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px 20px;
  margin-bottom: 12px;
}
.event-page.compact .ev-card { padding: 12px 16px; }
.ev-card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.ev-card-head .label { font: 500 11px/1 var(--font-sans); letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted-foreground); }
.ev-card-head a { font: 400 12px/1 var(--font-sans); color: var(--muted-foreground); text-decoration: none; cursor: pointer; }

/* Pipeline stepper */
.pipe { display: flex; align-items: stretch; gap: 0; min-width: 0; overflow-x: auto; padding-bottom: 4px; }
.pipe::-webkit-scrollbar { height: 4px; }
.pipe::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.pipe .stage {
  flex: 1 0 130px;
  min-width: 130px;
  padding: 14px 10px 12px;
  border-radius: 12px;
  background: color-mix(in oklab, var(--muted) 40%, transparent);
  border: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  cursor: default;
}
.pipe .stage.muted { opacity: 0.55; }
.pipe .stage.clickable { cursor: pointer; transition: background .12s, border-color .12s; }
.pipe .stage.clickable:hover {
  background: #fff;
  border-color: color-mix(in oklab, var(--action-primary) 40%, var(--border));
}
.pipe .sep {
  display: inline-flex; align-items: center; justify-content: center;
  width: 22px;
  color: var(--border);
  flex-shrink: 0;
}

.stage-preview {
  position: relative;
  height: 52px;
  width: 64px;
  margin: 2px 0 6px;
  align-self: center;
}
.stage-preview .thumb {
  position: absolute;
  width: 40px; height: 40px;
  border-radius: 7px;
  background: #fff;
  border: 1px solid var(--border);
  overflow: hidden;
  box-shadow: 0 2px 6px rgba(10,57,128,0.08);
}
.stage-preview .thumb.empty {
  background: color-mix(in oklab, var(--muted) 60%, transparent);
  border: 1px dashed var(--border);
  box-shadow: none;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--muted-foreground);
}
.stage-preview .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.stage-preview .thumb:nth-child(1) { left: calc(50% - 28px); top: 2px; transform: rotate(-6deg); z-index: 1; }
.stage-preview .thumb:nth-child(2) { left: calc(50% - 20px); top: 0; transform: rotate(0deg); z-index: 3; }
.stage-preview .thumb:nth-child(3) { left: calc(50% - 12px); top: 2px; transform: rotate(6deg); z-index: 2; }

.stage-meta { display: flex; align-items: center; gap: 5px; margin-top: 2px; width: 100%; min-width: 0; }
.stage-meta .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.stage-meta .count { font: 500 13px/1 var(--font-sans); color: var(--foreground); font-variant-numeric: tabular-nums; flex-shrink: 0; }
.stage-meta .lbl { font: 400 12.5px/1 var(--font-sans); color: var(--foreground); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
.stage.muted .stage-meta .count, .stage.muted .stage-meta .lbl { color: var(--muted-foreground); }
.stage-meta .tail { margin-left: auto; color: var(--muted-foreground); display: inline-flex; }

.pipe-badge {
  margin-top: 6px;
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 7px;
  font: 500 11px/1 var(--font-sans);
  color: var(--warning-primary);
  background: var(--warning-subtle);
  border-radius: 5px;
}

/* Compact stepper row */
.pipe-compact { display: flex; align-items: center; gap: 0; overflow-x: auto; }
.pipe-compact .stage-c {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 9px;
  border-radius: 7px;
  white-space: nowrap;
  border: 1px solid transparent;
}
.pipe-compact .stage-c.clickable { cursor: pointer; background: color-mix(in oklab, var(--muted) 40%, transparent); border-color: var(--border); }
.pipe-compact .stage-c.muted { opacity: 0.55; }

/* Committed budget */
.budget-row {
  margin-top: 14px;
  padding: 10px 12px;
  background: color-mix(in oklab, var(--muted) 40%, transparent);
  border: 1px solid var(--border);
  border-radius: 10px;
}
.event-page.compact .budget-row { padding: 8px 10px; margin-top: 10px; }
.budget-row-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; font: 400 12.5px/1 var(--font-sans); }
.budget-row-head .k { color: var(--muted-foreground); }
.budget-row-head .v { color: var(--foreground); font-variant-numeric: tabular-nums; }
.budget-row-head .v b { font-weight: 500; }
.prog-track { height: 6px; border-radius: 999px; background: var(--border); overflow: hidden; }
.prog-fill { height: 100%; background: var(--foreground); border-radius: 999px; }

/* Division of labor — 3-col layout */
.dol-head { display: flex; align-items: baseline; justify-content: space-between; margin: 24px 0 10px; }
.dol-head h3 { margin: 0; font: 500 15px/1 var(--font-sans); color: var(--foreground); letter-spacing: -0.005em; }
.dol-head .sub { font: 400 12px/1 var(--font-sans); color: var(--muted-foreground); margin-top: 4px; }
.dol-head a { font: 400 12px/1 var(--font-sans); color: var(--muted-foreground); text-decoration: none; cursor: pointer; }
.dol-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.event-page.compact .dol-grid { grid-template-columns: 1fr; gap: 8px; }
.dol-col {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px 18px 14px;
  display: flex; flex-direction: column;
  min-height: 420px;
}
.event-page.compact .dol-col { min-height: auto; padding: 14px 16px; }
.dol-col-head { display: flex; align-items: center; gap: 10px; padding-bottom: 12px; margin-bottom: 12px; border-bottom: 1px solid var(--border); cursor: default; }
.event-page.compact .dol-col-head { padding-bottom: 0; margin-bottom: 0; border-bottom: 0; cursor: pointer; }
.dol-ico { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0; }
.dol-ico.warn { background: var(--warning-subtle); color: var(--warning-primary); }
.dol-ico.agent { background: var(--action-subtle); color: var(--action-primary); }
.dol-ico.specialist { background: var(--positive-subtle); color: var(--positive-primary); }
.dol-col-head .ttl { font: 500 13.5px/1.25 var(--font-sans); color: var(--foreground); }
.dol-col-head .sub { font: 400 11.5px/1.3 var(--font-sans); color: var(--muted-foreground); margin-top: 2px; }
.dol-col-head .pill-cnt {
  font: 500 12px/1 var(--font-sans);
  padding: 2px 8px; border-radius: 999px;
  min-width: 26px; text-align: center;
}
.dol-col-head .pill-cnt.warn { color: var(--warning-primary); background: var(--warning-subtle); }
.dol-col-head .pill-cnt.agent { color: var(--action-primary); background: var(--action-subtle); }
.dol-col-head .pill-cnt.specialist { color: var(--positive-primary); background: var(--positive-subtle); }

.event-page.compact .dol-col-body { border-top: 1px solid var(--border); margin-top: 12px; padding-top: 12px; }

.dol-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-top: 1px solid var(--border); }
.dol-item:first-child { border-top: 0; }
.dol-item .body { flex: 1; min-width: 0; }
.dol-item .t { font: 500 13px/1.35 var(--font-sans); color: var(--foreground); }
.dol-item .m { font: 400 11.5px/1.3 var(--font-sans); color: var(--muted-foreground); margin-top: 2px; }
.dol-item .time { font: 400 11px/1 var(--font-sans); color: var(--muted-foreground); font-variant-numeric: tabular-nums; white-space: nowrap; margin-top: 2px; }
.dol-item .prio { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 7px; }
.dol-item .prio.high { background: var(--alert-active); }
.dol-item .prio.med { background: var(--warning-active); }
.dol-item .prio.low { background: var(--border); }

.dol-item .check-mark {
  width: 18px; height: 18px; border-radius: 5px;
  background: var(--action-subtle); color: var(--action-primary);
  display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px;
}
.dol-item .live-dot {
  width: 18px; height: 18px; border-radius: 5px;
  background: var(--action-subtle); color: var(--action-primary);
  display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px;
}
.dol-item .live-dot::after {
  content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--action-primary);
  animation: pulse 1.4s ease-in-out infinite;
}
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
.dol-item .body .tag {
  display: inline-flex; align-items: center; gap: 4px;
  font: 400 10.5px/1 var(--font-sans);
  color: var(--muted-foreground);
  padding: 2px 6px;
  background: color-mix(in oklab, var(--muted) 50%, transparent);
  border: 1px solid var(--border);
  border-radius: 5px;
  margin-top: 4px;
}
.dol-item .body b { color: var(--foreground); font-weight: 500; }

/* Ask Agent floating pill */
.ask-agent-pill {
  position: fixed; right: 24px; bottom: 24px; z-index: 60;
  display: inline-flex; align-items: center; gap: 10px;
  padding: 10px 16px 10px 12px;
  background: #fff;
  border: 1px solid var(--action-subtle);
  border-radius: 999px;
  box-shadow: 0 10px 28px rgba(10,57,128,0.12), 0 2px 6px rgba(10,57,128,0.06);
  cursor: pointer;
  font: 500 13px/1 var(--font-sans);
  color: var(--foreground);
}
.ask-agent-pill .ico {
  width: 24px; height: 24px; border-radius: 7px;
  background: var(--action-subtle); color: var(--action-primary);
  display: inline-flex; align-items: center; justify-content: center;
}

  gap: 6px;
